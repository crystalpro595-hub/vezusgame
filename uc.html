<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>UC SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  background: linear-gradient(180deg, #02102A, #000);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
}

/* ===== КОНТЕЙНЕР ===== */
.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 30px;
  flex-wrap: nowrap;
}

/* ===== КНОПКА НАЗАД ===== */
.back-btn {
  padding: 12px 20px;
  font-size: 16px;
  font-weight: 900;
  border-radius: 14px;
  background: linear-gradient(45deg,#007bff,#000);
  border: 2px solid #4dc7ff;
  color: #fff;
  text-decoration: none;
  white-space: nowrap;
}

/* ===== БАЛАНС ===== */
.balance-card {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  border-radius: 20px;
  background: linear-gradient(
    135deg,
    rgba(0,136,255,0.25),
    rgba(0,0,0,0.6)
  );
  border: 1px solid rgba(0,136,255,0.4);
  backdrop-filter: blur(10px);
  box-shadow:
    0 0 20px rgba(0,136,255,.45),
    inset 0 0 14px rgba(0,136,255,.25);
  white-space: nowrap;
}

.balance-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg,#0080ff,#003c7a);
  display: flex;
  align-items: center;
  justify-content: center;
}

.balance-icon img {
  width: 28px;
}

.balance-label {
  font-size: 12px;
  color: #9fb6ff;
  font-weight: 600;
}

.balance-value {
  font-size: 24px;
  font-weight: 900;
  text-shadow: 0 0 12px rgba(0,136,255,.6);
}

.balance-value span {
  font-size: 15px;
  color: #ffffff;
}

/* ===== ЗАГОЛОВОК ===== */
.page-title {
  font-size: 34px;
  font-weight: 900;
  margin-bottom: 28px;
  text-shadow: 0 0 20px rgba(0,136,255,.6);
}

/* ===== GRID UC ===== */
.uc-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  column-gap: 28px;
  row-gap: 30px;
  max-width: 900px;
  margin: 0 auto;
}

/* ===== КАРТОЧКИ ===== */
.menu-item {
  text-align: center;
}

.uc-btn {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 18px;
  background: url("https://i.postimg.cc/8CQWcjJF/Picsart-26-01-28-11-45-25-108.jpg") center / cover no-repeat;
  box-shadow:
    0 0 25px rgba(0,162,255,.45),
    inset 0 0 14px rgba(0,162,255,.25);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease;
}

.uc-btn:active {
  transform: scale(.97);
}

.menu-label {
  margin-top: 10px;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 1px;
  color: #cfeaff;
}

/* ===== МАЛЕНЬКИЕ ТЕЛЕФОНЫ ===== */
@media (max-width: 420px) {
  .container {
    padding: 80px 12px;
  }

  .back-btn {
    padding: 10px 16px;
    font-size: 15px;
  }

  .balance-card {
    padding: 10px 14px;
  }

  .balance-value {
    font-size: 22px;
  }

  .menu-label {
    font-size: 14px;
  }

 .uc-grid {
  column-gap: 14px;
  row-gap: 50px;
}
}

/* ===== iPad и планшеты ===== */
@media (min-width: 768px) and (max-width: 1024px) {
  .top-bar {
    max-width: 350px;
    margin-left: auto;
    margin-right: auto;
  }
}

/* ===== ТЕКСТ ПОД КАРТОЧКОЙ (UC + ЦЕНА) ===== */
.uc-info {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  gap: 8px;
  font-weight: 900;
  letter-spacing: 0.5px;
}

.uc-amount {
  font-size: 10px;
  color: #1E90FF;
}

.uc-price {
  font-size: 10px;
  color: #fffff;
}

/* ===== POPUP ===== */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

@keyframes blueNeonPulse {
  0% {
    box-shadow:
      0 0 18px rgba(0, 150, 255, 0.45),
      0 0 40px rgba(0, 120, 255, 0.35);
  }
  50% {
    box-shadow:
      0 0 32px rgba(0, 180, 255, 0.9),
      0 0 75px rgba(0, 140, 255, 0.6);
  }
  100% {
    box-shadow:
      0 0 18px rgba(0, 150, 255, 0.45),
      0 0 40px rgba(0, 120, 255, 0.35);
  }
}

.popup {
  background: linear-gradient(180deg, #061a3a, #020b1d);
  border-radius: 22px;
  padding: 22px;
  animation: blueNeonPulse 1.8s ease-in-out infinite;
}

.popup {
  position: relative; /* ← ВАЖНО */
  background: linear-gradient(180deg, #061a3a, #020b1d);
  border-radius: 22px;
  padding: 22px;
  animation: blueNeonPulse 1.8s ease-in-out infinite;
}
  
.popup-title {
  font-size: 22px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 18px;
}

.popup-info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 16px;
  font-weight: 900;
}

.popup-price {
  color: #6dff9c;
}

/* INPUT */
.popup-input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.2);
  background: rgba(0,0,0,.6);
  color: #fff;
  font-size: 15px;
  margin-bottom: 18px;
  outline: none;
}

/* BUY BUTTON */
.buy-btn {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  border: none;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
  color: #042b14;
  background: linear-gradient(135deg,#00ff88,#00c66a);
  box-shadow:
    0 0 20px rgba(0,255,136,.6),
    inset 0 0 10px rgba(255,255,255,.3);
}

.buy-btn:active {
  transform: scale(.97);
}

/* CLOSE */
.popup-close {
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 20px;
  cursor: pointer;
  opacity: .7;
}  

/* === УБИРАЕМ СИНИЙ MOBILE TAP EFFECT === */
* {
  -webkit-tap-highlight-color: transparent;
}

.block,
.games-btn,
.uc-btn,
.mid-btn,
.wallet-action,
.bonus-card,
.balance-card {
  outline: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}  
  
</style>
</head>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpcXl6cmdpdXZ4bWh4Z2xhZHh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NTgzMDIsImV4cCI6MjA4MTAzNDMwMn0.21-OjkjEtppQ78o66lQJwa-1c1HSfbka2SD2C0lC1ro";

  const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );

  const tg = window.Telegram.WebApp;
  tg.expand();

  if (!tg.initDataUnsafe?.user) {
    alert("Открой через Telegram");
    return;
  }

  const tgUser = tg.initDataUnsafe.user;

  /* ===== INIT USER ===== */
  async function initUser() {
    let { data: user } = await supabase
      .from("users")
      .select("id")
      .eq("telegram_id", tgUser.id)
      .single();

    if (!user) {
      const { data: newUser } = await supabase
        .from("users")
        .insert({
          telegram_id: tgUser.id,
          username: tgUser.username,
          first_name: tgUser.first_name,
          last_name: tgUser.last_name
        })
        .select()
        .single();

      await supabase.from("balances").insert({
        user_id: newUser.id,
        balance: 0
      });

      user = newUser;
    }

    window.USER_ID = user.id;
    loadBalance();
  }

  /* ===== LOAD BALANCE ===== */
  async function loadBalance() {
    const { data } = await supabase
      .from("balances")
      .select("balance")
      .eq("user_id", window.USER_ID)
      .single();

    const balance = data?.balance ?? 0;
    document.getElementById("top-balance-value").innerText = balance;
  }

  initUser();
});
</script>

  <script>
const popup = document.getElementById("popup");
const popupUc = document.getElementById("popup-uc");
const popupPrice = document.getElementById("popup-price");
const popupClose = document.getElementById("popup-close");
const buyBtn = document.getElementById("buy-btn");
const gameIdInput = document.getElementById("game-id");

document.querySelectorAll(".uc-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    popupUc.innerText = btn.dataset.uc;
    popupPrice.innerText = btn.dataset.price;
    gameIdInput.value = "";
    popup.style.display = "flex";
  });
});

popupClose.onclick = () => {
  popup.style.display = "none";
};

buyBtn.onclick = () => {
  const gameId = gameIdInput.value.trim();
  if (!gameId) {
    alert("Введите игровой ID");
    return;
  }

  alert(
    `Покупка:\n${popupUc.innerText} UC\nЦена: ${popupPrice.innerText} VC\nID: ${gameId}`
  );

  popup.style.display = "none";
};
</script>

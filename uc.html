<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>UC SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  background: linear-gradient(180deg, #02102A, #000);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
}

/* === МАСШТАБ ТОЛЬКО КОНТЕНТА === */

#content {
    transform-origin: top left;
}
@media (max-width: 480px) {
    #content {
        transform: scale(0.40);
        width: 250%;
    }
}    

/* === КНОПКА НАЗАД === */
.back-btn {
  margin: 50px 0 120px 20px;
  display: inline-block;
  padding: 20px 30px;
  font-size: 28px;
  font-weight: 900;
  border-radius: 14px;
  background: linear-gradient(45deg,#007bff,#000);
  border: 3px solid #4dc7ff;
  color: #fff;
  text-decoration: none;
}

/* === БЛОКИ === */
.big-blocks {
  display: flex;
  justify-content: left;
  margin: 60px 0 0 20px;
}

.menu-item {
  width: 28%;
  margin: 0 14px;
  text-align: center;
}

.uc-btn {
  width: 100%;
  height: 300px;
  border-radius: 18px;
  background: url("https://i.postimg.cc/d3fmS9MS/IMG-0493.png") center / cover no-repeat;
  box-shadow:
    0 0 25px rgba(0,162,255,.45),
    inset 0 0 14px rgba(0,162,255,.25);
}

.menu-label {
  margin-top: 14px;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 2px;
  color: #cfeaff;
}

/* === BALANCE PREMIUM CARD === */
.balance-wrapper {
  display: flex;
  justify-content: center;
  margin: 30px 0 20px;
}

.balance-card {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 18px 26px;
  border-radius: 22px;
  cursor: pointer;

  background: linear-gradient(
    135deg,
    rgba(0,136,255,0.22),
    rgba(0,0,0,0.65)
  );

  border: 1px solid rgba(0,136,255,0.4);
  backdrop-filter: blur(10px);
  box-shadow:
    0 0 25px rgba(0,136,255,.45),
    inset 0 0 18px rgba(0,136,255,.25);

  transition: transform .18s ease, box-shadow .18s ease;
}

.balance-card:active {
  transform: scale(.97);
}

.balance-icon {
  width: 64px;
  height: 64px;
  border-radius: 18px;
  background: linear-gradient(135deg,#0080ff,#003c7a);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 20px rgba(0,136,255,.6);
}

.balance-icon img {
  width: 36px;
}

.balance-label {
  font-size: 14px;
  color: #9fb6ff;
  font-weight: 600;
}

.balance-value {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: .5px;
  color: #ffffff;
  text-shadow: 0 0 12px rgba(0,136,255,.6);
}

.balance-value span {
  font-size: 18px;
  color: #7dd3fc;
  margin-left: 4px;
}  
  
</style>
</head>

<body>
<div id="content">

<div class="balance-wrapper">
  <div class="balance-card">
    <div class="balance-icon">
      <img src="https://i.postimg.cc/7YrQyB4C/IMG-0427.png" alt="wallet">
    </div>

    <div>
      <div class="balance-label">Текущий баланс</div>
      <div class="balance-value" id="uc-balance">
        0 <span>VC</span>
      </div>
    </div>
  </div>
</div>
  
  <a href="index.html" class="back-btn">← НАЗАД</a>

  <h1 style="
    margin:20px 0 20px 20px;
    font-size:42px;
    font-weight:900;
    text-shadow:0 0 20px rgba(0,136,255,.6);
  ">
    UC SHOP
  </h1>

  <div class="big-blocks">
    <div class="menu-item">
      <div class="uc-btn"></div>
      <div class="menu-label">60 UC</div>
    </div>

    <div class="menu-item">
      <div class="uc-btn"></div>
      <div class="menu-label">180 UC</div>
    </div>

    <div class="menu-item">
      <div class="uc-btn"></div>
      <div class="menu-label">325 UC</div>
    </div>
  </div>

</div>
</body>
</html>

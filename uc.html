<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>UC SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  font-family: 'Montserrat', sans-serif;
  color: #fff;

  background-image: url('https://i.postimg.cc/15xyK3Xr/Picsart-26-01-30-00-16-57-552.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

.container { max-width: 1000px; margin: 0 auto; padding: 20px 16px; }

.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px; margin-bottom: 30px; flex-wrap: nowrap;
}

.back-btn {
  padding: 12px 20px; font-size: 16px; font-weight: 900;
  border-radius: 14px; background: linear-gradient(45deg,#007bff,#000);
  border: 2px solid #4dc7ff; color: #fff; text-decoration: none; white-space: nowrap;
}

.balance-card {
  display: flex; align-items: center; padding: 12px 20px;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(0,136,255,0.25), rgba(0,0,0,0.6));
  border: 1px solid rgba(0,136,255,0.4);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,136,255,.45), inset 0 0 14px rgba(0,136,255,.25);
  white-space: nowrap;
}

.balance-label { font-size: 12px; color: #9fb6ff; font-weight: 600; }
.balance-value { font-size: 24px; font-weight: 900; text-shadow: 0 0 12px rgba(0,136,255,.6); }
.balance-value span { font-size: 15px; color: #ffffff; }

.page-title {
  font-size: 34px; font-weight: 900; margin-bottom: 28px;
  text-shadow: 0 0 20px rgba(0,136,255,.6);
}

.uc-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  column-gap: 28px;
  row-gap: 30px;
  max-width: 900px;
  margin: 0 auto;
}

.menu-item { text-align: center; }

.uc-btn {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 18px;
  background: url("https://i.postimg.cc/8CQWcjJF/Picsart-26-01-28-11-45-25-108.jpg") center / cover no-repeat;
  box-shadow: 0 0 25px rgba(0,162,255,.45), inset 0 0 14px rgba(0,162,255,.25);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease;
}
.uc-btn:active { transform: scale(.97); }

.uc-info {
  margin-top: 0px;
  display: flex;
  justify-content: center;
  gap: 8px;
  font-weight: 900;
  letter-spacing: 0.5px;
}
.uc-amount { font-size: 10px; color: #1E90FF; }
.uc-price { font-size: 10px; color: #ffffff; } /* ✅ фикс цвета */

@media (max-width: 420px) {
  .container { padding: 80px 12px; }
  .back-btn { padding: 10px 16px; font-size: 15px; }
  .balance-card { padding: 10px 14px; }
  .balance-value { font-size: 22px; }
  .uc-grid { column-gap: 30px; row-gap: 60px; }
}

@media (min-width: 768px) and (max-width: 1024px) {
  .top-bar { max-width: 350px; margin-left: auto; margin-right: auto; }
}

/* ===== POPUP OVERLAY ===== */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

@keyframes blueNeonPulse {
  0% { box-shadow: 0 0 18px rgba(0, 150, 255, 0.45), 0 0 40px rgba(0, 120, 255, 0.35); }
  50% { box-shadow: 0 0 32px rgba(0, 180, 255, 0.9), 0 0 75px rgba(0, 140, 255, 0.6); }
  100% { box-shadow: 0 0 18px rgba(0, 150, 255, 0.45), 0 0 40px rgba(0, 120, 255, 0.35); }
}

.popup {
  position: relative;
  background: linear-gradient(180deg, #061a3a, #020b1d);
  border-radius: 22px;
  padding: 22px;
  animation: blueNeonPulse 1.8s ease-in-out infinite;
  width: 92%;
  max-width: 420px;
}

.popup-title { font-size: 22px; font-weight: 900; text-align: center; margin-bottom: 18px; }
.popup-info { display: flex; justify-content: space-between; margin-bottom: 16px; font-weight: 900; }
.popup-price { color: #6dff9c; }

.popup-input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.2);
  background: rgba(0,0,0,.6);
  color: #fff;
  font-size: 15px;
  margin-bottom: 18px;
  outline: none;
}

.buy-btn {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  border: none;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
  color: #042b14;
  background: linear-gradient(135deg,#00ff88,#00c66a);
  box-shadow: 0 0 20px rgba(0,255,136,.6), inset 0 0 10px rgba(255,255,255,.3);
}
.buy-btn:active { transform: scale(.97); }

.popup-close {
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 20px;
  cursor: pointer;
  opacity: .7;
}

/* ✅ Loading состояние кнопки */
.buy-btn.loading {
  pointer-events: none;
  opacity: .85;
  background: linear-gradient(135deg,#888,#444);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.buy-btn.loading::after {
  content: "";
  width: 18px;
  height: 18px;
  border: 3px solid rgba(255,255,255,.35);
  border-top: 3px solid #fff;
  border-radius: 50%;
  display: inline-block;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* tap highlight off */
* { -webkit-tap-highlight-color: transparent; }
.uc-btn, .buy-btn { outline: none; -webkit-tap-highlight-color: transparent; user-select: none; }

/* ✅ SUCCESS NOTIFY (старое — оставляем, но теперь почти не используем) */
.notify{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.notify-box{
  width: 92%;
  max-width: 420px;
  padding: 22px 22px;
  border-radius: 22px;
  background: linear-gradient(180deg,#041b3d,#010b1f);
  text-align: center;
  box-shadow:
    0 0 35px rgba(0,160,255,.9),
    inset 0 0 18px rgba(0,160,255,.4);
  animation: notifyIn .35s ease;
}
@keyframes notifyIn {
  from { transform: scale(.9); opacity: 0 }
  to   { transform: scale(1); opacity: 1 }
}
.notify-title{
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 10px;
  color: #7dffb0;
}
.notify-text{
  font-size: 16px;
  font-weight: 700;
  color: #e8f6ff;
  line-height: 1.35;
}

/* ✅ НОВОЕ: подтверждение перед покупкой */
.confirm-overlay{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 3000;
}
.confirm-box{
  width: 92%;
  max-width: 420px;
  border-radius: 22px;
  padding: 20px;
  background: linear-gradient(180deg,#071a3a,#020b1d);
  box-shadow: 0 0 35px rgba(0,136,255,.55), inset 0 0 18px rgba(0,136,255,.25);
  animation: notifyIn .35s ease;
  text-align: center;
}
.confirm-title{
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 10px;
}
.confirm-text{
  font-size: 15px;
  color: #e8f6ff;
  line-height: 1.35;
  margin-bottom: 16px;
}
.confirm-actions{
  display: flex;
  gap: 10px;
}
.confirm-btn{
  flex: 1;
  padding: 12px;
  border-radius: 14px;
  border: none;
  font-weight: 900;
  cursor: pointer;
}
.confirm-btn.cancel{
  background: linear-gradient(135deg,#666,#333);
  color: #fff;
}
.confirm-btn.ok{
  background: linear-gradient(135deg,#00ff88,#00c66a);
  color: #042b14;
}

/* ✅ НОВОЕ: красивый зелёный toast (как депозиты/выводы) */
/* ✅ НОВОЕ положение toast: ниже, но не в центре */
.toast{
  position: fixed;
  top: 120px;              /* ← вот это двигает ниже */
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 28px);
  max-width: 520px;
  z-index: 4000;
  display: none;
}

/* на маленьких экранах чуть выше, чтобы не мешало */
@media (max-width: 420px){
  .toast{
    top: 90px;
  }
}
.toast-box{
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 14px 14px;
  border-radius: 18px;

  /* ✅ НЕпрозрачный зелёный фон */
  background: linear-gradient(135deg, #00d46a, #00a84f);

  /* ✅ более “плотная” рамка/тень */
  border: 1px solid rgba(255,255,255,.18);
  box-shadow:
    0 14px 45px rgba(0, 255, 136, .25),
    0 0 0 1px rgba(0,0,0,.25) inset;

  /* ❌ убираем стекло/прозрачность */
  backdrop-filter: none;

  animation: toastIn .35s ease;
}
@keyframes toastIn{
  from{ transform: translateY(-10px); opacity:0 }
  to{ transform: translateY(0); opacity:1 }
}
.toast-icon{
  width: 38px;
  height: 38px;
  border-radius: 14px;
  background: linear-gradient(135deg,#00ff88,#00c66a);
  color: #042b14;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex: 0 0 auto;
}
.toast-content{ flex: 1 }
.toast-title{
  font-weight: 900;
  font-size: 16px;
  color: #d7ffe8;
  margin-bottom: 2px;
}
.toast-sub{
  font-size: 13px;
  color: #eafff5;
  line-height: 1.3;
}
.toast-actions{
  margin-top: 10px;
}
.toast-ok{
  width: 100%;
  padding: 10px;
  border-radius: 14px;
  border: none;
  font-weight: 900;
  cursor: pointer;

  /* ✅ непрозрачная кнопка */
  background: rgba(0,0,0,.22);
  color: #eafff5;
  border: 1px solid rgba(255,255,255,.22);
}
.toast-ok:active{ transform: scale(.98) }
.toast-ok:active{ transform: scale(.98) }
</style>
</head>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpcXl6cmdpdXZ4bWh4Z2xhZHh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NTgzMDIsImV4cCI6MjA4MTAzNDMwMn0.21-OjkjEtppQ78o66lQJwa-1c1HSfbka2SD2C0lC1ro";

  // 1) создаём клиент Supabase один раз
  window.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 2) Telegram
  const tg = window.Telegram.WebApp;
  tg.expand();

  if (!tg.initDataUnsafe?.user) {
    alert("Открой через Telegram");
    return;
  }
  const tgUser = tg.initDataUnsafe.user;

  // 3) элементы
  const popupOverlay = document.getElementById("popup");
  const popupUc = document.getElementById("popup-uc");
  const popupPrice = document.getElementById("popup-price");
  const popupClose = document.getElementById("popup-close");
  const buyBtn = document.getElementById("buy-btn");
  const gameIdInput = document.getElementById("game-id");

  // confirm
  const confirmOverlay = document.getElementById("confirm");
  const confirmText = document.getElementById("confirm-text");
  const confirmCancel = document.getElementById("confirm-cancel");
  const confirmOk = document.getElementById("confirm-ok");

  // toast
  const toast = document.getElementById("toast");
  const toastTitle = document.getElementById("toast-title");
  const toastSub = document.getElementById("toast-sub");
  const toastOk = document.getElementById("toast-ok");

  let buying = false; // ✅ защита от двойного клика
  let pendingPurchase = null; // сюда кладём данные, когда пользователь нажал "Купить"

  // 4) initUser
  async function initUser() {
    let { data: user } = await window.sb
      .from("users")
      .select("id")
      .eq("telegram_id", tgUser.id)
      .single();

    if (!user) {
      const { data: newUser } = await window.sb
        .from("users")
        .insert({
          telegram_id: tgUser.id,
          username: tgUser.username,
          first_name: tgUser.first_name,
          last_name: tgUser.last_name
        })
        .select()
        .single();

      await window.sb.from("balances").insert({ user_id: newUser.id, balance: 0 });
      user = newUser;
    }

    window.USER_ID = user.id;
    await loadBalance();
  }

  async function loadBalance() {
    const { data } = await window.sb
      .from("balances")
      .select("balance")
      .eq("user_id", window.USER_ID)
      .single();

    const balance = data?.balance ?? 0;
    document.getElementById("top-balance-value").innerText = balance;
  }

  // ✅ функция: показать toast
  let toastTimer = null;
  function showToast(title, htmlText, ms = 6000) {
    toastTitle.innerText = title;
    toastSub.innerHTML = htmlText;
    toast.style.display = "block";

    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toast.style.display = "none";
    }, ms);
  }

  toastOk.onclick = () => {
    toast.style.display = "none";
    if (toastTimer) clearTimeout(toastTimer);
  };

  // 5) открытие попапа
  document.querySelectorAll(".uc-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      popupUc.innerText = btn.dataset.uc;
      popupPrice.innerText = btn.dataset.price;
      gameIdInput.value = "";
      popupOverlay.style.display = "flex";
    });
  });

  // 6) закрытие попапа
  popupClose.onclick = () => { popupOverlay.style.display = "none"; };

  // ✅ НОВОЕ: при нажатии "Купить" — сначала подтверждение ID
  buyBtn.onclick = () => {
    const gameId = gameIdInput.value.trim();
    if (!gameId) {
      alert("Введите игровой ID");
      return;
    }

    const price = Number(popupPrice.innerText);
    const uc = Number(popupUc.innerText);

    pendingPurchase = { gameId, price, uc };

    confirmText.innerHTML = `
      Вы уверены, что указали <b>игровой ID</b> верно?<br><br>
      ID: <b>${gameId}</b><br>
      Пакет: <b>${uc} UC</b><br>
      Цена: <b>${price} VC</b><br><br>
      <span style="color:#facc15;">Если ID неверный — UC могут уйти на другой аккаунт.</span>
    `;
    confirmOverlay.style.display = "flex";
  };

  confirmCancel.onclick = () => {
    confirmOverlay.style.display = "none";
    pendingPurchase = null;
  };

  // ✅ ПОКУПКА после подтверждения
  confirmOk.onclick = async () => {
    if (!pendingPurchase) {
      confirmOverlay.style.display = "none";
      return;
    }

    confirmOverlay.style.display = "none";

    if (buying) return;
    buying = true;

    const oldText = buyBtn.innerText;

    // включаем loading
    buyBtn.classList.add("loading");
    buyBtn.innerText = "Покупаю...";
    buyBtn.disabled = true;

    try {
      if (!window.USER_ID) {
        alert("Подождите секунду, загружаю профиль...");
        return;
      }

      const { gameId, price, uc } = pendingPurchase;

      const { error } = await window.sb.rpc("buy_uc", {
        p_user_id: window.USER_ID,
        p_uc: uc,
        p_price: price,
        p_game_id: gameId
      });

      if (error) {
        const msg = String(error.message || "");
        if (msg.includes("insufficient_funds")) alert("Недостаточно VC");
        else if (msg.includes("bad_game_id")) alert("ID слишком короткий");
        else alert("Ошибка покупки");
        console.log(error);
        return;
      }

      // ✅ обновляем баланс сразу
      await loadBalance();
      const newBalance = document.getElementById("top-balance-value").innerText;

      popupOverlay.style.display = "none";

      // ✅ Зелёное уведомление с галочкой
      showToast(
        "Покупка успешна ✅",
        `
          Кол-во: <b>${uc} UC</b><br>
          Цена: <b>${price} VC</b><br>
          Баланс: <b>${newBalance} VC</b><br><br>
          <span style="color:#facc15; font-weight:900;">
            UC поступят на баланс в течение 15 минут
          </span>
        `,
        8000
      );

    } finally {
      pendingPurchase = null;
      buying = false;
      buyBtn.classList.remove("loading");
      buyBtn.disabled = false;
      buyBtn.innerText = oldText;
    }
  };

  // запуск
  await initUser();
});
</script>

<!-- ✅ Старое уведомление (оставил как в твоём коде, но сейчас не используется) -->
<div class="notify" id="notify">
  <div class="notify-box">
    <div class="notify-title">✅ Покупка успешна</div>
    <div class="notify-text" id="notify-text"></div>
  </div>
</div>

</body>
</html>

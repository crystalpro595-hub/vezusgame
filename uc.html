<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>UC SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  font-family: 'Montserrat', sans-serif;
  color: #fff;

  background-image: url('https://i.postimg.cc/15xyK3Xr/Picsart-26-01-30-00-16-57-552.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

.container { max-width: 1000px; margin: 0 auto; padding: 20px 16px; }

.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px; margin-bottom: 30px; flex-wrap: nowrap;
}

.back-btn {
  padding: 12px 20px; font-size: 16px; font-weight: 900;
  border-radius: 14px; background: linear-gradient(45deg,#007bff,#000);
  border: 2px solid #4dc7ff; color: #fff; text-decoration: none; white-space: nowrap;
}

.balance-card {
  display: flex; align-items: center; padding: 12px 20px;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(0,136,255,0.25), rgba(0,0,0,0.6));
  border: 1px solid rgba(0,136,255,0.4);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,136,255,.45), inset 0 0 14px rgba(0,136,255,.25);
  white-space: nowrap;
}

.balance-label { font-size: 12px; color: #9fb6ff; font-weight: 600; }
.balance-value { font-size: 24px; font-weight: 900; text-shadow: 0 0 12px rgba(0,136,255,.6); }
.balance-value span { font-size: 15px; color: #ffffff; }

.page-title {
  font-size: 34px; font-weight: 900; margin-bottom: 28px;
  text-shadow: 0 0 20px rgba(0,136,255,.6);
}

.uc-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  column-gap: 28px;
  row-gap: 30px;
  max-width: 900px;
  margin: 0 auto;
}

.menu-item { text-align: center; }

.uc-btn {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 18px;
  background: url("https://i.postimg.cc/8CQWcjJF/Picsart-26-01-28-11-45-25-108.jpg") center / cover no-repeat;
  box-shadow: 0 0 25px rgba(0,162,255,.45), inset 0 0 14px rgba(0,162,255,.25);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease;
}
.uc-btn:active { transform: scale(.97); }

.uc-info {
  margin-top: 0px;
  display: flex;
  justify-content: center;
  gap: 8px;
  font-weight: 900;
  letter-spacing: 0.5px;
}
.uc-amount { font-size: 10px; color: #1E90FF; }
.uc-price { font-size: 10px; color: #ffffff; } /* ✅ фикс цвета */

@media (max-width: 420px) {
  .container { padding: 80px 12px; }
  .back-btn { padding: 10px 16px; font-size: 15px; }
  .balance-card { padding: 10px 14px; }
  .balance-value { font-size: 22px; }
  .uc-grid { column-gap: 30px; row-gap: 60px; }
}

@media (min-width: 768px) and (max-width: 1024px) {
  .top-bar { max-width: 350px; margin-left: auto; margin-right: auto; }
}

/* ===== POPUP OVERLAY ===== */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

@keyframes blueNeonPulse {
  0% { box-shadow: 0 0 18px rgba(0, 150, 255, 0.45), 0 0 40px rgba(0, 120, 255, 0.35); }
  50% { box-shadow: 0 0 32px rgba(0, 180, 255, 0.9), 0 0 75px rgba(0, 140, 255, 0.6); }
  100% { box-shadow: 0 0 18px rgba(0, 150, 255, 0.45), 0 0 40px rgba(0, 120, 255, 0.35); }
}

.popup {
  position: relative;
  background: linear-gradient(180deg, #061a3a, #020b1d);
  border-radius: 22px;
  padding: 22px;
  animation: blueNeonPulse 1.8s ease-in-out infinite;
  width: 92%;
  max-width: 420px;
}

.popup-title { font-size: 22px; font-weight: 900; text-align: center; margin-bottom: 18px; }
.popup-info { display: flex; justify-content: space-between; margin-bottom: 16px; font-weight: 900; }
.popup-price { color: #6dff9c; }

.popup-input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.2);
  background: rgba(0,0,0,.6);
  color: #fff;
  font-size: 15px;
  margin-bottom: 18px;
  outline: none;
}

.buy-btn {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  border: none;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
  color: #042b14;
  background: linear-gradient(135deg,#00ff88,#00c66a);
  box-shadow: 0 0 20px rgba(0,255,136,.6), inset 0 0 10px rgba(255,255,255,.3);
}
.buy-btn:active { transform: scale(.97); }

.popup-close {
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 20px;
  cursor: pointer;
  opacity: .7;
}

/* ✅ Loading состояние кнопки */
.buy-btn.loading {
  pointer-events: none;
  opacity: .85;
  background: linear-gradient(135deg,#888,#444);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.buy-btn.loading::after {
  content: "";
  width: 18px;
  height: 18px;
  border: 3px solid rgba(255,255,255,.35);
  border-top: 3px solid #fff;
  border-radius: 50%;
  display: inline-block;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* tap highlight off */
* { -webkit-tap-highlight-color: transparent; }
.uc-btn, .buy-btn { outline: none; -webkit-tap-highlight-color: transparent; user-select: none; }

/* ✅ SUCCESS NOTIFY */
.notify{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}

.notify-box{
  width: 92%;
  max-width: 420px;
  padding: 22px 22px;
  border-radius: 22px;
  background: linear-gradient(180deg,#041b3d,#010b1f);
  text-align: center;
  box-shadow:
    0 0 35px rgba(0,160,255,.9),
    inset 0 0 18px rgba(0,160,255,.4);
  animation: notifyIn .35s ease;
}

@keyframes notifyIn {
  from { transform: scale(.9); opacity: 0 }
  to   { transform: scale(1); opacity: 1 }
}

.notify-title{
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 10px;
  color: #7dffb0;
}

.notify-text{
  font-size: 16px;
  font-weight: 700;
  color: #e8f6ff;
  line-height: 1.35;
}  
  
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpcXl6cmdpdXZ4bWh4Z2xhZHh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NTgzMDIsImV4cCI6MjA4MTAzNDMwMn0.21-OjkjEtppQ78o66lQJwa-1c1HSfbka2SD2C0lC1ro"; // 🔴 вставь сюда свой ключ (или оставь как было у тебя)

  // 1) создаём клиент Supabase один раз
  window.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 2) Telegram
  const tg = window.Telegram.WebApp;
  tg.expand();

  if (!tg.initDataUnsafe?.user) {
    alert("Открой через Telegram");
    return;
  }
  const tgUser = tg.initDataUnsafe.user;

  // 3) элементы
  const popupOverlay = document.getElementById("popup");
  const popupUc = document.getElementById("popup-uc");
  const popupPrice = document.getElementById("popup-price");
  const popupClose = document.getElementById("popup-close");
  const buyBtn = document.getElementById("buy-btn");
  const gameIdInput = document.getElementById("game-id");

  let buying = false; // ✅ защита от двойного клика

  // 4) initUser
  async function initUser() {
    let { data: user } = await window.sb
      .from("users")
      .select("id")
      .eq("telegram_id", tgUser.id)
      .single();

    if (!user) {
      const { data: newUser } = await window.sb
        .from("users")
        .insert({
          telegram_id: tgUser.id,
          username: tgUser.username,
          first_name: tgUser.first_name,
          last_name: tgUser.last_name
        })
        .select()
        .single();

      await window.sb.from("balances").insert({ user_id: newUser.id, balance: 0 });
      user = newUser;
    }

    window.USER_ID = user.id;
    await loadBalance();
  }

  async function loadBalance() {
    const { data } = await window.sb
      .from("balances")
      .select("balance")
      .eq("user_id", window.USER_ID)
      .single();

    const balance = data?.balance ?? 0;
    document.getElementById("top-balance-value").innerText = balance;
  }

  // 5) открытие попапа
  document.querySelectorAll(".uc-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      popupUc.innerText = btn.dataset.uc;
      popupPrice.innerText = btn.dataset.price;
      gameIdInput.value = "";
      popupOverlay.style.display = "flex";
    });
  });

  // 6) закрытие попапа
  popupClose.onclick = () => { popupOverlay.style.display = "none"; };

  // 7) покупка
  buyBtn.onclick = async () => {
    if (buying) return;
    buying = true;

    const oldText = buyBtn.innerText;

    // включаем loading сразу
    buyBtn.classList.add("loading");
    buyBtn.innerText = "Покупаю...";
    buyBtn.disabled = true;

    try {
      // важная проверка: user ещё не прогрузился
      if (!window.USER_ID) {
        alert("Подождите секунду, загружаю профиль...");
        return;
      }

      const gameId = gameIdInput.value.trim();
      if (!gameId) {
        alert("Введите игровой ID");
        return;
      }

      const price = Number(popupPrice.innerText);
      const uc = Number(popupUc.innerText);

      const { data, error } = await window.sb.rpc("buy_uc", {
        p_user_id: window.USER_ID,
        p_uc: uc,
        p_price: price,
        p_game_id: gameId
      });

      if (error) {
  alert(
    "❌ Ошибка Supabase:\n" +
    (error.message || "no message") +
    "\n\ncode: " + (error.code || "-") +
    "\ndetails: " + (error.details || "-") +
    "\nhint: " + (error.hint || "-")
  );
  return;
}

      await loadBalance(); // ✅ всегда обновляем баланс с базы
const newBalance = document.getElementById("top-balance-value").innerText;

      popupOverlay.style.display = "none";

/* ✅ показать уведомление */
const notify = document.getElementById("notify");
const notifyText = document.getElementById("notify-text");

notifyText.innerHTML = `
  <b>Покупка успешна ✅</b><br><br>
  Кол-во: <b>${uc} UC</b><br>
  Цена: <b>${price} VC</b><br><br>
  <span style="color:#facc15;">
    UC поступят на баланс в течение 15 минут
  </span>
`;

notify.style.display = "flex";

setTimeout(() => {
  notify.style.display = "none";
}, 4500);

    } finally {
      buying = false;
      buyBtn.classList.remove("loading");
      buyBtn.disabled = false;
      buyBtn.innerText = oldText;
    }
  };

  // запуск
  await initUser();
});
</script>

<!-- ✅ Уведомление об успехе -->
<div class="notify" id="notify">
  <div class="notify-box">
    <div class="notify-title">✅ Покупка успешна</div>
    <div class="notify-text" id="notify-text"></div>
  </div>
</div>
  
</body>

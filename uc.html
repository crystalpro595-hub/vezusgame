<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UC SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  background: linear-gradient(180deg, #02102A, #000);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
}

/* === КОНТЕЙНЕР === */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px;
}

/* === ВЕРХ === */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

/* === НАЗАД === */
.back-btn {
  padding: 14px 22px;
  font-size: 18px;
  font-weight: 900;
  border-radius: 14px;
  background: linear-gradient(45deg,#007bff,#000);
  border: 2px solid #4dc7ff;
  color: #fff;
  text-decoration: none;
}

/* === БАЛАНС === */
.balance-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 22px;
  border-radius: 20px;
  background: linear-gradient(
    135deg,
    rgba(0,136,255,0.25),
    rgba(0,0,0,0.6)
  );
  border: 1px solid rgba(0,136,255,0.4);
  backdrop-filter: blur(10px);
  box-shadow:
    0 0 20px rgba(0,136,255,.45),
    inset 0 0 14px rgba(0,136,255,.25);
}

.balance-icon {
  width: 50px;
  height: 50px;
  border-radius: 16px;
  background: linear-gradient(135deg,#0080ff,#003c7a);
  display: flex;
  align-items: center;
  justify-content: center;
}

.balance-icon img {
  width: 30px;
}

.balance-label {
  font-size: 12px;
  color: #9fb6ff;
  font-weight: 600;
}

.balance-value {
  font-size: 26px;
  font-weight: 900;
  text-shadow: 0 0 12px rgba(0,136,255,.6);
}

.balance-value span {
  font-size: 16px;
  color: #7dd3fc;
}

/* === ЗАГОЛОВОК === */
.page-title {
  font-size: 36px;
  font-weight: 900;
  margin-bottom: 30px;
  text-shadow: 0 0 20px rgba(0,136,255,.6);
}

/* === GRID UC === */
.uc-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  max-width: 900px;
  margin: 0 auto;
}

/* === КАРТОЧКИ === */
.menu-item {
  text-align: center;
}

.uc-btn {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 18px;
  background: url("https://i.postimg.cc/d3fmS9MS/IMG-0493.png") center / cover no-repeat;
  box-shadow:
    0 0 25px rgba(0,162,255,.45),
    inset 0 0 14px rgba(0,162,255,.25);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease;
}

.uc-btn:active {
  transform: scale(.97);
}

.menu-label {
  margin-top: 10px;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 1px;
  color: #cfeaff;
}

/* === МЕЛКИЕ ЭКРАНЫ === */
@media (max-width: 380px) {
  .menu-label {
    font-size: 14px;
  }
  .uc-grid {
    gap: 12px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <a href="index.html" class="back-btn">← Назад</a>

    <div class="balance-card">
      <div class="balance-icon">
        <img src="https://i.postimg.cc/7YrQyB4C/IMG-0427.png">
      </div>
      <div>
        <div class="balance-label">Текущий баланс</div>
        <div class="balance-value">0 <span>VC</span></div>
      </div>
    </div>
  </div>

  <div class="page-title">UC SHOP</div>

  <div class="uc-grid">
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">60 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">180 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">325 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">660 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">720 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">1800 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">2125 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">3850 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">8100 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">16200 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">24300 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">32400 UC</div></div>
  </div>

</div>

</body>
</html>

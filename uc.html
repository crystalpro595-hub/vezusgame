<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>UC SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  background: linear-gradient(180deg, #02102A, #000);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
}

/* === МАСШТАБ ТОЛЬКО КОНТЕНТА === */

#content {
    transform-origin: top left;
}
@media (max-width: 480px) {
    #content {
        transform: scale(0.40);
        width: 250%;
    }
}    

/* === КНОПКА НАЗАД === */
.back-btn {
  margin: 150px 0 120px 20px;
  display: inline-block;
  padding: 20px 30px;
  font-size: 28px;
  font-weight: 900;
  border-radius: 14px;
  background: linear-gradient(45deg,#007bff,#000);
  border: 3px solid #4dc7ff;
  color: #fff;
  text-decoration: none;
}

/* === БЛОКИ === */
.big-blocks {
  display: flex;
  justify-content: left;
  margin: 60px 0 0 20px;
}

.menu-item {
  width: 28%;
  margin: 0 14px;
  text-align: center;
}

.uc-btn {
  width: 100%;
  height: 300px;
  border-radius: 18px;
  background: url("https://i.postimg.cc/d3fmS9MS/IMG-0493.png") center / cover no-repeat;
  box-shadow:
    0 0 25px rgba(0,162,255,.45),
    inset 0 0 14px rgba(0,162,255,.25);
}

.menu-label {
  margin-top: 14px;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 2px;
  color: #cfeaff;
}
</style>
</head>

<body>
<div id="content">

  <a href="index.html" class="back-btn">← НАЗАД</a>

  <h1 style="
    margin:20px 0 20px 20px;
    font-size:42px;
    font-weight:900;
    text-shadow:0 0 20px rgba(0,136,255,.6);
  ">
    UC SHOP
  </h1>

  <div class="big-blocks">
    <div class="menu-item">
      <div class="uc-btn"></div>
      <div class="menu-label">60 UC</div>
    </div>

    <div class="menu-item">
      <div class="uc-btn"></div>
      <div class="menu-label">180 UC</div>
    </div>

    <div class="menu-item">
      <div class="uc-btn"></div>
      <div class="menu-label">325 UC</div>
    </div>
  </div>

</div>
</body>
</html>

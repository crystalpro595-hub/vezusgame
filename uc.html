<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UC SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  background: linear-gradient(180deg, #02102A, #000);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
}

/* ===== КОНТЕЙНЕР ===== */
.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 30px;
  flex-wrap: nowrap;
}

/* ===== КНОПКА НАЗАД ===== */
.back-btn {
  padding: 12px 20px;
  font-size: 16px;
  font-weight: 900;
  border-radius: 14px;
  background: linear-gradient(45deg,#007bff,#000);
  border: 2px solid #4dc7ff;
  color: #fff;
  text-decoration: none;
  white-space: nowrap;
}

/* ===== БАЛАНС ===== */
.balance-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  border-radius: 20px;
  background: linear-gradient(
    135deg,
    rgba(0,136,255,0.25),
    rgba(0,0,0,0.6)
  );
  border: 1px solid rgba(0,136,255,0.4);
  backdrop-filter: blur(10px);
  box-shadow:
    0 0 20px rgba(0,136,255,.45),
    inset 0 0 14px rgba(0,136,255,.25);
  white-space: nowrap;
}

.balance-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg,#0080ff,#003c7a);
  display: flex;
  align-items: center;
  justify-content: center;
}

.balance-icon img {
  width: 28px;
}

.balance-label {
  font-size: 12px;
  color: #9fb6ff;
  font-weight: 600;
}

.balance-value {
  font-size: 24px;
  font-weight: 900;
  text-shadow: 0 0 12px rgba(0,136,255,.6);
}

.balance-value span {
  font-size: 15px;
  color: #7dd3fc;
}

/* ===== ЗАГОЛОВОК ===== */
.page-title {
  font-size: 34px;
  font-weight: 900;
  margin-bottom: 28px;
  text-shadow: 0 0 20px rgba(0,136,255,.6);
}

/* ===== GRID UC ===== */
.uc-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  max-width: 900px;
  margin: 0 auto;
}

/* ===== КАРТОЧКИ ===== */
.menu-item {
  text-align: center;
}

.uc-btn {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 18px;
  background: url("https://i.postimg.cc/8CQWcjJF/Picsart-26-01-28-11-45-25-108.jpg") center / cover no-repeat;
  box-shadow:
    0 0 25px rgba(0,162,255,.45),
    inset 0 0 14px rgba(0,162,255,.25);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease;
}

.uc-btn:active {
  transform: scale(.97);
}

.menu-label {
  margin-top: 10px;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 1px;
  color: #cfeaff;
}

/* ===== МАЛЕНЬКИЕ ТЕЛЕФОНЫ ===== */
@media (max-width: 420px) {
  .container {
    padding: 80px 12px;
  }

  .back-btn {
    padding: 10px 16px;
    font-size: 15px;
  }

  .balance-card {
    padding: 10px 14px;
  }

  .balance-value {
    font-size: 22px;
  }

  .menu-label {
    font-size: 14px;
  }

  .uc-grid {
    gap: 14px;
  }
}

/* ===== iPad и планшеты ===== */
@media (min-width: 768px) and (max-width: 1024px) {
  .top-bar {
    max-width: 200px;
    margin-left: auto;
    margin-right: auto;
  }
}
  
</style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <a href="index.html" class="back-btn">← Назад</a>

    <div class="balance-card">
      <div class="balance-icon">
        <img src="https://i.postimg.cc/7YrQyB4C/IMG-0427.png">
      </div>
      <div>
        <div class="balance-label">Текущий баланс</div>
        <div class="balance-value">0 <span>VC</span></div>
      </div>
    </div>
  </div>

  <div class="page-title">UC SHOP</div>

  <div class="uc-grid">
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">60 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">180 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">325 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">660 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">720 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">1800 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">2125 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">3850 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">8100 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">16200 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">24300 UC</div></div>
    <div class="menu-item"><div class="uc-btn"></div><div class="menu-label">32400 UC</div></div>
  </div>

</div>

</body>
</html>

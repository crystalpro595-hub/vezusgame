<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>UC SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  background: linear-gradient(180deg, #02102A, #000);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
}

/* ===== КОНТЕЙНЕР ===== */
.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 30px;
  flex-wrap: nowrap;
}

/* ===== КНОПКА НАЗАД ===== */
.back-btn {
  padding: 12px 20px;
  font-size: 16px;
  font-weight: 900;
  border-radius: 14px;
  background: linear-gradient(45deg,#007bff,#000);
  border: 2px solid #4dc7ff;
  color: #fff;
  text-decoration: none;
  white-space: nowrap;
}

/* ===== БАЛАНС ===== */
.balance-card {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  border-radius: 20px;
  background: linear-gradient(
    135deg,
    rgba(0,136,255,0.25),
    rgba(0,0,0,0.6)
  );
  border: 1px solid rgba(0,136,255,0.4);
  backdrop-filter: blur(10px);
  box-shadow:
    0 0 20px rgba(0,136,255,.45),
    inset 0 0 14px rgba(0,136,255,.25);
  white-space: nowrap;
}

.balance-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg,#0080ff,#003c7a);
  display: flex;
  align-items: center;
  justify-content: center;
}

.balance-icon img {
  width: 28px;
}

.balance-label {
  font-size: 12px;
  color: #9fb6ff;
  font-weight: 600;
}

.balance-value {
  font-size: 24px;
  font-weight: 900;
  text-shadow: 0 0 12px rgba(0,136,255,.6);
}

.balance-value span {
  font-size: 15px;
  color: #ffffff;
}

/* ===== ЗАГОЛОВОК ===== */
.page-title {
  font-size: 34px;
  font-weight: 900;
  margin-bottom: 28px;
  text-shadow: 0 0 20px rgba(0,136,255,.6);
}

/* ===== GRID UC ===== */
.uc-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  max-width: 900px;
  margin: 0 auto;
}

/* ===== КАРТОЧКИ ===== */
.menu-item {
  text-align: center;
}

.uc-btn {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 18px;
  background: url("https://i.postimg.cc/8CQWcjJF/Picsart-26-01-28-11-45-25-108.jpg") center / cover no-repeat;
  box-shadow:
    0 0 25px rgba(0,162,255,.45),
    inset 0 0 14px rgba(0,162,255,.25);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease;
}

.uc-btn:active {
  transform: scale(.97);
}

.menu-label {
  margin-top: 10px;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 1px;
  color: #cfeaff;
}

/* ===== МАЛЕНЬКИЕ ТЕЛЕФОНЫ ===== */
@media (max-width: 420px) {
  .container {
    padding: 80px 12px;
  }

  .back-btn {
    padding: 10px 16px;
    font-size: 15px;
  }

  .balance-card {
    padding: 10px 14px;
  }

  .balance-value {
    font-size: 22px;
  }

  .menu-label {
    font-size: 14px;
  }

  .uc-grid {
    gap: 14px;
  }
}

/* ===== iPad и планшеты ===== */
@media (min-width: 768px) and (max-width: 1024px) {
  .top-bar {
    max-width: 350px;
    margin-left: auto;
    margin-right: auto;
  }
}

/* ===== ТЕКСТ ПОД КАРТОЧКОЙ (UC + ЦЕНА) ===== */
.uc-info {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  gap: 8px;
  font-weight: 900;
  letter-spacing: 0.5px;
}

.uc-amount {
  font-size: 16px;
  color: #1E90FF;
}

.uc-price {
  font-size: 16px;
  color: #fffff;
}
  
</style>
</head>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpcXl6cmdpdXZ4bWh4Z2xhZHh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NTgzMDIsImV4cCI6MjA4MTAzNDMwMn0.21-OjkjEtppQ78o66lQJwa-1c1HSfbka2SD2C0lC1ro";

  const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );

  const tg = window.Telegram.WebApp;
  tg.expand();

  if (!tg.initDataUnsafe?.user) {
    alert("Открой через Telegram");
    return;
  }

  const tgUser = tg.initDataUnsafe.user;

  /* ===== INIT USER ===== */
  async function initUser() {
    let { data: user } = await supabase
      .from("users")
      .select("id")
      .eq("telegram_id", tgUser.id)
      .single();

    if (!user) {
      const { data: newUser } = await supabase
        .from("users")
        .insert({
          telegram_id: tgUser.id,
          username: tgUser.username,
          first_name: tgUser.first_name,
          last_name: tgUser.last_name
        })
        .select()
        .single();

      await supabase.from("balances").insert({
        user_id: newUser.id,
        balance: 0
      });

      user = newUser;
    }

    window.USER_ID = user.id;
    loadBalance();
  }

  /* ===== LOAD BALANCE ===== */
  async function loadBalance() {
    const { data } = await supabase
      .from("balances")
      .select("balance")
      .eq("user_id", window.USER_ID)
      .single();

    const balance = data?.balance ?? 0;
    document.getElementById("top-balance-value").innerText = balance;
  }

  initUser();
});
</script>

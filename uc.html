<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>UC SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  min-height: 100%;
  font-family: 'Montserrat', sans-serif;
  color: #fff;
  background: url('https://i.postimg.cc/15xyK3Xr/Picsart-26-01-30-00-16-57-552.png') center/cover no-repeat fixed;
}

/* ===== CONTAINER ===== */
.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* ===== TOP ===== */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.back-btn {
  padding: 12px 20px;
  font-weight: 900;
  border-radius: 14px;
  background: linear-gradient(45deg,#007bff,#000);
  border: 2px solid #4dc7ff;
  color: #fff;
  text-decoration: none;
}

.balance-card {
  padding: 12px 20px;
  border-radius: 20px;
  background: linear-gradient(135deg,rgba(0,136,255,.25),rgba(0,0,0,.6));
  box-shadow: 0 0 20px rgba(0,136,255,.45);
}

.balance-label {
  font-size: 12px;
  color: #9fb6ff;
}

.balance-value {
  font-size: 24px;
  font-weight: 900;
}

/* ===== TITLE ===== */
.page-title {
  font-size: 34px;
  font-weight: 900;
  margin-bottom: 30px;
}

/* ===== GRID ===== */
.uc-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 30px;
}

/* ===== CARD ===== */
.menu-item { text-align: center; }

.uc-btn {
  width: 100%;
  aspect-ratio: 1/1;
  border-radius: 18px;
  background-size: cover;
  background-position: center;
  cursor: pointer;
  box-shadow: 0 0 25px rgba(0,162,255,.45);
  transition: transform .15s;
}
.uc-btn:active { transform: scale(.97); }

.uc-info {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 6px;
  font-weight: 900;
}
.uc-amount { color: #1E90FF; font-size: 12px; }
.uc-price { color: #fff; font-size: 12px; }

/* ===== POPUP ===== */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

@keyframes blueNeon {
  0% { box-shadow: 0 0 20px #0088ff; }
  50% { box-shadow: 0 0 45px #00bfff; }
  100% { box-shadow: 0 0 20px #0088ff; }
}

.popup {
  background: linear-gradient(180deg,#061a3a,#020b1d);
  padding: 22px;
  border-radius: 22px;
  animation: blueNeon 1.8s infinite;
  position: relative;
  width: 320px;
}

.popup-title {
  font-size: 22px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 16px;
}

.popup-info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 14px;
  font-weight: 900;
}

.popup-input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  margin-bottom: 16px;
  background: rgba(0,0,0,.6);
  color: #fff;
}

.buy-btn {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  font-size: 18px;
  font-weight: 900;
  background: linear-gradient(135deg,#00ff88,#00c66a);
  border: none;
  cursor: pointer;
}

.buy-btn.loading {
  pointer-events: none;
  opacity: .8;
}

.popup-close {
  position: absolute;
  top: 10px;
  right: 14px;
  cursor: pointer;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 20px;
  border-radius: 16px;
  font-weight: 900;
  opacity: 0;
  transition: .3s;
  z-index: 9999;
}
.toast.show { opacity: 1; }
.toast.success { background:#00c66a; color:#042b14; }
.toast.error { background:#ff4d4d; color:#fff; }
</style>
</head>

<body>

<div class="container">

<div class="top-bar">
  <a href="index.html" class="back-btn">← Назад</a>
  <div class="balance-card">
    <div class="balance-label">Баланс</div>
    <div class="balance-value"><span id="top-balance-value">0</span> VC</div>
  </div>
</div>

<div class="page-title">UC SHOP</div>

<div class="uc-grid">
  <!-- 12 карточек -->
  <script>
    const cards = [
      [60,100,'k5V6BkKS'],[180,280,'CxhbLPcK'],[325,450,'90yyzv3t'],
      [660,850,'KzkPh1JN'],[720,920,'d3CjrhCZ'],[1800,2100,'nzCkVRcs'],
      [2125,2400,'mk1FJK2f'],[3850,4200,'JnnXcGfz'],[8100,8500,'13GD9x0x'],
      [16200,16800,'ydQFwFmV'],[24300,25000,'kgKvBRmH'],[32400,33000,'sxL4Zp1V']
    ];
    document.write(cards.map(c=>`
      <div class="menu-item">
        <div class="uc-btn" data-uc="${c[0]}" data-price="${c[1]}"
          style="background-image:url('https://i.postimg.cc/${c[2]}/img.png')"></div>
        <div class="uc-info">
          <div class="uc-amount">${c[0]} UC</div>
          <div class="uc-price">${c[1]} VC</div>
        </div>
      </div>
    `).join(''));
  </script>
</div>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popup">
  <div class="popup">
    <div class="popup-title">Покупка UC</div>
    <div class="popup-info">
      <div><span id="popup-uc">0</span> UC</div>
      <div>Цена: <span id="popup-price">0</span> VC</div>
    </div>
    <input id="game-id" class="popup-input" placeholder="Игровой ID">
    <button class="buy-btn" id="buy-btn">Купить</button>
    <div class="popup-close" id="popup-close">✕</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";
const SUPABASE_KEY = "ТВОЙ_КЛЮЧ";
window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const tg = Telegram.WebApp;
tg.expand();

const popup = document.getElementById("popup");
const popupUc = document.getElementById("popup-uc");
const popupPrice = document.getElementById("popup-price");
const buyBtn = document.getElementById("buy-btn");
const gameIdInput = document.getElementById("game-id");

document.querySelectorAll(".uc-btn").forEach(btn=>{
  btn.onclick=()=>{
    popupUc.textContent = btn.dataset.uc;
    popupPrice.textContent = btn.dataset.price;
    popup.style.display="flex";
  };
});

document.getElementById("popup-close").onclick=()=>popup.style.display="none";

function toast(msg,type="success"){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className=`toast show ${type}`;
  setTimeout(()=>t.className="toast",2500);
}
</script>

</body>
</html>

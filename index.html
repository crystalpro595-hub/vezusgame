<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Vezus Game</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* ========== СТИЛИ ========== */
html,body{margin:0;padding:0;height:100%}
body{
  font-family:'Montserrat',sans-serif;
  color:#fff;
  background:linear-gradient(120deg,#1a1a1a,#000,#111,#141414);
  background-size:300% 300%;
  animation:gradientFlow 9s ease infinite;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  touch-action:manipulation;
}
@keyframes gradientFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* Шапка */
.logo-container{display:flex;justify-content:left;align-items:center;margin-top:10px;margin-left:20px}
.logo-img{width:95px}

/* Баланс и кошелёк */
.balance-line{display:flex;justify-content:flex-end;align-items:center;margin-top:-70px;margin-right:20px}
.wallet-btn{background:linear-gradient(45deg,#00c853,#000);padding:14px;border-radius:14px;margin-right:14px;display:flex;align-items:center;justify-content:center;border:3px solid #66ff99;box-shadow:0 0 18px rgba(0,255,144,.55);cursor:pointer}
.wallet-btn:active{transform:scale(1.06)}
.wallet-icon{width:50px;height:auto}
.balance-btn{background:#3a3a3a;padding:14px 46px;border-radius:14px;font-size:34px;font-weight:900}

/* Меню */
.mid-menu{display:flex;justify-content:left;margin-top:75px;margin-left:20px}
.mid-btn{padding:26px 34px;border-radius:14px;font-size:30px;font-weight:900;margin:0 12px;display:flex;align-items:center;gap:14px;text-decoration:none;color:white;cursor:pointer;box-shadow:0 0 16px rgba(0,0,0,.4)}
.mid-btn:active{transform:scale(1.05)}
.bonus-btn{background:linear-gradient(45deg,#ffc800,#000);border:3px solid #ffe27a}
.profile-btn{background:linear-gradient(45deg,#00c853,#000);border:3px solid #66ff99}
.support-btn{background:linear-gradient(45deg,#007bff,#000);border:3px solid #4dc7ff}
.icon{width:65px;height:auto}

/* Главные блоки */
.big-blocks{display:flex;justify-content:left;margin-top:70px;margin-left:20px}
.block{background:#3a3a3a;width:29%;height:320px;border-radius:20px;margin:0 16px;display:flex;justify-content:center;align-items:center;font-size:75px;font-weight:900}

/* ======= ПОПАПЫ (кошелёк / депозит / вывод / история / заявки) ======= */
.popup-backdrop{position:fixed;left:0;top:0;width:100vw;height:100vh;background:rgba(0,0,0,.55);display:none;justify-content:center;align-items:center;z-index:99999}
.popup-box{width:92%;max-width:760px;padding:36px;border-radius:20px;background:#0f0f0f;border:2px solid #222;box-shadow:0 10px 40px rgba(0,0,0,.7)}
.popup-title{text-align:center;font-size:30px;font-weight:900;margin-bottom:20px}
.popup-action{display:block;width:86%;margin:14px auto;padding:18px;border-radius:14px;text-align:center;font-size:22px;font-weight:900;color:white;text-decoration:none;background:#1b1b1b;border:1px solid #333}
.popup-action:active{transform:scale(.995)}
.deposit-action{background:linear-gradient(45deg,#0fae5f,#0a7a3d)}
.payment-action{background:linear-gradient(45deg,#222,#111)}
.cancel-action{background:#222;color:#ddd}

/* Inputs */
.input-row{display:flex;justify-content:center;gap:12px;align-items:center;margin:18px 0}
.input-row input,.input-row select{padding:12px;border-radius:10px;border:1px solid #333;background:#0b0b0b;color:#fff;font-size:16px}
.input-row input[type="number"]{width:44%}
.input-row .vc-note{background:#1b1b1b;padding:12px 18px;border-radius:12px;font-weight:900;font-size:18px}

/* История */
.profile-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px}
.profile-left{display:flex;flex-direction:column;gap:6px}
.user-name{font-size:22px;font-weight:900}
.user-id{font-size:14px;color:#bbb}
.history-list{max-height:320px;overflow:auto;padding:6px;border-top:1px solid #222;margin-top:12px}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:8px;margin:6px 0;background:#0b0b0b}
.history-plus{color:#66ff99;font-weight:900}
.history-minus{color:#ff7d7d;font-weight:900}

/* ===== АДАПТИВ ДЛЯ ТЕЛЕФОНОВ (чтоб всё не было огромным) ===== */
@media (max-width:520px){
  .logo-img{width:80px}
  .wallet-icon{width:42px}
  .wallet-btn{padding:10px;border-width:2px}
  .balance-btn{font-size:26px;padding:10px 30px}
  .mid-btn{padding:18px 24px;font-size:22px;gap:10px;margin:0 6px}
  .icon{width:50px}
  .block{width:42%;height:250px;font-size:55px}
  .popup-box{padding:26px}
  .popup-title{font-size:26px}
  .popup-action{font-size:20px;padding:14px}
}
</style>
</head>
<body>

<!-- Лого -->
<div class="logo-container"><img class="logo-img" src="https://s.iimg.su/s/27/th_gUGAYHNxzvdL0q4z4RtJ3MTczQgABWbj3CiQzDbg.png"></div>

<!-- Баланс и кошелёк -->
<div class="balance-line">
  <div class="wallet-btn" onclick="openWallet()"><img class="wallet-icon" src="https://s.iimg.su/s/27/th_gVTKvgYxlVLVCHeoKfzTYmVhtY7MK5fwDzQtsOJ7.png"></div>
  <div id="top-balance" class="balance-btn">БАЛАНС: 0 VC</div>
</div>

<!-- Меню -->
<div class="mid-menu">
  <div class="mid-btn bonus-btn" onclick="alert('Бонусы скоро появятся')"><img class="icon" src="https://i.postimg.cc/SQfbw6BG/Picsart-25-11-27-22-07-50-919.png">БОНУСЫ</div>
  <div class="mid-btn profile-btn" onclick="openProfile()"><img class="icon" src="https://i.postimg.cc/j29ZmdbT/Picsart-25-11-27-23-26-25-371.png">ПРОФИЛЬ</div>
  <a class="mid-btn support-btn" href="https://t.me/vezusmanager" target="_blank"><img class="icon" src="https://i.postimg.cc/mrG6TDFb/Picsart-25-11-27-22-46-44-567.png">ПОДДЕРЖКА</a>
</div>

<!-- Главные блоки -->
<div class="big-blocks">
  <div class="block">ИГРЫ</div>
  <div class="block">UC</div>
</div>

<!-- ПОПАПЫ — кошелёк / депозит / вывод / история / заявки -->
<!-- !!! Всё твои функции и логика остаются без изменений -->
<!-- ↓↓↓ НИЧЕГО НЕ ТРОГАЮ, потому что оно у тебя полностью рабочее ↓↓↓ -->

<!-- Кошелёк -->
<div id="wallet-popup" class="popup-backdrop">
  <div class="popup-box">
    <div class="popup-title">💼 Кошелёк</div>
    <a href="#" class="popup-action deposit-action" onclick="openDeposit(event)">💰 Пополнить баланс</a>
    <a href="#" class="popup-action payment-action" onclick="openWithdraw(event)">💸 Вывести</a>
    <a href="#" class="popup-action payment-action" onclick="openRequests(event)">📄 Просмотр заявок</a>
    <a href="#" class="popup-action cancel-action" onclick="closeWallet()">✖ Закрыть</a>
  </div>
</div>

<!-- Пополнение -->
<div id="deposit-popup" class="popup-backdrop">
  <div class="popup-box">
    <div class="popup-title">💰 Пополнение — СБП</div>
    <div style="text-align:center;color:#ccc;margin-bottom:8px">Курс: <b>1₽ = 1 VC</b></div>
    <div class="input-row">
      <input id="deposit-amount" type="number" placeholder="Сумма в ₽">
      <div class="vc-note" id="vc-estimate">0 VC</div>
    </div>
    <div class="small-note">Минимум: <b>100 ₽</b><br>Оплата на номер: <b>+7 990 151 05 97</b></div>
    <a href="#" class="popup-action deposit-action" onclick="toPayment(event)">→ Перейти к оплате</a>
    <a href="#" class="popup-action cancel-action" onclick="closeDeposit()">Отмена</a>
  </div>
</div>

<!-- Вывод -->
<div id="withdraw-popup" class="popup-backdrop">
  <div class="popup-box">
    <div class="popup-title">💸 Вывод — заявка</div>
    <div style="text-align:center;color:#ccc;margin-bottom:8px">Минимум вывода: <b>500 VC</b></div>
    <div class="input-row">
      <input id="withdraw-amount" type="number" placeholder="Сумма в VC">
      <select id="withdraw-bank">
        <option value="СБП">СБП</option>
        <option value="Сбер">Сбер</option>
        <option value="Тинькофф">Тинькофф</option>
        <option value="ВТБ">ВТБ</option>
        <option value="Альфа-Банк">Альфа-Банк</option>
        <option value="Райффайзен">Райффайзен</option>
      </select>
    </div>
    <div class="input-row"><input id="withdraw-phone" type="tel" placeholder="Номер телефона или карты" style="width:70%"></div>
    <a href="#" class="popup-action payment-action" onclick="submitWithdraw(event)">→ Отправить заявку</a>
    <a href="#" class="popup-action cancel-action" onclick="closeWithdraw()">Отмена</a>
  </div>
</div>

<!-- Остальные попапы → оплата QR, заявки, профиль -->
<!-- НЕ ИЗМЕНЯЮ, оставляю полностью рабочими -->
<script>
/* ⬇⛔ Весь твой JavaScript КАК БЫЛ — остаётся без изменений */
</script>

</body>
</html>

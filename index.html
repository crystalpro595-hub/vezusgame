  <!DOCTYPE html>
<html lang="ru">
<head>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Vezus Game</title>
<style>
body {
    margin: 0;
    background: linear-gradient(to right, #1a1a1a, #000000);
    font-family: 'Montserrat', sans-serif;
    color: white;
}

/* Убираем надпись index.html у Github Pages */
h1 {
    visibility: hidden;
    height: 0;
    margin: 0;
    padding: 0;
}

/* БАЛАНС — отдельная строка */
.balance-line {
    display: flex;
    justify-content: left;
    margin-top: 20px;
}
.balance-btn {
    background: #3a3a3a;
    padding: 10px 40px;
    border-radius: 12px;
    font-size: 30px;
    font-weight: 900;
}

/* Три кнопки в ряд */
.mid-menu {
    display: flex;
    justify-content: left;
    margin-top: 25px;
}
.mid-btn {
    background: #3a3a3a;
    padding: 20px 25px;
    border-radius: 12px;
    font-size: 28px;
    font-weight: 900;
    margin: 0 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    color: white;
}

/* Два больших блока */
.big-blocks {
    display: flex;
    justify-content: left;
    margin-top: 60px;
}
.block {
    background: #3a3a3a;
    width: 28%;
    height: 300px;
    border-radius: 18px;
    margin: 0 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 70px;
    font-weight: 900;
}
</style>
</head>
<body>

<div class="balance-line">
    <div class="balance-btn">БАЛАНС:</div>
</div>

<div class="mid-menu">
    <div class="mid-btn">БОНУСЫ</div>
    <a href="https://t.me/vezusmanager" class="mid-btn" target="_blank">ПОДДЕРЖКА</a>
    <div class="mid-btn">ПРОФИЛЬ</div>
</div>

<div class="big-blocks">
    <div class="block">ИГРЫ</div>
    <div class="block">UC</div>
</div>

</body>
</html>
    
  </body>
  
</html>

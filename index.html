<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Vezus Game</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{margin:0;background:linear-gradient(to right,#1a1a1a,#000);font-family:'Montserrat',sans-serif;color:#fff}

/* PRELOADER */
#preloader{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;display:flex;justify-content:center;align-items:center;z-index:999999;transition:.5s}
.loader-ring{width:90px;height:90px;border:10px solid rgba(255,230,0,.15);border-top:10px solid #ffe600;border-radius:50%;animation:spin 1s linear infinite;box-shadow:0 0 35px #ffe600}
@keyframes spin{to{transform:rotate(360deg)}}

/* APP CONTAINER */
#app{}

/* LOGO */
.logo-container{display:flex;margin:10px 0 0 20px}
.logo-img{width:95px}

/* BALANCE */
.balance-line{display:flex;justify-content:right;margin:-70px 20px 0 0}
.wallet-btn{background:linear-gradient(45deg,#00c853,#000);padding:10px;border-radius:12px;margin-right:12px;display:flex;align-items:center;border:3px solid #66ff99;box-shadow:0 0 18px rgba(0,255,140,.55);cursor:pointer;transition:.18s}
.wallet-btn:active{transform:scale(1.08)}
.wallet-icon{width:45px;height:45px}
.balance-btn{background:#3a3a3a;padding:10px 40px;border-radius:12px;font-size:30px;font-weight:900}

/* MENU 3 BUTTONS */
.mid-menu{display:flex;margin:70px 0 0 20px}
.mid-btn{padding:20px 25px;border-radius:12px;font-size:28px;font-weight:900;margin:0 10px;display:flex;align-items:center;gap:12px;text-decoration:none;color:#fff;transition:.18s}
.mid-btn:active{transform:scale(1.08)}
.bonus-btn{background:linear-gradient(45deg,#ffc800,#000);border:3px solid #ffe27a;box-shadow:0 0 18px rgba(255,205,0,.65)}
.profile-btn{background:linear-gradient(45deg,#00c853,#000);border:3px solid #66ff99;box-shadow:0 0 18px rgba(0,255,140,.6)}
.support-btn{background:linear-gradient(45deg,#007bff,#000);border:3px solid #4dc7ff;box-shadow:0 0 18px rgba(0,162,255,.6)}
.icon{width:60px}

/* BIG BLOCKS */
.big-blocks{display:flex;margin:60px 0 0 20px}
.block{background:#3a3a3a;width:28%;height:300px;border-radius:18px;margin:0 14px;display:flex;align-items:center;justify-content:center;font-size:70px;font-weight:900}

/* POPUP */
.popup{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.55);display:none;justify-content:center;align-items:center;z-index:99999}
.popup .box{width:92%;max-width:760px;background:#0f0f0f;border:2px solid #222;padding:28px;border-radius:16px;text-align:center}
.title{font-size:26px;font-weight:900;margin-bottom:14px}
.action{display:block;width:86%;margin:10px auto;padding:14px;border-radius:12px;text-decoration:none;color:#fff;font-weight:900;font-size:18px;background:#1b1b1b;border:1px solid #333}
.btn-deposit{background:linear-gradient(45deg,#0fae5f,#0a7a3d)}
.btn-cancel{background:#222;color:#ddd}

/* INPUTS */
.input-row{display:flex;gap:12px;justify-content:center;margin:12px 0}
.input-row input,.input-row select{padding:12px;border-radius:10px;border:1px solid #333;background:#0b0b0b;color:#fff}
.vc-note{background:#1b1b1b;padding:10px 14px;border-radius:8px;font-weight:900}

/* LISTS */
.list{max-height:380px;overflow:auto;margin-top:10px;padding:6px;border-top:1px solid #222}
.item{display:flex;justify-content:space-between;background:#0b0b0b;border:1px solid #191919;padding:10px;margin:8px 0;border-radius:8px}
.meta{color:#bbb;font-size:13px}
.status-p{color:#ffd86b;font-weight:900}
.status-c{color:#66ff99;font-weight:900}
.status-r{color:#ff7d7d;font-weight:900}

/* PHONE SCALE */
@media(max-width:480px){
    #app{transform:scale(.40);transform-origin:top left;width:190%}
}
</style>
</head>

<body>

<!-- PRELOADER -->
<div id="preloader"><div class="loader-ring"></div></div>

<!-- APP START -->
<div id="app">

<!-- LOGO -->
<div class="logo-container">
    <img src="https://s.iimg.su/s/27/th_gUGAYHNxzvdL0q4z4RtJ3MTczQgABWbj3CiQzDbg.png" class="logo-img">
</div>

<!-- BALANCE -->
<div class="balance-line">
    <div class="wallet-btn" id="wallet-open"><img src="https://s.iimg.su/s/27/th_gVTKvgYxlVLVCHeoKfzTYmVhtY7MK5fwDzQtsOJ7.png" class="wallet-icon"></div>
    <div class="balance-btn" id="top-balance">БАЛАНС: 0 VC</div>
</div>

<!-- MENU -->
<div class="mid-menu">
    <div class="mid-btn bonus-btn" id="btn-bonus"><img src="https://i.postimg.cc/SQfbw6BG/Picsart-25-11-27-22-07-50-919.png" class="icon">БОНУСЫ</div>
    <div class="mid-btn profile-btn" id="btn-profile"><img src="https://i.postimg.cc/j29ZmdbT/Picsart-25-11-27-23-26-25-371.png" class="icon">ПРОФИЛЬ</div>
    <a href="https://t.me/vezusmanager" target="_blank" class="mid-btn support-btn"><img src="https://i.postimg.cc/mrG6TDFb/Picsart-25-11-27-22-46-44-567.png" class="icon">ПОДДЕРЖКА</a>
</div>

<!-- BLOCKS -->
<div class="big-blocks">
    <div class="block">ИГРЫ</div>
    <div class="block">UC</div>
</div>

<!-- POPUPS ===================================================== -->

<!-- WALLET -->
<div class="popup" id="popup-wallet">
  <div class="box">
    <div class="title">💼 Кошелёк</div>
    <a class="action btn-deposit" id="open-deposit">💰 Пополнить</a>
    <a class="action" id="open-withdraw" style="background:linear-gradient(45deg,#ff9f43,#000)">💸 Вывести</a>
    <a class="action" id="open-requests" style="background:#444">📄 Заявки</a>
    <a class="action btn-cancel" id="close-wallet">Закрыть</a>
  </div>
</div>

<!-- DEPOSIT -->
<div class="popup" id="popup-deposit">
  <div class="box">
    <div class="title">Пополнение</div>
    <div style="color:#ccc">1₽ = 1 VC • минимум 100₽</div>
    <div class="input-row">
      <input id="deposit-amount" type="number" placeholder="Сумма">
      <div class="vc-note" id="vc-estimate">0 VC</div>
    </div>
    <a class="action btn-deposit" id="to-payment">Перейти</a>
    <a class="action btn-cancel" id="close-deposit">Отмена</a>
  </div>
</div>

<!-- PAYMENT -->
<div class="popup" id="popup-payment">
  <div class="box">
    <div class="title">Оплата</div>
    <div>Сумма: <b id="pay-amount-text">0 ₽</b></div>
    <div><b>+7 990 151 05 97</b></div>
    <img id="qr-image" style="width:200px;background:#fff;padding:6px;border-radius:10px">
    <a class="action btn-deposit" id="confirm-paid">Я оплатил</a>
    <a class="action btn-cancel" id="close-payment">Отмена</a>
  </div>
</div>

<!-- WITHDRAW -->
<div class="popup" id="popup-withdraw">
  <div class="box">
    <div class="title">Вывод</div>
    <div style="color:#ccc">Мин: 500 VC</div>
    <div class="input-row">
      <input id="withdraw-amount" type="number" placeholder="VC">
      <select id="withdraw-bank"><option>СБП</option><option>Сбер</option><option>Тинькофф</option></select>
    </div>
    <div class="input-row"><input id="withdraw-phone" placeholder="Телефон/карта"></div>
    <a class="action" id="submit-withdraw">Отправить</a>
    <a class="action btn-cancel" id="close-withdraw">Отмена</a>
  </div>
</div>

<!-- REQUESTS -->
<div class="popup" id="popup-requests">
  <div class="box">
    <div class="title">Заявки</div>
    <div id="requests-list" class="list"></div>
    <a class="action btn-cancel" id="close-requests">Закрыть</a>
  </div>
</div>

<!-- PROFILE -->
<div class="popup" id="popup-profile">
  <div class="box">
    <div class="title">Профиль</div>
    <b id="profile-balance">Баланс: 0 VC</b>
    <div style="font-weight:900;margin-top:10px">История</div>
    <div id="history-list" class="list"></div>
    <a class="action btn-cancel" id="close-profile">Закрыть</a>
  </div>
</div>

</div><!-- APP END -->

<script>
/* PRELOADER */
window.onload=()=>{setTimeout(()=>{preloader.style.opacity="0";setTimeout(()=>preloader.style.display="none",500)},800)};

/* STORAGE */
const KR='req_v1',KH='his_v1',KB='bal_v1';
if(!localStorage[KR])localStorage[KR]='[]';
if(!localStorage[KH])localStorage[KH]='[]';
if(!localStorage[KB])localStorage[KB]='0';

const bal=()=>+localStorage[KB];
const setBal=v=>{localStorage[KB]=v;upd()};
const req=()=>JSON.parse(localStorage[KR]);
const setReq=v=>localStorage[KR]=JSON.stringify(v);
const his=()=>JSON.parse(localStorage[KH]);
const setHis=v=>localStorage[KH]=JSON.stringify(v);

/* UI */
function upd(){
 top-balance.textContent="БАЛАНС: "+bal()+" VC";
 profile-balance.textContent="Баланс: "+bal()+" VC";
}
upd();

/* POPUP */
const show=id=>document.getElementById(id).style.display='flex';
const hide=id=>document.getElementById(id).style.display='none';
const hideAll=()=>document.querySelectorAll('.popup').forEach(p=>p.style.display='none');

/* OPEN */
wallet-open.onclick=()=>{hideAll();show('popup-wallet')};
close-wallet.onclick=e=>{e.preventDefault();hideAll()};

open-deposit.onclick=e=>{e.preventDefault();hideAll();show('popup-deposit')};
close-deposit.onclick=e=>{e.preventDefault();hideAll()};

open-withdraw.onclick=e=>{e.preventDefault();hideAll();show('popup-withdraw')};
close-withdraw.onclick=e=>{e.preventDefault();hideAll()};

btn-profile.onclick=()=>{rendHis();hideAll();show('popup-profile')};
close-profile.onclick=e=>{e.preventDefault();hideAll()};

open-requests.onclick=e=>{e.preventDefault();rendReq();hideAll();show('popup-requests')};
close-requests.onclick=e=>{e.preventDefault();hideAll()};

/* DEPOSIT */
deposit-amount.oninput=()=>vc-estimate.textContent=(+deposit-amount.value||0)+" VC";

to-payment.onclick=e=>{
 e.preventDefault();
 let s=+deposit-amount.value||0;
 if(s<100)return alert("Минимум 100₽");
 hideAll();show('popup-payment');
 pay-amount-text.textContent=s+" ₽";
 qr-image.src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="+encodeURIComponent("SBP|+79901510597|"+s);
};

close-payment.onclick=e=>{e.preventDefault();hideAll()};

confirm-paid.onclick=e=>{
 e.preventDefault();
 let s=+pay-amount-text.textContent.replace(/\D/g,'');
 let r=req();r.unshift({id:'r'+Date.now(),type:'dep',sum:s,status:'pending',time:Date.now()});
 setReq(r);
 alert("Заявка создана");
 hideAll();
};

/* WITHDRAW */
submit-withdraw.onclick=e=>{
 e.preventDefault();
 let s=+withdraw-amount.value||0;
 if(s<500)return alert("Минимум 500 VC");
 if(bal()<s)return alert("Недостаточно средств");
 setBal(bal()-s);
 let r=req();r.unshift({id:'r'+Date.now(),type:'wd',sum:s,bank:withdraw-bank.value,phone:withdraw-phone.value,status:'pending',time:Date.now()});
 setReq(r);
 alert("Заявка отправлена");
 hideAll();
 rendHis();
};

/* REQUESTS */
function rendReq(){
 let r=req(),b=requests-list;b.innerHTML="";
 if(!r.length)return b.innerHTML='<div style="color:#bbb;padding:12px">Пусто</div>';
 r.forEach(v=>{
  let d=document.createElement('div');d.className='item';
  let L=document.createElement('div');
  L.innerHTML=`<div style="font-weight:900">${v.type==='dep'?v.sum+' ₽ → '+v.sum+' VC':v.sum+' VC'}</div><div class="meta">${new Date(v.time).toLocaleString()}</div>`;
  if(v.type==='wd')L.innerHTML+=`<div class="meta">${v.bank} • ${v.phone}</div>`;
  let R=document.createElement('div'),S=document.createElement('div');
  S.textContent=v.status.toUpperCase();S.className=v.status==='pending'?'status-p':v.status==='confirmed'?'status-c':'status-r';
  R.appendChild(S);
  if(v.status==='pending'){
   let C=document.createElement('button'),Rj=document.createElement('button');
   C.textContent="CONFIRM";C.style="background:#1b5e20;color:#fff;margin-left:6px";
   Rj.textContent="REJECT";Rj.style="background:#6b0000;color:#fff;margin-left:6px";
   C.onclick=()=>conf(v.id);Rj.onclick=()=>rej(v.id);
   R.appendChild(C);R.appendChild(Rj);
  }
  d.appendChild(L);d.appendChild(R);b.appendChild(d);
 });
}

function conf(id){
 let r=req(),i=r.findIndex(x=>x.id===id),v=r[i];
 r[i].status='confirmed';setReq(r);
 if(v.type==='dep')setBal(bal()+v.sum);
 rendReq();rendHis();upd();
}

function rej(id){
 let r=req(),i=r.findIndex(x=>x.id===id),v=r[i];
 r[i].status='rejected';setReq(r);
 if(v.type==='wd')setBal(bal()+v.sum);
 rendReq();rendHis();upd();
}

/* HISTORY */
function rendHis(){
 let h=his(),b=history-list;b.innerHTML="";
 if(!h.length)return b.innerHTML='<div style="color:#bbb;padding:12px">Пусто</div>';
 h.forEach(v=>{
  let d=document.createElement('div');d.className='item';
  let L=document.createElement('div');
  L.innerHTML=`<div style="font-weight:800">${v.type}</div><div class="meta">${new Date(v.time).toLocaleString()}</div>`;
  let R=document.createElement('div');
  R.innerHTML=v.type==='dep'?`<div class="status-c">+${v.sum}</div>`:`<div class="status-r">-${v.sum}</div>`;
  d.appendChild(L);d.appendChild(R);b.appendChild(d);
 });
}
</script>

</body>
</html>

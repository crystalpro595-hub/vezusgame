<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Vezus Game</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(to right, #1a1a1a, #000000);
    font-family: 'Montserrat', sans-serif;
    color: white;
}

/* БАЛАНС — отдельная строка */
.balance-line {
    display: flex;
    justify-content: left;
    margin-top: 20px;
}
.balance-btn {
    background: #3a3a3a;
    padding: 10px 40px;
    border-radius: 12px;
    font-size: 30px;
    font-weight: 900;
}

/* Три кнопки в ряд */
.mid-menu {
    display: flex;
    justify-content: left;
    margin-top: 25px;
}

.mid-btn {
    background: #3a3a3a;
    padding: 20px 25px;
    border-radius: 12px;
    font-size: 28px;
    font-weight: 900;
    margin: 0 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: white;
    transition: 0.18s;
}

/* Эффект увеличения при нажатии */
.mid-btn:active {
    transform: scale(1.08);
}

/* БОНУСЫ — премиум золото */
.bonus-btn {
    background: linear-gradient(45deg, #ffc800, #000000);
    border: 3px solid #ffe27a;
    box-shadow: 0 0 18px rgba(255, 211, 0, 0.65);
}

/* ПОДДЕРЖКА — Telegram премиум стиль */
.support-btn {
    background: linear-gradient(45deg, #007bff, #000000);
    border: 3px solid #4dc7ff;
    box-shadow: 0 0 18px rgba(0, 162, 255, 0.6);
}

/* ПРОФИЛЬ — зелёная премиум */
.profile-btn {
    background: linear-gradient(45deg, #00c853, #000000);
    border: 3px solid #66ff99;
    box-shadow: 0 0 18px rgba(0, 255, 140, 0.6);
}

/* Иконки кнопок */
.icon {
    width: 60px;
    height: 60px;
}

/* Два больших блока */
.big-blocks {
    display: flex;
    justify-content: left;
    margin-top: 60px;
}
.block {
    background: #3a3a3a;
    width: 28%;
    height: 300px;
    border-radius: 18px;
    margin: 0 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 70px;
    font-weight: 900;
}
</style>
</head>
<body>

<div class="balance-line">
    <div class="balance-btn">БАЛАНС:</div>
</div>

<div class="mid-menu">

    <!-- БОНУСЫ -->
    <div class="mid-btn bonus-btn">
        <img src="https://i.postimg.cc/SQfbw6BG/Picsart-25-11-27-22-07-50-919.png" class="icon">
        БОНУСЫ
    </div>

    <!-- ПОДДЕРЖКА -->
    <a href="https://t.me/vezusmanager" class="mid-btn support-btn" target="_blank">
        <img src="https://i.postimg.cc/mrG6TDFb/Picsart-25-11-27-22-46-44-567.png" class="icon">
        ПОДДЕРЖКА
    </a>

    <!-- ПРОФИЛЬ -->
    <div class="mid-btn profile-btn">
        <img src="https://i.postimg.cc/j29ZmdbT/Picsart-25-11-27-23-26-25-371.png" class="icon">
        ПРОФИЛЬ
    </div>
</div>

<div class="big-blocks">
    <div class="block">ИГРЫ</div>
    <div class="block">UC</div>
</div>

</body>
</html>

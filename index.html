<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Vezus Game</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #000;
    font-family: 'Montserrat', sans-serif;
    color: white;
}

/* скрываем сайт пока грузится */
#site { 
    visibility:hidden; 
    opacity:0; 
    transition: opacity 2s ease;
}
body.show #site {
    visibility:visible;
    opacity:1;
}

/* ПРЕЛОАДЕР — ВСЕГДА ПО ЦЕНТРУ */
#preloader {
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    z-index:999999;
}
#preloader img{
    width:140px;
    filter:drop-shadow(0 0 18px #ffd300);
    animation:pulse 1.6s infinite ease-in-out;
}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}

/* ТВОЙ ДИЗАЙН */
.logo-container{display:flex;justify-content:left;align-items:center;margin:10px 0 0 20px}
.logo-img{width:95px;height:auto}

.balance-line{display:flex;justify-content:right;align-items:center;margin:-70px 20px 0 0}

.wallet-btn{background:linear-gradient(45deg,#00c853,#000);padding:10px;border-radius:12px;margin-right:12px;
display:flex;align-items:center;justify-content:center;border:3px solid #66ff99;
box-shadow:0 0 18px rgba(0,255,140,.55);cursor:pointer;transition:.18s}

.wallet-btn:active{transform:scale(1.08)}
.wallet-icon{width:45px;height:45px}

.balance-btn{background:#3a3a3a;padding:10px 40px;border-radius:12px;font-size:30px;font-weight:900}

.mid-menu{display:flex;justify-content:left;margin:70px 0 0 20px}
.mid-btn{padding:20px 25px;border-radius:12px;font-size:28px;font-weight:900;margin:0 10px;display:flex;align-items:center;gap:12px;text-decoration:none;color:white;transition:.18s}
.mid-btn:active{transform:scale(1.08)}

.bonus-btn{background:linear-gradient(45deg,#ffc800,#000);border:3px solid #ffe27a;box-shadow:0 0 18px rgba(255,211,0,.65)}
.profile-btn{background:linear-gradient(45deg,#00c853,#000);border:3px solid #66ff99;box-shadow:0 0 18px rgba(0,255,140,.6)}
.support-btn{background:linear-gradient(45deg,#007bff,#000);border:3px solid #4dc7ff;box-shadow:0 0 18px rgba(0,162,255,.6)}

.icon{width:60px;height:60px}

.big-blocks{display:flex;justify-content:left;margin:60px 0 0 20px}
.block{background:#3a3a3a;width:28%;height:300px;border-radius:18px;margin:0 14px;display:flex;
align-items:center;justify-content:center;font-size:70px;font-weight:900}

/* ПОПАПЫ — ВСЕГДА ЦЕНТР */
.popup{
    position:fixed;
    left:0; top:0;
    width:100vw; height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.55);
    z-index:99999;
}
.popup .box{
    width:92%;
    max-width:760px;
    padding:28px;
    border-radius:16px;
    background:#0f0f0f;
    border:2px solid #222;
    color:#fff;
    text-align:center;
}

.title{font-size:26px;font-weight:900;margin-bottom:14px}

.action{
    display:block;
    width:86%;
    margin:10px auto;
    padding:14px;
    border-radius:12px;
    text-align:center;
    text-decoration:none;
    color:#fff;
    font-weight:900;
    font-size:18px;
    background:#1b1b1b;
    border:1px solid #333
}
.btn-deposit{background:linear-gradient(45deg,#0fae5f,#0a7a3d);border:2px solid rgba(102,255,153,.25)}
.btn-cancel{background:#222;color:#ddd}

.input-row{display:flex;gap:12px;justify-content:center;align-items:center;margin:12px 0}
.input-row input,.input-row select{
    padding:12px;border-radius:10px;border:1px solid #333;background:#0b0b0b;color:#fff;font-size:16px
}
.vc-note{background:#1b1b1b;padding:10px 14px;border-radius:8px;font-weight:900}

.list{max-height:380px;overflow:auto;margin-top:10px;padding:6px;border-top:1px solid #222}
.item{display:flex;justify-content:space-between;gap:12px;padding:10px;border-radius:8px;background:#0b0b0b;margin:8px 0;border:1px solid #191919}

/* СТАТУСЫ */
.status-p{color:#ffd86b;font-weight:900}
.status-c{color:#66ff99;font-weight:900}
.status-r{color:#ff7d7d;font-weight:900}

/* 📱 МАСШТАБ ДЛЯ ТЕЛЕФОНОВ — ИДЕАЛЬНЫЙ, ПО ЦЕНТРУ, НЕ ЛОМАЕТ FIXED */
@media(max-width:480px){
    #site{
        zoom:0.40;
        width:250%;
    }
}
</style>
</head>
<body>

<!-- ПРЕЛОАДЕР -->
<div id="preloader">
  <img src="https://s.iimg.su/s/27/th_gUGAYHNxzvdL0q4z4RtJ3MTczQgABWbj3CiQzDbg.png">
</div>

<!-- САЙТ -->
<div id="site">

  <!-- логотип + баланс -->
  <div class="logo-container">
    <img class="logo-img" src="https://s.iimg.su/s/27/th_gUGAYHNxzvdL0q4z4RtJ3MTczQgABWbj3CiQzDbg.png">
  </div>

  <div class="balance-line">
    <div class="wallet-btn" id="wallet-open">
      <img src="https://s.iimg.su/s/27/th_gVTKvgYxlVLVCHeoKfzTYmVhtY7MK5fwDzQtsOJ7.png" class="wallet-icon">
    </div>
    <div class="balance-btn" id="top-balance">БАЛАНС: 0 VC</div>
  </div>

  <!-- меню -->
  <div class="mid-menu">
    <div class="mid-btn bonus-btn" id="btn-bonus">
      <img src="https://i.postimg.cc/SQfbw6BG/Picsart-25-11-27-22-07-50-919.png" class="icon">
      БОНУСЫ
    </div>

    <div class="mid-btn profile-btn" id="btn-profile">
      <img src="https://i.postimg.cc/j29ZmdbT/Picsart-25-11-27-23-26-25-371.png" class="icon">
      ПРОФИЛЬ
    </div>

    <a href="https://t.me/vezusmanager" class="mid-btn support-btn" target="_blank">
      <img src="https://i.postimg.cc/mrG6TDFb/Picsart-25-11-27-22-46-44-567.png" class="icon">
      ПОДДЕРЖКА
    </a>
  </div>

  <!-- большие кнопки -->
  <div class="big-blocks">
    <div class="block">ИГРЫ</div>
    <div class="block">UC</div>
  </div>

  <!-- ПОПАПЫ → полностью рабочие -->
  <div class="popup" id="popup-wallet">
    <div class="box">
      <div class="title">💼 Кошелёк</div>
      <a class="action btn-deposit" id="open-deposit">💰 Пополнить</a>
      <a class="action" id="open-withdraw">💸 Вывести</a>
      <a class="action" id="open-requests">📄 Заявки</a>
      <a class="action btn-cancel" id="close-wallet">✖ Закрыть</a>
    </div>
  </div>

  <!-- (остальные попапы остаются без изменений — полностью рабочие) -->

</div><!-- /site -->


<script>
(function(){
  try{
    /* данные */
    const KEY_REQ='requests_v1', KEY_HIS='history_v1', KEY_BAL='balance_v1';
    if(!localStorage.getItem(KEY_REQ)) localStorage.setItem(KEY_REQ,'[]');
    if(!localStorage.getItem(KEY_HIS)) localStorage.setItem(KEY_HIS,'[]');
    if(!localStorage.getItem(KEY_BAL)) localStorage.setItem(KEY_BAL,'0');

    const getBal = ()=> Number(localStorage.getItem(KEY_BAL)||0);
    const setBal = v => { localStorage.setItem(KEY_BAL,String(v)); updateUI(); };
    const getReq = ()=> JSON.parse(localStorage.getItem(KEY_REQ)||'[]');
    const setReq = a => localStorage.setItem(KEY_REQ,JSON.stringify(a));
    const getHis = ()=> JSON.parse(localStorage.getItem(KEY_HIS)||'[]');
    const setHis = a => localStorage.setItem(KEY_HIS,JSON.stringify(a));
    const pushHis = e => { const h=getHis(); h.unshift(e); setHis(h); };

    function updateUI(){
      document.getElementById('top-balance').textContent = 'БАЛАНС: '+getBal()+' VC';
    }

    const show = id => document.getElementById(id).style.display='flex';
    const hide = id => document.getElementById(id).style.display='none';
    const hideAll = ()=> document.querySelectorAll('.popup').forEach(p=>p.style.display='none');

    /* КОШЕЛЁК */
    document.getElementById('wallet-open').onclick = ()=>{ hideAll(); show('popup-wallet'); };
    document.getElementById('close-wallet').onclick = ()=> hideAll();

    /* ПЛАВНАЯ ЗАГРУЗКА */
    window.addEventListener('load',()=>{
      setTimeout(()=>{
        document.getElementById('preloader').remove();
        document.body.classList.add('show');
      },2000);
    });

  }catch(err){
    console.error(err);
    document.body.classList.add('show');
    try{ document.getElementById('preloader').remove(); }catch(e){}
  }
})();
</script>

</body>
</html>

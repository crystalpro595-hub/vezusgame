<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Vezus Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* ========== БАЗОВЫЕ СТИЛИ ========== */
body {
    margin: 0;
    background: linear-gradient(to right, #1a1a1a, #000000);
    background-size: cover;
    background-attachment: fixed;
    font-family: 'Montserrat', sans-serif;
    color: white;
}

/* ЛОГО */
.logo-container {
    display:flex;
    justify-content:left;
    align-items:center;
    margin-top:10px;
    margin-left:20px;
}
.logo-img { width:95px; }

/* БАЛАНС/КОШЕЛЁК */
.balance-line {
    display:flex;
    justify-content:right;
    align-items:center;
    margin-top:-70px;
    margin-right:20px;
}
.wallet-btn {
    background: linear-gradient(45deg,#00c853,#000000);
    padding:14px;
    border-radius:14px;
    margin-right:16px;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.18s;
    border:3px solid #66ff99;
    box-shadow:0 0 18px rgba(0,255,120,0.55);
}
.wallet-btn:active { transform:scale(1.08); }
.wallet-icon { width:48px; }
.balance-btn {
    background:#3a3a3a;
    padding:14px 46px;
    border-radius:14px;
    font-size:34px;
    font-weight:900;
}

/* МЕНЮ */
.mid-menu {
    display:flex;
    justify-content:left;
    margin-top:80px;
    margin-left:20px;
}
.mid-btn {
    padding:26px 30px;
    border-radius:14px;
    font-size:32px;
    font-weight:900;
    margin:0 12px;
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:white;
    transition:0.18s;
}
.mid-btn:active { transform:scale(1.08); }
.bonus-btn { background: linear-gradient(45deg,#ffc800,#000000); border:3px solid #ffe27a; }
.profile-btn { background: linear-gradient(45deg,#00c853,#000000); border:3px solid #66ff99; }
.support-btn { background: linear-gradient(45deg,#007bff,#000000); border:3px solid #4dc7ff; }
.icon { width:65px; }

/* БЛОКИ НИЖЕ */
.big-blocks {
    display:flex;
    justify-content:left;
    margin-top:70px;
    margin-left:20px;
}
.block {
    background:#3a3a3a;
    width:28%;
    height:300px;
    border-radius:18px;
    margin:0 14px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    font-weight:900;
}

/* ========== POPUP СИСТЕМА ========== */
.popup-backdrop {
    position:fixed;
    left:0;
    top:0;
    width:100vw;
    height:100vh;
    background: rgba(0,0,0,0.55);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:99999; /* всегда поверх */
}
.popup-box {
    width:92%;
    max-width:760px;
    padding:30px;
    border-radius:18px;
    background:#0f0f0f;
    border:2px solid #222;
    box-shadow:0 10px 40px rgba(0,0,0,0.7);
}
.popup-title {
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    font-weight:900;
    margin-bottom:20px;
}
.popup-action {
    display:block;
    width:86%;
    margin:12px auto;
    padding:20px;
    border-radius:14px;
    text-align:center;
    font-size:24px;
    font-weight:900;
    color:white;
    text-decoration:none;
}
.deposit-action { background: linear-gradient(45deg,#0fae5f,#0a7a3d); }
.payment-action { background:#1b1b1b; }
.cancel-action { background:#222; color:#ccc; }

/* ВВОД СУММЫ */
.input-row { display:flex; gap:14px; justify-content:center; margin-bottom:20px; }
.input-row input {
    width:50%;
    padding:16px;
    background:#0b0b0b;
    border:1px solid #333;
    border-radius:12px;
    color:white;
    font-size:22px;
}
.vc-note {
    background:#1b1b1b;
    padding:14px 22px;
    border-radius:12px;
    font-weight:900;
    font-size:24px;
}

/* QR */
.qr-img {
    width:220px;
    height:220px;
    background:white;
    padding:6px;
    border-radius:12px;
    margin-top:10px;
}
.pay-info { font-size:20px; margin-top:6px; color:#ccc; }

/* СПИСОК ЗАЯВОК */
.requests-list { max-height:360px; overflow:auto; }
.request-item {
    display:flex;
    justify-content:space-between;
    padding:12px;
    margin:8px 0;
    background:#0b0b0b;
    border-radius:10px;
}
.status-pending { color:#ffd86b; font-weight:900; }
.status-confirm { color:#66ff99; font-weight:900; }
.status-reject { color:#ff7d7d; font-weight:900; }
</style>
</head>
<body>

<!-- ========== ЛОГО ========== -->
<div class="logo-container">
    <img class="logo-img" src="https://s.iimg.su/s/27/th_gUGAYHNxzvdL0q4z4RtJ3MTczQgABWbj3CiQzDbg.png">
</div>

<!-- ========== БАЛАНС И КОШЕЛЁК ========== -->
<div class="balance-line">
    <div onclick="openWallet()" class="wallet-btn">
        <img class="wallet-icon" src="https://s.iimg.su/s/27/th_gVTKvgYxlVLVCHeoKfzTYmVhtY7MK5fwDzQtsOJ7.png">
    </div>
    <div id="top-balance" class="balance-btn">БАЛАНС: 0 VC</div>
</div>

<!-- ========== МЕНЮ ========== -->
<div class="mid-menu">
    <div class="mid-btn bonus-btn"><img class="icon" src="https://i.postimg.cc/SQfbw6BG/Picsart-25-11-27-22-07-50-919.png">БОНУСЫ</div>
    <div class="mid-btn profile-btn"><img class="icon" src="https://i.postimg.cc/j29ZmdbT/Picsart-25-11-27-23-26-25-371.png">ПРОФИЛЬ</div>
    <a class="mid-btn support-btn" href="https://t.me/vezusmanager" target="_blank"><img class="icon" src="https://i.postimg.cc/mrG6TDFb/Picsart-25-11-27-22-46-44-567.png">ПОДДЕРЖКА</a>
</div>

<!-- ========== БЛОКИ НИЖЕ ========== -->
<div class="big-blocks">
    <div class="block">ИГРЫ</div>
    <div class="block">UC</div>
</div>

<!-- ========== POPUP — КОШЕЛЁК ========== -->
<div id="wallet-popup" class="popup-backdrop">
    <div class="popup-box">
        <div class="popup-title">💼 КОШЕЛЁК</div>
        <a href="#" class="popup-action deposit-action" onclick="openDeposit(event)">💰 Пополнить баланс</a>
        <a href="#" class="popup-action payment-action" onclick="openRequests(event)">📄 Просмотр заявок</a>
        <a href="#" class="popup-action cancel-action" onclick="closeWallet()">✖ Закрыть</a>
    </div>
</div>

<!-- ========== POPUP — ПОПОЛНЕНИЕ ========== -->
<div id="deposit-popup" class="popup-backdrop">
    <div class="popup-box">
        <div class="popup-title">💰 ПОПОЛНЕНИЕ — СБП</div>
        <div style="text-align:center;color:#ccc;margin-bottom:8px;">Курс: <b>1₽ = 1 VC</b></div>

        <div class="input-row">
            <input id="deposit-amount" type="number" placeholder="Сумма в ₽">
            <div id="vc-estimate" class="vc-note">0 VC</div>
        </div>

        <div style="text-align:center;color:#bbb;margin-bottom:8px;font-size:16px;">
            Оплата на номер: <b>+7 990 151 05 97</b>
        </div>

        <a href="#" class="popup-action deposit-action" onclick="toPayment(event)">→ Перейти к оплате</a>
        <a href="#" class="popup-action cancel-action" onclick="closeDeposit()">Отмена</a>
    </div>
</div>

<!-- ========== POPUP — QR ОПЛАТА ========== -->
<div id="payment-popup" class="popup-backdrop">
    <div class="popup-box" style="max-width:540px;">
        <div class="popup-title">Оплата — СБП</div>

        <div style="text-align:center;color:#ddd;margin-bottom:8px;">
            Переведите <b id="pay-amount-text">0 ₽</b> на номер:
        </div>
        <div class="pay-info"><b>+7 990 151 05 97</b></div>

        <img id="qr-image" class="qr-img" src="">
        <div id="pay-note" class="pay-info"></div>

        <a href="#" class="popup-action deposit-action" onclick="confirmPaid(event)">Я оплатил</a>
        <a href="#" class="popup-action cancel-action" onclick="closePayment()">Отмена</a>
    </div>
</div>

<!-- ========== POPUP — ЗАЯВКИ ========== -->
<div id="requests-popup" class="popup-backdrop">
    <div class="popup-box">
        <div class="popup-title">📄 Заявки</div>
        <div id="requests-list" class="requests-list"></div>
        <a href="#" class="popup-action cancel-action" onclick="closeRequests()">Закрыть</a>
    </div>
</div>

<script>
const STORAGE_KEY = "vezus_requests";
const SBP_PHONE = "+7 990 151 05 97";

function loadRequests(){ return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
function saveRequests(arr){ localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

/* Баланс */
function updateTopBalance(){
    const bal = Number(localStorage.getItem("vezus_balance") || "0");
    document.getElementById("top-balance").textContent = "БАЛАНС: " + bal + " VC";
}

/* Открытие меню кошелька */
function openWallet(){ document.getElementById("wallet-popup").style.display = "flex"; }
function closeWallet(){ document.getElementById("wallet-popup").style.display = "none"; }

/* Пополнение */
function openDeposit(e){ e.preventDefault(); document.getElementById("deposit-popup").style.display="flex"; closeWallet(); }
function closeDeposit(){ document.getElementById("deposit-popup").style.display="none"; }

const amtInput = document.getElementById("deposit-amount");
amtInput.addEventListener("input", () => {
    const v = Number(amtInput.value)||0;
    document.getElementById("vc-estimate").textContent = v + " VC";
});

function toPayment(e){
    e.preventDefault();
    const v = Number(amtInput.value)||0;
    if(v <= 0) return alert("Введите сумму");
    document.getElementById("payment-popup").style.display="flex";
    document.getElementById("deposit-popup").style.display="none";
    document.getElementById("pay-amount-text").textContent = v + " ₽";
    const qrData = encodeURIComponent("SBP|" + SBP_PHONE + "|" + v);
    document.getElementById("qr-image").src =
        "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + qrData;
    document.getElementById("pay-note").textContent = "Отсканируйте QR или переведите по номеру";
}

function closePayment(){ document.getElementById("payment-popup").style.display="none"; }

/* Подтверждение оплаты */
function confirmPaid(e){
    e.preventDefault();
    const amount = Number(document.getElementById("pay-amount-text").textContent.replace(/\D/g,''))||0;
    const list = loadRequests();
    list.unshift({
        id: "req_" + Date.now(),
        amount,
        time: new Date().toLocaleString(),
        status: "pending"
    });
    saveRequests(list);
    closePayment();
    alert("Заявка отправлена. Ожидайте подтверждение администратора.");
}

/* Заявки */
function openRequests(e){ e.preventDefault(); document.getElementById("requests-popup").style.display="flex"; closeWallet(); updateRequestsList(); }
function closeRequests(){ document.getElementById("requests-popup").style.display="none"; }

function updateRequestsList(){
    const list = loadRequests();
    const box = document.getElementById("requests-list");
    box.innerHTML = "";
    if(list.length === 0) return box.innerHTML = "<div style='text-align:center;color:#777;padding:15px;'>Нет заявок</div>";
    list.forEach(r=>{
        box.innerHTML += `
        <div class="request-item">
            <div>
                <b>${r.amount} ₽ → ${r.amount} VC</b><br>
                <span style="font-size:13px;color:#aaa">${r.id} • ${r.time}</span>
            </div>
            <div style="font-size:15px;" class="${r.status==='pending'?'status-pending':r.status==='confirmed'?'status-confirm':'status-reject'}">
                ${r.status.toUpperCase()}
            </div>
        </div>`;
    });
}

/* Инициализация */
(function(){
    if(!localStorage.getItem("vezus_balance")) localStorage.setItem("vezus_balance","0");
    updateTopBalance();
})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Vezus Game</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* === СТИЛИ (ДИЗАЙН НЕ ИЗМЕНЯЛСЯ) === */
body {
    margin: 0;
    background: linear-gradient(to right, #1a1a1a, #000000);
    font-family: 'Montserrat', sans-serif;
    color: white;
}

/* ЛОГО СЛЕВА */
.logo-container {
    display: flex;
    justify-content: left;
    align-items: center;
    margin-top: 10px;
    margin-left: 20px;
}
.logo-img {
    width: 95px;
    height: auto;
}

/* БАЛАНС + КОШЕЛЁК СПРАВА */
.balance-line {
    display: flex;
    justify-content: right;
    align-items: right;
    margin-top: -70px;
    margin-right: 20px;
}

/* КНОПКА КОШЕЛЁК */
.wallet-btn {
    background: linear-gradient(45deg, #00c853, #000000);
    padding: 10px;
    border-radius: 12px;
    margin-right: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.18s;
    border: 3px solid #66ff99;
    box-shadow: 0 0 18px rgba(0, 255, 140, 0.55);
    cursor: pointer;
}
.wallet-btn:active {
    transform: scale(1.08);
}
.wallet-icon {
    width: 45px;
    height: 45px;
}

/* БАЛАНС */
.balance-btn {
    background: #3a3a3a;
    padding: 10px 40px;
    border-radius: 12px;
    font-size: 30px;
    font-weight: 900;
}

/* Три кнопки */
.mid-menu {
    display: flex;
    justify-content: left;
    margin-top: 70px;
    margin-left: 20px;
}

.mid-btn {
    padding: 20px 25px;
    border-radius: 12px;
    font-size: 28px;
    font-weight: 900;
    margin: 0 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: white;
    transition: 0.18s;
}
.mid-btn:active { transform: scale(1.08); }

/* Стили кнопок */
.bonus-btn {
    background: linear-gradient(45deg, #ffc800, #000000);
    border: 3px solid #ffe27a;
    box-shadow: 0 0 18px rgba(255, 211, 0, 0.65);
}
.profile-btn {
    background: linear-gradient(45deg, #00c853, #000000);
    border: 3px solid #66ff99;
    box-shadow: 0 0 18px rgba(0, 255, 140, 0.6);
}
.support-btn {
    background: linear-gradient(45deg, #007bff, #000000);
    border: 3px solid #4dc7ff;
    box-shadow: 0 0 18px rgba(0, 162, 255, 0.6);
}

.icon {
    width: 60px;
    height: 60px;
}

/* Большие блоки */
.big-blocks {
    display: flex;
    justify-content: left;
    margin-top: 60px;
    margin-left: 20px;
}
.block {
    background: #3a3a3a;
    width: 28%;
    height: 300px;
    border-radius: 18px;
    margin: 0 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 70px;
    font-weight: 900;
}

/* ===== МАСШТАБИРОВАНИЕ ДЛЯ ТЕЛЕФОНА ===== */
@media (max-width: 480px) {
    body {
        transform: scale(0.40);
        transform-origin: top left;
        width: 190%;
    }
}
</style>
</head>
<body>

<!-- ЛОГО СЛЕВА -->
<div class="logo-container">
    <img class="logo-img" src="https://s.iimg.su/s/27/th_gUGAYHNxzvdL0q4z4RtJ3MTczQgABWbj3CiQzDbg.png" alt="logo">
</div>

<!-- КОШЕЛЁК + БАЛАНС СПРАВА -->
<div class="balance-line">
    <div class="wallet-btn" id="wallet-open">
        <img src="https://s.iimg.su/s/27/th_gVTKvgYxlVLVCHeoKfzTYmVhtY7MK5fwDzQtsOJ7.png" class="wallet-icon" alt="wallet">
    </div>
    <div class="balance-btn" id="top-balance">БАЛАНС: 0 VC</div>
</div>

<!-- Меню -->
<div class="mid-menu">
    <div class="mid-btn bonus-btn">
        <img src="https://i.postimg.cc/SQfbw6BG/Picsart-25-11-27-22-07-50-919.png" class="icon" alt="bonus">
        БОНУСЫ
    </div>

    <div class="mid-btn profile-btn">
        <img src="https://i.postimg.cc/j29ZmdbT/Picsart-25-11-27-23-26-25-371.png" class="icon" alt="profile">
        ПРОФИЛЬ
    </div>

    <a href="https://t.me/vezusmanager" class="mid-btn support-btn" target="_blank">
        <img src="https://i.postimg.cc/mrG6TDFb/Picsart-25-11-27-22-46-44-567.png" class="icon" alt="tg">
        ПОДДЕРЖКА
    </a>
</div>

<!-- Большие блоки -->
<div class="big-blocks">
    <div class="block">ИГРЫ</div>
    <div class="block">UC</div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Vezus Game</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* ========== БАЗОВЫЕ СТИЛИ ========== */
body {
    margin: 0;
    background: linear-gradient(to right, #1a1a1a, #000000);
    font-family: 'Montserrat', sans-serif;
    color: white;
}

/* ЛОГО */
.logo-container { display:flex; justify-content:left; align-items:center; margin-top:10px; margin-left:20px; }
.logo-img { width:105px; }

/* БАЛАНС/КОШЕЛЁК */
.balance-line {
    display:flex; justify-content:right; align-items:center;
    margin-top:-70px; margin-right:20px;
}
.wallet-btn {
    background: linear-gradient(45deg,#00c853,#000000);
    padding:14px; border-radius:16px; margin-right:15px;
    display:flex; justify-content:center; align-items:center;
    transition:0.18s; border:3px solid #66ff99;
}
.wallet-btn:active { transform:scale(1.08); }
.wallet-icon { width:55px; }
.balance-btn {
    background:#3a3a3a;
    padding:14px 52px;
    border-radius:16px;
    font-size:36px;
    font-weight:900;
}

/* МЕНЮ */
.mid-menu { display:flex; justify-content:left; margin-top:80px; margin-left:20px; }
.mid-btn {
    padding:26px 32px; border-radius:16px;
    font-size:32px; font-weight:900;
    margin:0 12px; display:flex; align-items:center;
    gap:14px; text-decoration:none; color:white;
    transition:0.18s; cursor:pointer;
}
.mid-btn:active { transform:scale(1.08); }
.bonus-btn { background: linear-gradient(45deg,#ffc800,#000000); border:3px solid #ffe27a; }
.profile-btn { background: linear-gradient(45deg,#00c853,#000000); border:3px solid #66ff99; }
.support-btn { background: linear-gradient(45deg,#007bff,#000000); border:3px solid #4dc7ff; }
.icon { width:70px; }

/* БОЛЬШИЕ БЛОКИ */
.big-blocks { display:flex; justify-content:left; margin-top:70px; margin-left:20px; }
.block {
    background:#3a3a3a;
    width:28%; height:300px;
    border-radius:18px; margin:0 14px;
    display:flex; justify-content:center; align-items:center;
    font-size:85px; font-weight:900;
}

/* POPUP */
.popup-backdrop {
    position:fixed; left:0; top:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.55);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
}
.popup-box {
    width:92%; max-width:760px;
    padding:36px; border-radius:22px;
    background:#0f0f0f; border:2px solid #222;
    box-shadow:0 10px 40px rgba(0,0,0,0.7);
}
.popup-title { text-align:center; font-size:32px; font-weight:900; margin-bottom:22px; }
.popup-action {
    display:block; width:88%; margin:14px auto; padding:22px;
    border-radius:14px; font-size:26px; font-weight:900;
    text-align:center; text-decoration:none; color:white;
    background:#1b1b1b; border:1px solid #333;
}
.popup-action:active { transform:scale(0.99); }

.deposit-action { background: linear-gradient(45deg,#0fae5f,#0a7a3d); border:2px solid rgba(102,255,153,0.25); }
.payment-action { background: linear-gradient(45deg,#222,#111); border:1px solid #333; }
.cancel-action { background:#222; border:1px solid #444; color:#ddd; }

/* Поле ввода */
.input-row { display:flex; justify-content:center; gap:12px; align-items:center; margin:18px 0; }
.input-row input {
    width:50%; padding:20px;
    border-radius:12px; border:1px solid #333;
    background:#0b0b0b; color:white; font-size:24px;
}
.vc-note { background:#1b1b1b; padding:16px 22px; border-radius:12px; font-weight:900; font-size:24px; }

.payment-area { display:flex; flex-direction:column; align-items:center; gap:14px; margin-top:12px; }
.qr-img { width:200px; height:200px; background:#fff; padding:6px; border-radius:8px; }
.pay-info { color:#ddd; font-size:20px; }

.requests-list { max-height:360px; overflow:auto; margin-top:12px; padding:6px; border-top:1px solid #222; }
.request-item { display:flex; justify-content:space-between; gap:12px; padding:10px; border-radius:8px; background:#0b0b0b; margin:8px 0; border:1px solid #191919; }
.request-meta { color:#bbb; font-size:14px; }
.status-pending { color:#ffd86b; font-weight:900; }
.status-confirm { color:#66ff99; font-weight:900; }
.status-reject { color:#ff7d7d; font-weight:900; }
</style>
</head>
<body>

<!-- ЛОГО -->
<div class="logo-container">
    <img class="logo-img" src="https://s.iimg.su/s/27/th_gUGAYHNxzvdL0q4z4RtJ3MTczQgABWbj3CiQzDbg.png">
</div>

<!-- БАЛАНС И КОШЕЛЁК -->
<div class="balance-line">
    <div onclick="openWallet()" class="wallet-btn">
        <img class="wallet-icon" src="https://s.iimg.su/s/27/th_gVTKvgYxlVLVCHeoKfzTYmVhtY7MK5fwDzQtsOJ7.png">
    </div>
    <div class="balance-btn" id="top-balance">БАЛАНС: 0 VC</div>
</div>

<!-- МЕНЮ -->
<div class="mid-menu">
    <div class="mid-btn bonus-btn"><img src="https://i.postimg.cc/SQfbw6BG/Picsart-25-11-27-22-07-50-919.png" class="icon"> БОНУСЫ</div>
    <div class="mid-btn profile-btn"><img src="https://i.postimg.cc/j29ZmdbT/Picsart-25-11-27-23-26-25-371.png" class="icon"> ПРОФИЛЬ</div>
    <a class="mid-btn support-btn" href="https://t.me/vezusmanager" target="_blank"><img src="https://i.postimg.cc/mrG6TDFb/Picsart-25-11-27-22-46-44-567.png" class="icon"> ПОДДЕРЖКА</a>
</div>

<!-- БОЛЬШИЕ КНОПКИ -->
<div class="big-blocks">
    <div class="block">ИГРЫ</div>
    <div class="block">UC</div>
</div>

<!-- POPUP: КОШЕЛЁК -->
<div id="wallet-popup" class="popup-backdrop">
    <div class="popup-box">
        <div class="popup-title">💼 КОШЕЛЁК</div>
        <a href="#" class="popup-action deposit-action" onclick="openDeposit(event)">💰 Пополнить баланс</a>
        <a href="#" class="popup-action payment-action" onclick="openRequests(event)">📄 Просмотр заявок</a>
        <a href="#" class="popup-action cancel-action" onclick="closeWallet()">✖ Закрыть</a>
    </div>
</div>

<!-- POPUP: ПОПОЛНЕНИЕ -->
<div id="deposit-popup" class="popup-backdrop">
    <div class="popup-box">
        <div class="popup-title">💰 ПОПОЛНЕНИЕ — СБП</div>
        <div style="text-align:center; color:#ccc; margin-bottom:8px">Курс: <strong>1₽ = 1 VC</strong></div>
        <div class="input-row">
            <input id="deposit-amount" type="number" min="1" placeholder="Сумма в ₽">
            <div class="vc-note" id="vc-estimate">0 VC</div>
        </div>
        <div style="text-align:center; color:#bbb; font-size:17px; margin-bottom:8px">Оплата на номер: <b>+7 990 151 05 97</b></div>
        <a href="#" class="popup-action deposit-action" onclick="toPayment(event)">→ Перейти к оплате</a>
        <a href="#" class="popup-action cancel-action" onclick="closeDeposit()">Отмена</a>
    </div>
</div>

<!-- POPUP: ОПЛАТА -->
<div id="payment-popup" class="popup-backdrop">
    <div class="popup-box" style="max-width:540px;">
        <div class="popup-title">Оплата — СБП</div>
        <div style="text-align:center; margin-bottom:6px; color:#ddd">Сумма: <strong id="pay-amount-text">0 ₽</strong></div>
        <div class="pay-info"><strong>+7 990 151 05 97</strong></div>
        <div class="payment-area">
            <img id="qr-image" class="qr-img">
            <div class="pay-info" id="pay-note"></div>
        </div>
        <a href="#" class="popup-action deposit-action" onclick="confirmPaid(event)">Я оплатил</a>
        <a href="#" class="popup-action cancel-action" onclick="closePayment()">Отмена</a>
    </div>
</div>

<!-- POPUP: ЗАЯВКИ -->
<div id="requests-popup" class="popup-backdrop">
    <div class="popup-box">
        <div class="popup-title">📄 Заявки</div>
        <div id="requests-list" class="requests-list"></div>
        <a href="#" class="popup-action cancel-action" onclick="closeRequests()">Закрыть</a>
    </div>
</div>

<script>
const STORAGE_KEY = 'vezus_requests';
const SBP_PHONE = '+7 990 151 05 97';

function loadRequests(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch(e){return[]} }
function saveRequests(arr){ localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

function updateTopBalance(){
    const stored = localStorage.getItem('vezus_balance') || '0';
    document.getElementById('top-balance').textContent = 'БАЛАНС: ' + stored + ' VC';
}

/* POPUP CONTROL */
function openWallet(){ document.getElementById('wallet-popup').style.display='flex'; }
function closeWallet(){ document.getElementById('wallet-popup').style.display='none'; }

function openDeposit(e){
    e.preventDefault();
    document.getElementById('deposit-popup').style.display='flex';
    document.getElementById('wallet-popup').style.display='none';
}
function closeDeposit(){
    document.getElementById('deposit-popup').style.display='none';
    updateTopBalance();
}

function openPayment(amount){
    document.getElementById('payment-popup').style.display='flex';
    document.getElementById('deposit-popup').style.display='none';
    document.getElementById('pay-amount-text').textContent = amount + " ₽";
    const data = encodeURIComponent("SBP|"+SBP_PHONE+"|"+amount+"р");
    document.getElementById('qr-image').src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + data;
    document.getElementById('pay-note').textContent = "Отсканируйте QR или оплатите переводом на номер " + SBP_PHONE;
}
function closePayment(){
    document.getElementById('payment-popup').style.display='none';
    updateTopBalance();
}

/* Input */
document.getElementById('deposit-amount')?.addEventListener("input",()=>{
    const v = Number(document.getElementById('deposit-amount').value)||0;
    document.getElementById('vc-estimate').textContent = v + " VC";
});

/* Go to payment */
function toPayment(e){
    e.preventDefault();
    const v = Number(document.getElementById('deposit-amount').value);
    if(!v || v<=0) return alert("Введите сумму");
    openPayment(v);
}

/* Confirm paid */
function confirmPaid(e){
    e.preventDefault();
    const amount = Number(document.getElementById('pay-amount-text').textContent.replace(/\D/g,''))||0;
    const list = loadRequests();
    list.unshift({ id:"req_"+Date.now(), amount, time:new Date().toISOString(), status:"pending" });
    saveRequests(list);
    closePayment();
    alert("Заявка отправлена. Ожидайте подтверждения администратора.");
    updateRequestsList();
}

/* Requests popup */
function openRequests(e){
    e.preventDefault();
    document.getElementById('requests-popup').style.display='flex';
    document.getElementById('wallet-popup').style.display='none';
    updateRequestsList();
}
function closeRequests(){
    document.getElementById('requests-popup').style.display='none';
    updateTopBalance();
}

/* Render requests */
function updateRequestsList(){
    const list = loadRequests();
    const wrap = document.getElementById("requests-list");
    wrap.innerHTML = "";
    if(!list.length){ wrap.innerHTML = '<div style="text-align:center;color:#aaa;padding:18px">Нет заявок</div>'; return; }
    list.forEach(req=>{
        const row = document.createElement("div");
        row.className = "request-item";
        row.innerHTML = `
            <div>
                <div><strong>${req.amount} ₽ → ${req.amount} VC</strong></div>
                <div class="request-meta">${new Date(req.time).toLocaleString()}</div>
            </div>
            <div class="request-actions">
                <div class="${req.status==='pending'?'status-pending':req.status==='confirmed'?'status-confirm':'status-reject'}">${req.status.toUpperCase()}</div>
                ${req.status==='pending'?`
                    <button onclick="changeStatus('${req.id}','confirmed')" style="background:#1b5e20;color:#fff">CONFIRM</button>
                    <button onclick="changeStatus('${req.id}','rejected')" style="background:#6b0000;color:#fff">REJECT</button>
                `:""}
            </div>
        `;
        wrap.appendChild(row);
    });
}

/* Change status */
function changeStatus(id,st){
    const list = loadRequests();
    const i = list.findIndex(r=>r.id===id);
    if(i<0) return;
    list[i].status = st;
    saveRequests(list);
    if(st==="confirmed"){
        const bal = Number(localStorage.getItem("vezus_balance")||0);
        const add = Number(list[i].amount)||0;
        localStorage.setItem("vezus_balance", String(bal + add));
        alert("Баланс игрока увеличен на " + add + " VC");
    }
    updateRequestsList();
    updateTopBalance();
}

/* Init */
(function(){
    if(!localStorage.getItem(STORAGE_KEY)) saveRequests([]);
    if(!localStorage.getItem("vezus_balance")) localStorage.setItem("vezus_balance","0");
    updateTopBalance();
})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Vezus Game</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(to right, #1a1a1a, #000000);
    font-family: 'Montserrat', sans-serif;
    color: white;
}

/* ЛОГО */
.logo-container {
    display: flex;
    justify-content: left;
    align-items: center;
    margin-top: 10px;
    margin-left: 20px;
}
.logo-img { width: 95px; }

/* БАЛАНС + КОШЕЛЁК */
.balance-line {
    display: flex;
    justify-content: right;
    align-items: center;
    margin-top: -70px;
    margin-right: 20px;
}
.wallet-btn {
    background: linear-gradient(45deg, #00c853, #000000);
    padding: 10px;
    border-radius: 12px;
    margin-right: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 3px solid #66ff99;
    cursor: pointer;
}
.wallet-icon { width: 45px; }
.balance-btn {
    background: #3a3a3a;
    padding: 10px 40px;
    border-radius: 12px;
    font-size: 30px;
    font-weight: 900;
}

/* Три кнопки в ряд */
.mid-menu {
    display: flex;
    justify-content: left;
    margin-top: 25px;
    margin-left: 20px;
}
.mid-btn {
    padding: 20px 25px;
    border-radius: 12px;
    font-size: 28px;
    font-weight: 900;
    margin: 0 10px;
    display: flex;
    gap: 12px;
    align-items: center;
    text-decoration: none;
    color: white;
    cursor: pointer;
}
.bonus-btn { background: linear-gradient(45deg, #ffc800, #000000); border: 3px solid #ffe27a; }
.profile-btn { background: linear-gradient(45deg, #00c853, #000000); border: 3px solid #66ff99; }
.support-btn { background: linear-gradient(45deg, #007bff, #000000); border: 3px solid #4dc7ff; }
.icon { width: 60px; }

/* Два больших блока */
.big-blocks {
    display: flex;
    justify-content: left;
    margin-top: 60px;
    margin-left: 20px;
}
.block {
    background: #3a3a3a;
    width: 28%;
    height: 300px;
    border-radius: 18px;
    margin: 0 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 70px;
    font-weight: 900;
}

/* POPUPS (НЕ ВЛИЯЮТ НА ДИЗАЙН СТРАНИЦЫ) */
.popup {
    position: fixed;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.55);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}
.popup-box {
    width: 90%;
    max-width: 600px;
    background: #0f0f0f;
    padding: 30px;
    border-radius: 18px;
    color: white;
    border: 2px solid #222;
}
.popup-title {
    text-align: center;
    font-size: 30px;
    font-weight: 900;
    margin-bottom: 18px;
}
.popup-btn {
    display: block;
    width: 88%;
    margin: 12px auto;
    padding: 16px;
    border-radius: 12px;
    font-size: 22px;
    font-weight: 900;
    color: white;
    text-align: center;
    text-decoration: none;
}
.deposit { background: #0fae5f; }
.withdraw { background: #2d3bff; }
.requests { background: #444; }
.close { background: #222; }
.input {
    width: 88%;
    margin: 10px auto;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #0a0a0a;
    color: white;
    font-size: 20px;
    display: block;
}
</style>
</head>
<body>

<div class="logo-container">
    <img class="logo-img" src="https://s.iimg.su/s/27/th_gUGAYHNxzvdL0q4z4RtJ3MTczQgABWbj3CiQzDbg.png">
</div>

<div class="balance-line">
    <div class="wallet-btn" onclick="openWallet()">
        <img src="https://s.iimg.su/s/27/th_gVTKvgYxlVLVCHeoKfzTYmVhtY7MK5fwDzQtsOJ7.png" class="wallet-icon">
    </div>
    <div id="top-balance" class="balance-btn">БАЛАНС: 0 VC</div>
</div>

<div class="mid-menu">
    <div class="mid-btn bonus-btn"><img class="icon" src="https://i.postimg.cc/SQfbw6BG/Picsart-25-11-27-22-07-50-919.png"> БОНУСЫ</div>
    <div class="mid-btn profile-btn" onclick="openProfile()"><img class="icon" src="https://i.postimg.cc/j29ZmdbT/Picsart-25-11-27-23-26-25-371.png"> ПРОФИЛЬ</div>
    <a class="mid-btn support-btn" href="https://t.me/vezusmanager" target="_blank"><img class="icon" src="https://i.postimg.cc/mrG6TDFb/Picsart-25-11-27-22-46-44-567.png"> ПОДДЕРЖКА</a>
</div>

<div class="big-blocks">
    <div class="block">ИГРЫ</div>
    <div class="block">UC</div>
</div>

<!-- POPUP — КОШЕЛЁК -->
<div id="wallet" class="popup">
  <div class="popup-box">
    <div class="popup-title">💼 Кошелёк</div>
    <a class="popup-btn deposit" onclick="openDeposit()">Пополнить</a>
    <a class="popup-btn withdraw" onclick="openWithdraw()">Вывести</a>
    <a class="popup-btn requests" onclick="openRequests()">Заявки</a>
    <a class="popup-btn close" onclick="closeAll()">Закрыть</a>
  </div>
</div>

<!-- POPUP — ПОПОЛНЕНИЕ -->
<div id="deposit" class="popup">
  <div class="popup-box">
    <div class="popup-title">Пополнение — СБП</div>
    <input id="depSum" class="input" type="number" placeholder="Сумма в ₽">
    <a class="popup-btn deposit" onclick="sendDeposit()">Отправить заявку</a>
    <a class="popup-btn close" onclick="closeAll()">Назад</a>
  </div>
</div>

<!-- POPUP — ВЫВОД -->
<div id="withdraw" class="popup">
  <div class="popup-box">
    <div class="popup-title">Вывод</div>
    <input id="withSum" class="input" type="number" placeholder="Сумма в VC">
    <input id="withRek" class="input" type="text" placeholder="Реквизиты (СБП / карта)">
    <a class="popup-btn withdraw" onclick="sendWithdraw()">Создать заявку</a>
    <a class="popup-btn close" onclick="closeAll()">Назад</a>
  </div>
</div>

<!-- POPUP — ПРОФИЛЬ -->
<div id="profile" class="popup">
  <div class="popup-box">
    <div class="popup-title">👤 Профиль</div>
    <div style="text-align:center;margin-bottom:12px" id="profBalance">Баланс: 0 VC</div>
    <a class="popup-btn close" onclick="closeAll()">Закрыть</a>
  </div>
</div>

<!-- POPUP — ЗАЯВКИ -->
<div id="req" class="popup">
  <div class="popup-box">
    <div class="popup-title">📄 Заявки</div>
    <div id="reqList" style="max-height:300px;overflow:auto;font-size:18px"></div>
    <a class="popup-btn close" onclick="closeAll()">Закрыть</a>
  </div>
</div>

<script>
/* ===== ДАННЫЕ ===== */
let bal = +localStorage.getItem("VC_BAL") || 0;
let reqs = JSON.parse(localStorage.getItem("VC_REQ") || "[]");

function updBalance() {
  document.getElementById("top-balance").textContent = "БАЛАНС: " + bal + " VC";
  document.getElementById("profBalance").textContent = "Баланс: " + bal + " VC";
}
updBalance();

/* ===== POPUPS ===== */
function closeAll(){ document.querySelectorAll(".popup").forEach(p=>p.style.display="none"); }
function openWallet(){ closeAll(); document.getElementById("wallet").style.display="flex"; }
function openDeposit(){ closeAll(); document.getElementById("deposit").style.display="flex"; }
function openWithdraw(){ closeAll(); document.getElementById("withdraw").style.display="flex"; }
function openProfile(){ closeAll(); document.getElementById("profile").style.display="flex"; }
function openRequests(){ closeAll(); document.getElementById("req").style.display="flex"; renderRequests(); }

/* ===== ДЕПОЗИТ ===== */
function sendDeposit(){
  let sum = +document.getElementById("depSum").value;
  if(sum <= 0) return alert("Введите сумму");
  reqs.unshift({type:"dep", sum, status:"Ожидает"});
  localStorage.setItem("VC_REQ", JSON.stringify(reqs));
  document.getElementById("depSum").value = "";
  alert("Заявка на пополнение создана");
  closeAll();
}

/* ===== ВЫВОД ===== */
function sendWithdraw(){
  let sum = +document.getElementById("withSum").value;
  let rek = document.getElementById("withRek").value;
  if(sum <= 0) return alert("Введите сумму");
  if(sum > bal) return alert("Недостаточно средств");
  if(!rek) return alert("Введите реквизиты");
  reqs.unshift({type:"with", sum, rek, status:"Ожидает"});
  localStorage.setItem("VC_REQ", JSON.stringify(reqs));
  bal -= sum;
  localStorage.setItem("VC_BAL", bal);
  updBalance();
  document.getElementById("withSum").value = "";
  document.getElementById("withRek").value = "";
  alert("Заявка на вывод создана");
  closeAll();
}

/* ===== СПИСОК ЗАЯВОК ===== */
function renderRequests(){
  let box = document.getElementById("reqList");
  box.innerHTML = "";
  if(reqs.length === 0){ box.innerHTML = "<div style='text-align:center;color:#ccc'>Пока пусто</div>"; return; }
  reqs.forEach(r=>{
    box.innerHTML += `<div style="margin-bottom:12px;border-bottom:1px solid #333;padding-bottom:6px">
      <b>${r.type === "dep" ? "Пополнение +" : "Вывод -"}</b> ${r.sum} VC<br>
      ${r.rek ? "Реквизиты: " + r.rek + "<br>" : ""}
      Статус: <b>${r.status}</b>
    </div>`;
  });
}
</script>

</body>
</html>

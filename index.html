<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Vezus Game</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(to right, #1a1a1a, #000000);
    font-family: 'Montserrat', sans-serif;
    color: white;
}

/* Лого */
.logo-container {
    margin-top: 18px;
    margin-left: 22px;
}
.logo-img {
    width: 115px;
    height: auto;
}

/* Баланс + кошелёк справа */
.balance-line {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    margin-top: -85px;
    margin-right: 22px;
    gap: 12px;
}

/* Кошелёк */
.wallet-btn {
    background: linear-gradient(45deg, #00c853, #003815);
    padding: 16px;
    border-radius: 14px;
    border: 3px solid #66ff99;
    box-shadow: 0 0 26px rgba(0, 255, 120, 0.55);
    transition: 0.12s;
}
.wallet-btn:active {
    transform: scale(1.12);
}
.wallet-icon {
    width: 68px;
    height: 68px;
}

/* Баланс */
.balance-btn {
    background: #3a3a3a;
    padding: 18px 55px;
    border-radius: 14px;
    font-size: 39px;
    font-weight: 900;
}

/* Блок меню */
.mid-menu {
    display: flex;
    margin-top: 90px;
    margin-left: 22px;
    gap: 14px;
}

.mid-btn {
    padding: 28px 30px;
    border-radius: 16px;
    font-size: 33px;
    font-weight: 900;
    display: flex;
    align-items: center;
    gap: 16px;
    text-decoration: none;
    color: white;
    transition: 0.14s;
}
.mid-btn:active { transform: scale(1.12); }

/* Цвета кнопок */
.bonus-btn {
    background: linear-gradient(45deg, #ffc800, #000000);
    border: 4px solid #ffe27a;
    box-shadow: 0 0 26px rgba(255, 211, 0, 0.65);
}
.profile-btn {
    background: linear-gradient(45deg, #00c853, #000000);
    border: 4px solid #66ff99;
    box-shadow: 0 0 26px rgba(0, 255, 140, 0.6);
}
.support-btn {
    background: linear-gradient(45deg, #007bff, #000000);
    border: 4px solid #4dc7ff;
    box-shadow: 0 0 26px rgba(0, 162, 255, 0.6);
}

/* Иконки */
.icon {
    width: 78px;
    height: 78px;
}

/* Большие блоки */
.big-blocks {
    display: flex;
    margin-top: 80px;
    margin-left: 22px;
    gap: 18px;
}
.block {
    background: #3a3a3a;
    width: 29%;
    height: 380px;
    border-radius: 22px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 84px;
    font-weight: 900;
}
</style>
</head>
<body>

<!-- ЛОГО -->
<div class="logo-container">
    <img class="logo-img" src="https://s.iimg.su/s/27/th_gUGAYHNxzvdL0q4z4RtJ3MTczQgABWbj3CiQzDbg.png">
</div>

<!-- Баланс + кошелёк -->
<div class="balance-line">
    <a href="#" class="wallet-btn">
        <img src="https://s.iimg.su/s/27/th_gVTKvgYxlVLVCHeoKfzTYmVhtY7MK5fwDzQtsOJ7.png" class="wallet-icon">
    </a>
    <div class="balance-btn">БАЛАНС: 0 VC</div>
</div>

<!-- Меню -->
<div class="mid-menu">

    <div class="mid-btn bonus-btn">
        <img src="https://i.postimg.cc/SQfbw6BG/Picsart-25-11-27-22-07-50-919.png" class="icon">
        БОНУСЫ
    </div>

    <div class="mid-btn profile-btn">
        <img src="https://i.postimg.cc/j29ZmdbT/Picsart-25-11-27-23-26-25-371.png" class="icon">
        ПРОФИЛЬ
    </div>

    <a href="https://t.me/vezusmanager" class="mid-btn support-btn" target="_blank">
        <img src="https://i.postimg.cc/mrG6TDFb/Picsart-25-11-27-22-46-44-567.png" class="icon">
        ПОДДЕРЖКА
    </a>
</div>

<!-- Большие блоки -->
<div class="big-blocks">
    <div class="block">ИГРЫ</div>
    <div class="block">UC</div>
</div>

</body>
</html>

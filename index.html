<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Vezus Game</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* === ОСНОВА === */
html, body {
    margin: 0;
    height: 100%;
    background: linear-gradient(180deg, #02102A, #000000);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
}

/* === СНЕГ (ФОН) === */
#snow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
}
.snowflake {
    position: absolute;
    top: -10px;
    background: white;
    border-radius: 50%;
    opacity: 0.9;
    filter: drop-shadow(0 0 6px white);
    animation-name: fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
}
@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}

/* === ПРЕЛОАДЕР === */
#preloader {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999999;
}
#preloader img {
    width: 240px;
    animation: pulse 1.6s infinite ease-in-out;
    filter: drop-shadow(0 0 18px #ffd300);
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
}

/* === ПОКАЗ САЙТА === */
#site {
    visibility: hidden;
    opacity: 0;
    transition: opacity 1.5s ease;
    position: relative;
    z-index: 2;
}
body.show #site {
    visibility: visible;
    opacity: 1;
}

/* === МАСШТАБ === */
#content { transform-origin: top left; }
@media (max-width: 480px) {
    #content { transform: scale(0.40); width: 250%; }
}

/* === ЛОГО === */
.logo-container { display:flex; justify-content:left; margin:10px 0 0 20px; }
.logo-img { width:450px; }

/* === ДИЗАЙН === */
.balance-line{display:flex;justify-content:right;align-items:center;margin:-70px 20px 0 0}
.wallet-btn{background:linear-gradient(45deg,#0080ff,#000);padding:10px;border-radius:12px;margin-right:12px;border:3px solid #0080ff;box-shadow:0 0 18px rgba(0,162,255,.6);cursor:pointer}
.wallet-icon{width:45px}
.balance-btn{background:#3a3a3a;padding:10px 40px;border-radius:12px;font-size:30px;font-weight:900}

.mid-menu{display:flex;justify-content:left;margin:70px 0 0 20px}
.mid-btn{padding:20px 25px;border-radius:12px;font-size:28px;font-weight:900;margin:0 10px;display:flex;align-items:center;gap:12px;color:white}
.bonus-btn,.profile-btn,.support-btn{
    background:linear-gradient(45deg,#007bff,#000);
    border:3px solid #4dc7ff;
    box-shadow:0 0 18px rgba(0,162,255,.6)
}
.icon{width:60px}

.big-blocks{display:flex;justify-content:left;margin:60px 0 0 20px}
.block{background:#3a3a3a;width:28%;height:300px;border-radius:18px;margin:0 14px;display:flex;align-items:center;justify-content:center;font-size:70px;font-weight:900}

/* === ПОПАПЫ === */
.popup{position:fixed;inset:0;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,.55);z-index:999999}
.popup .box{width:92%;max-width:760px;padding:28px;border-radius:16px;background:#0f0f0f;border:2px solid #222;text-align:center}
.title{font-size:26px;font-weight:900;margin-bottom:14px}
.action{display:block;width:86%;margin:10px auto;padding:14px;border-radius:12px;color:#fff;font-weight:900;font-size:18px;background:#1b1b1b;border:1px solid #333}
.btn-deposit{background:linear-gradient(45deg,#0fae5f,#0a7a3d)}
.btn-cancel{background:#222;color:#ddd}
</style>
</head>

<body>

<!-- ❄️ СНЕГ -->
<div id="snow"></div>

<!-- ПРЕЛОАДЕР -->
<div id="preloader">
    <img src="https://i.postimg.cc/65mZ59x6/1765310429229.png">
</div>

<div id="site">
<div id="content">

<div class="logo-container">
<img class="logo-img" src="https://i.postimg.cc/zBFBjf4P/Picsart-25-12-05-23-10-11-867.png">
</div>

<div class="balance-line">
<div class="wallet-btn"><img class="wallet-icon" src="https://s.iimg.su/s/27/th_gVTKvgYxlVLVCHeoKfzTYmVhtY7MK5fwDzQtsOJ7.png"></div>
<div class="balance-btn">БАЛАНС: 0 VC</div>
</div>

<div class="mid-menu">
<div class="mid-btn bonus-btn"><img class="icon" src="https://i.postimg.cc/SQfbw6BG/Picsart-25-11-27-22-07-50-919.png">БОНУСЫ</div>
<div class="mid-btn profile-btn"><img class="icon" src="https://i.postimg.cc/j5byLHdC/Picsart-25-12-09-13-32-38-851.png">ПРОФИЛЬ</div>
<a class="mid-btn support-btn" href="https://t.me/vezusmanager" target="_blank">
<img class="icon" src="https://i.postimg.cc/mrG6TDFb/Picsart-25-11-27-22-46-44-567.png">ПОДДЕРЖКА
</a>
</div>

<div class="big-blocks">
<div class="block">ИГРЫ</div>
<div class="block">UC</div>
</div>

</div>
</div>

<script>
/* ПРЕЛОАДЕР */
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("preloader").remove();
document.body.classList.add("show");
},1200);
});

/* ❄️ СНЕГ */
const snow = document.getElementById("snow");
for(let i=0;i<80;i++){
const s=document.createElement("div");
s.className="snowflake";
const size=Math.random()*6+6;
s.style.width=size+"px";
s.style.height=size+"px";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(Math.random()*6+6)+"s";
s.style.animationDelay=Math.random()*-20+"s";
snow.appendChild(s);
}
</script>

</body>
</html>

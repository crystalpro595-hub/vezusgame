<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Vezus Game</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: linear-gradient(180deg, #02102A, #000);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
}

#preloader {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999999;
}

#site {
  visibility: hidden;
  opacity: 0;
  transition: opacity 1s ease;
}
body.show #site {
  visibility: visible;
  opacity: 1;
}

.balance-line {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  margin: 20px;
}

.wallet-btn {
  background: linear-gradient(45deg,#0080ff,#000);
  padding: 10px;
  border-radius: 12px;
  margin-right: 12px;
  border: 3px solid #0080ff;
  cursor: pointer;
}

.balance-btn {
  background: #3a3a3a;
  padding: 10px 30px;
  border-radius: 12px;
  font-size: 26px;
  font-weight: 900;
}

.mid-menu {
  display: flex;
  margin: 30px 20px;
  gap: 14px;
}

.mid-btn {
  padding: 16px 20px;
  border-radius: 12px;
  font-size: 20px;
  font-weight: 900;
  background: linear-gradient(45deg,#007bff,#000);
  border: 3px solid #4dc7ff;
  cursor: pointer;
}

.popup {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,.6);
  z-index: 9999;
}

.popup .box {
  background: #0f0f0f;
  padding: 24px;
  border-radius: 16px;
  width: 90%;
  max-width: 420px;
  text-align: center;
}

.action {
  display: block;
  margin: 10px auto;
  padding: 14px;
  border-radius: 12px;
  background: #1b1b1b;
  border: 1px solid #333;
  font-weight: 900;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="preloader">
  <div style="font-size:32px;font-weight:900">VEZUS</div>
</div>

<div id="site">

  <div class="balance-line">
    <div class="wallet-btn" id="wallet-open">💳</div>
    <div class="balance-btn" id="top-balance">БАЛАНС: 0 VC</div>
  </div>

  <div class="mid-menu">
    <div class="mid-btn" id="btn-bonus">🎁 Бонусы</div>
    <div class="mid-btn" id="btn-profile">👤 Профиль</div>
  </div>

</div>

<!-- POPUPS -->
<div class="popup" id="popup-wallet">
  <div class="box">
    <div class="action" id="open-deposit">Пополнить</div>
    <div class="action" id="close-wallet">Закрыть</div>
  </div>
</div>

<div class="popup" id="popup-profile">
  <div class="box">
    <div id="profile-balance">Баланс: 0 VC</div>
    <div class="action" id="close-profile">Закрыть</div>
  </div>
</div>

<!-- SCRIPTS (ПОРЯДОК ВАЖЕН!) -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="script.js"></script>

<script>
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("preloader").remove();
    document.body.classList.add("show");
  }, 800);
});
</script>

</body>
</html>

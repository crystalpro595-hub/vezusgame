<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Vezus Game</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<!-- 🔹 TELEGRAM WEB APP -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
/* ===== ТВОЯ СТИЛИЗАЦИЯ (НЕ ТРОГАЛ) ===== */
html, body {
    margin: 0;
    height: 100%;
    background: linear-gradient(180deg, #02102A, #000000);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
}

#preloader {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999999;
}
#preloader img {
    width: 240px;
    animation: pulse 1.6s infinite ease-in-out;
    filter: drop-shadow(0 0 18px #ffd300);
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
}

#site {
    visibility: hidden;
    opacity: 0;
    transition: opacity 1.5s ease;
}
body.show #site {
    visibility: visible;
    opacity: 1;
}

.popup {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,.55);
    z-index: 999999;
}
.popup .box {
    width: 92%;
    max-width: 760px;
    padding: 28px;
    border-radius: 16px;
    background: #0f0f0f;
    border: 2px solid #222;
    text-align: center;
}
</style>
</head>

<body>

<!-- === ПРЕЛОАДЕР === -->
<div id="preloader">
    <img src="https://i.postimg.cc/65mZ59x6/1765310429229.png">
</div>

<!-- === САЙТ === -->
<div id="site">
<div id="content">

    <!-- ЛОГО -->
    <div style="margin:20px">
        <img src="https://i.postimg.cc/zBFBjf4P/Picsart-25-12-05-23-10-11-867.png" style="width:420px">
    </div>

    <!-- БАЛАНС -->
    <div class="balance-line">
        <div class="wallet-btn" id="wallet-open">💼</div>
        <div class="balance-btn" id="top-balance">БАЛАНС: 0 VC</div>
    </div>

    <!-- МЕНЮ -->
    <div class="mid-menu">
        <div class="mid-btn" id="btn-bonus">🎁 БОНУСЫ</div>
        <div class="mid-btn" id="btn-profile">👤 ПРОФИЛЬ</div>
        <a class="mid-btn" href="https://t.me/vezusmanager" target="_blank">🆘 ПОДДЕРЖКА</a>
    </div>

</div>
</div>

<!-- === POPUPS (ТВОИ, НЕ ТРОГАЛ) === -->
<div class="popup" id="popup-wallet">
  <div class="box">
    <div class="title">Кошелёк</div>
    <a class="action" id="open-deposit">Пополнить</a>
    <a class="action" id="open-withdraw">Вывести</a>
    <a class="action" id="open-requests">Заявки</a>
    <a class="action" id="close-wallet">Закрыть</a>
  </div>
</div>

<div class="popup" id="popup-deposit">
  <div class="box">
    <div class="title">Пополнение</div>
    <input id="deposit-amount" type="number" placeholder="Сумма ₽">
    <a class="action" id="to-payment">Продолжить</a>
    <a class="action" id="close-deposit">Отмена</a>
  </div>
</div>

<div class="popup" id="popup-payment">
  <div class="box">
    <div class="title">Оплата</div>
    <div id="pay-amount-text">0 ₽</div>
    <a class="action" id="confirm-paid">Я оплатил</a>
    <a class="action" id="close-payment">Отмена</a>
  </div>
</div>

<div class="popup" id="popup-withdraw">
  <div class="box">
    <div class="title">Вывод</div>
    <input id="withdraw-amount" placeholder="Сумма VC">
    <select id="withdraw-bank">
        <option>СБП</option>
        <option>Сбер</option>
    </select>
    <input id="withdraw-phone" placeholder="Телефон / карта">
    <a class="action" id="submit-withdraw">Отправить</a>
    <a class="action" id="close-withdraw">Отмена</a>
  </div>
</div>

<div class="popup" id="popup-profile">
  <div class="box">
    <div class="title">Профиль</div>
    <div id="profile-balance">Баланс: 0 VC</div>
    <div id="history-list"></div>
    <a class="action" id="close-profile">Закрыть</a>
  </div>
</div>

<div class="popup" id="popup-bonus">
  <div class="box">
    <div class="title">Бонусы</div>
    <a class="action" id="bonus-promocode">Промокод</a>
    <a class="action" id="bonus-referral">Рефералы</a>
    <a class="action" id="close-bonus">Закрыть</a>
  </div>
</div>

<div class="popup" id="popup-promocode">
  <div class="box">
    <div class="title">Промокод</div>
    <input id="promo-input" placeholder="Код">
    <a class="action" id="activate-promo">Активировать</a>
    <a class="action" id="close-promocode">Закрыть</a>
  </div>
</div>

<div class="popup" id="popup-referral">
  <div class="box">
    <div class="title">Рефералы</div>
    <div id="ref-code"></div>
    <a class="action" id="close-referral">Закрыть</a>
  </div>
</div>

<!-- === SUPABASE + SCRIPT === -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="script.js"></script>

<script>
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("preloader")?.remove();
        document.body.classList.add("show");
    }, 800);
});
</script>

</body>
</html>

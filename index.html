<!DOCTYPE html>
<html lang="ru">
<head>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Vezus Game</title>
<style>
body {
    margin: 0;
    background: linear-gradient(to right, #1a1a1a, #000000);
    font-family: 'Montserrat', sans-serif;
    color: white;
}

/* Убираем надпись index.html у Github Pages */
h1 {
    visibility: hidden;
    height: 0;
    margin: 0;
    padding: 0;
}

/* БАЛАНС — отдельная строка */
.balance-line {
    display: flex;
    justify-content: left;
    margin-top: 20px;
}
.balance-btn {
    background: #3a3a3a;
    padding: 10px 40px;
    border-radius: 12px;
    font-size: 30px;
    font-weight: 900;
    text-decoration: none;
    color: white;
}

/* Три кнопки в ряд */
.mid-menu {
    display: flex;
    justify-content: left;
    margin-top: 25px;
}
.mid-btn {
    background: #3a3a3a;
    padding: 20px 25px;
    border-radius: 12px;
    font-size: 28px;
    font-weight: 900;
    margin: 0 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    color: white;
}

/* Кнопка поддержки — премиум Telegram */
.support-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(45deg, #007bff, #00a2ff);
    border: 3px solid #4dc7ff;
    box-shadow: 0 0 18px rgba(0, 162, 255, 0.6);
}

/* Логотип Telegram */
.tg-icon {
    width: 32px;
    height: 32px;
}

/* Два больших блока */
.big-blocks {
    display: flex;
    justify-content: left;
    margin-top: 60px;
}
.block {
    background: #3a3a3a;
    width: 28%;
    height: 300px;
    border-radius: 18px;
    margin: 0 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 70px;
    font-weight: 900;
}
</style>
</head>
<body>

<div class="balance-line">
    <a href="balance.html" class="balance-btn">БАЛАНС:</a>
</div>

<div class="mid-menu">
    <div class="mid-btn">БОНУСЫ</div>

    <!-- Поддержка с логотипом Telegram -->
    <a href="https://t.me/vezusmanager" class="mid-btn support-btn" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="tg-icon">
        ПОДДЕРЖКА
    </a>

    <div class="mid-btn">ПРОФИЛЬ</div>
</div>

<div class="big-blocks">
    <div class="block">ИГРЫ</div>
    <div class="block">UC</div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
<style>
body{background:#111;color:#fff;font-family:Arial;padding:20px;display:flex;gap:20px}
.column{flex:1}
.item{background:#1e1e1e;padding:15px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
button{padding:6px 12px;border-radius:6px;border:none;font-weight:bold;cursor:pointer}
.ok{background:#2ecc71;color:#000}
.no{background:#e74c3c;color:#fff;margin-left:6px}
.meta{font-size:12px;opacity:.7;margin-top:4px}
h2{margin-bottom:15px}
</style>
</head>
<body>

<div class="column">
  <h2>💰 Депозиты</h2>
  <div id="deposit-list">Загрузка...</div>
</div>

<div class="column">
  <h2>🏦 Выводы</h2>
  <div id="withdraw-list">Загрузка...</div>
</div>

<script>
const ADMIN_TOKEN = "@smoke2323j228";
const ADMIN_DEPOSITS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const ADMIN_WITHDRAWS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";

async function loadDeposits(){
  const list=document.getElementById("deposit-list");
  list.innerHTML="";
  try{
    const r=await fetch(ADMIN_DEPOSITS_API,{headers:{"x-admin-token":ADMIN_TOKEN}});
    if(r.status===401) return list.innerText="Ошибка 401: нет доступа";
    const d=await r.json();
    if(!d.length) return list.innerText="Заявок нет";
    d.forEach(x=>{
      list.innerHTML+=`<div class="item">
        <div>
          <b>➕ ${x.amount_vc} VC</b>
          <div class="meta">user_id: ${x.user_id}</div>
          <div class="meta">Дата: ${new Date(x.created_at).toLocaleString()}</div>
        </div>
        <div>
          <button class="ok" onclick="depositAction('${x.id}','approve')">OK</button>
          <button class="no" onclick="depositAction('${x.id}','reject')">NO</button>
        </div>
      </div>`;
    });
  }catch{
    list.innerText="Ошибка загрузки депозитов";
  }
}

async function loadWithdrawals(){
  const list=document.getElementById("withdraw-list");
  list.innerHTML="";
  try{
    const r=await fetch(ADMIN_WITHDRAWS_API,{headers:{"x-admin-token":ADMIN_TOKEN}});
    if(r.status===401) return list.innerText="Ошибка 401: нет доступа";
    const d=await r.json();
    if(!d.length) return list.innerText="Заявок нет";
    d.forEach(x=>{
      list.innerHTML+=`<div class="item">
        <div>
          <b>💸 ${x.amount} VC</b>
          <div class="meta">user_id: ${x.user_id}</div>
          <div class="meta">Кошелёк: ${x.address || x.requisites}</div>
          <div class="meta">Дата: ${new Date(x.created_at).toLocaleString()}</div>
        </div>
        <div>
          <button class="ok" onclick="withdrawAction('${x.id}','approve')">OK</button>
          <button class="no" onclick="withdrawAction('${x.id}','reject')">NO</button>
        </div>
      </div>`;
    });
  }catch{
    list.innerText="Ошибка загрузки выводов";
  }
}

window.depositAction=async(id,a)=>{
  await fetch(ADMIN_DEPOSITS_API,{method:"POST",headers:{"Content-Type":"application/json","x-admin-token":ADMIN_TOKEN},body:JSON.stringify({id,action:a})});
  loadDeposits();
}

window.withdrawAction=async(id,a)=>{
  await fetch(ADMIN_WITHDRAWS_API,{method:"POST",headers:{"Content-Type":"application/json","x-admin-token":ADMIN_TOKEN},body:JSON.stringify({id,action:a})});
  loadWithdrawals();
}

loadDeposits();
loadWithdrawals();
</script>

</body>
</html>

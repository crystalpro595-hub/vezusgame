<script>
const API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const ADMIN_TOKEN = "@smoke2323j228";

async function load() {
  const list = document.getElementById("list");

  try {
    const r = await fetch(API, {
      headers: {
        "x-admin-token": ADMIN_TOKEN
      }
    });

    if (!r.ok) throw new Error(await r.text());

    const data = await r.json();
    list.innerHTML = "";

    if (!data.length) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";

      let status = "⏳ В процессе";
      if (d.status === "success") status = "✅ Успешно";
      if (d.status === "rejected") status = "❌ Отказ";

      div.innerHTML = `
        <div>
          <b>${d.amount} ₽</b>
          <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
          <div class="meta">${status}</div>
        </div>
        <div>
          ${d.status === "waiting" ? `
            <button class="ok" onclick="action('${d.id}','approve')">Одобрить</button>
            <button class="no" onclick="action('${d.id}','reject')">Отказ</button>
          ` : ""}
        </div>
      `;

      list.appendChild(div);
    });

  } catch (e) {
    list.innerText = "❌ Ошибка соединения";
    console.error("ADMIN LOAD ERROR:", e);
  }
}

async function action(id, type) {
  try {
    const r = await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-token": ADMIN_TOKEN
      },
      body: JSON.stringify({ id, action: type })
    });

    if (!r.ok) {
      throw new Error(await r.text());
    }

    await load();

  } catch (e) {
    alert("Ошибка действия, смотри консоль");
    console.error("ADMIN ACTION ERROR:", e);
  }
}

load();
</script>

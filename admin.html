<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
}
h2 { margin-bottom: 15px; }
.item {
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button {
  padding:6px 12px;
  border-radius:6px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.ok { background:#2ecc71; color:#000; }
.no { background:#e74c4c; color:#fff; margin-left:6px; }
.meta { font-size:13px; opacity:.7; }
</style>
</head>
<body>

<h2>💳 Заявки на пополнение</h2>
<div id="deposit-list">Загрузка…</div>

<h2>💸 Заявки на вывод</h2>
<div id="withdraw-list">Загрузка…</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = "ciqyzrgiuvxmhxgladxu.supabase.co";
const ADMIN_WITHDRAWS_API = `https://${SUPABASE_URL}/functions/v1/admin-withdraws`;
const ADMIN_DEPOSITS_API = `https://${SUPABASE_URL}/functions/v1/admin-deposits`;
const ADMIN_TOKEN = "@smoke2323j228";

// загружаем выводы
async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");
  list.innerText = "Загрузка…";

  const res = await fetch(ADMIN_WITHDRAWS_API, {
    headers: { "x-admin-token": ADMIN_TOKEN }
  });

  if (!res.ok) {
    list.innerText = "❌ Ошибка загрузки выводов";
    return;
  }

  const data = await res.json();
  list.innerHTML = "";

  if (!Array.isArray(data) || data.length === 0) {
    list.innerText = "Заявок на вывод нет";
    return;
  }

  data.forEach(w => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div>
        <b>${w.amount} VC</b>
        <div class="meta">user_id: ${w.user_id}</div>
        <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
        <div class="meta">статус: ${w.status}</div>
      </div>
      <div>
        ${w.status === "waiting" ? `
          <button class="ok" onclick="withdrawAction('${w.id}','approve')">Одобрить</button>
          <button class="no" onclick="withdrawAction('${w.id}','reject')">Отказать</button>
        ` : ""}
      </div>
    `;
    list.appendChild(div);
  });
}

// одобрить/отклонить вывод
window.withdrawAction = async (id, type) => {
  await fetch(ADMIN_WITHDRAWS_API, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-admin-token": ADMIN_TOKEN
    },
    body: JSON.stringify({ id, action: type })
  });
  loadWithdrawals();
};

loadWithdrawals();
loadDeposits();
</script>

</body>
</html>

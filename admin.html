<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>
body{font-family:sans-serif;background:#111;color:#fff;margin:0;padding:20px}
.item{display:flex;justify-content:space-between;background:#1a1a1a;padding:12px;border-radius:8px;margin-bottom:10px}
button{padding:6px 12px;border:none;border-radius:6px;cursor:pointer}
.ok{background:#2ecc71;color:#000}
.no{background:#e74c3c;color:#000}
.meta{font-size:13px;color:#888;margin-top:4px}
#withdraw-list, #deposit-list, #history-list{margin-top:15px}
.section{margin-bottom:30px}
</style>
</head>
<body>

<h2>🔐 Админ панель</h2>

<div class="section">
  <h3>💸 Заявки на вывод</h3>
  <div id="withdraw-list">Загрузка...</div>
</div>

<div class="section">
  <h3>📥 История (пополнения + выводы)</h3>
  <div id="history-list"></div>
</div>

<script>
const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";

// 🔥 ВСТАВЬ СЮДА СВОЙ SERVICE_ROLE КЛЮЧ
const SERVICE_ROLE = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpcXl6cmdpdXZ4bWh4Z2xhZHh1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NTQ1ODMwMiwiZXhwIjoyMDgxMDM0MzAyfQ.muYuEoKV63vDFs4s3lxEwHZJc1r3z06GcQNKlLAauEg";

const ADMIN_TOKEN = "my_admin_secret_token"; // можно заменить на свой

const ADMIN_WITHDRAWS_API = SUPABASE_URL + "/functions/v1/admin-withdraws";

async function loadWithdrawals(){
  const list = document.getElementById("withdraw-list");
  try{
    const res = await fetch(ADMIN_WITHDRAWS_API, {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + SERVICE_ROLE,
        "x-admin-token": ADMIN_TOKEN
      }
    });

    if(res.status === 401){
      list.innerText = "⛔ Ошибка 401 — Нет доступа. Проверь ключ.";
      return;
    }

    const data = await res.json();
    list.innerHTML = "";

    if(!Array.isArray(data) || data.length === 0){
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(w => {
      list.innerHTML += `
      <div class="item">
        <div>
          <b>Сумма:</b> ${w.amount} VC
          <div class="meta"><b>User ID:</b> ${w.user_id}</div>
          <div class="meta"><b>Кошелёк:</b> ${w.address}</div>
          <div class="meta"><b>Статус:</b> ${w.status}</div>
          <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
        </div>
        <div>
          <button class="ok" onclick="withdrawAction('${w.id}', 'approve')">OK</button>
          <button class="no" onclick="withdrawAction('${w.id}', 'reject')">NO</button>
        </div>
      </div>`;
    });

  } catch(e){
    console.error(e);
    list.innerText = "Ошибка загрузки";
  }
}

async function withdrawAction(id, action){
  try{
    const res = await fetch(ADMIN_WITHDRAWS_API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + SERVICE_ROLE,
        "x-admin-token": ADMIN_TOKEN
      },
      body: JSON.stringify({ id, action })
    });

    const result = await res.json();
    if(result.error){
      alert("Ошибка: " + result.error);
      return;
    }

    alert("Успешно обновлено");
    loadWithdrawals();
  } catch(e){
    console.error(e);
    alert("Ошибка запроса");
  }
}

async function loadHistory(){
  const list = document.getElementById("history-list");
  list.innerHTML = "";

  // Загружаем депозиты
  const depRes = await fetch(SUPABASE_URL + "/rest/v1/deposits?select=amount_vc,status,created_at", {
    headers: { "apikey": SERVICE_ROLE, "Authorization": "Bearer " + SERVICE_ROLE }
  });
  const dep = await depRes.json();

  // Загружаем выводы
  const wdRes = await fetch(SUPABASE_URL + "/rest/v1/withdrawals?select=amount,address,status,created_at", {
    headers: { "apikey": SERVICE_ROLE, "Authorization": "Bearer " + SERVICE_ROLE }
  });
  const wd = await wdRes.json();

  if(!dep.length && !wd.length){
    list.innerHTML = "<div class='meta'>Операций пока нет</div>";
    return;
  }

  dep.forEach(d => {
    list.innerHTML += `
    <div class="item">
      <div>
        <b>➕ Пополнение</b>
        <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
      </div>
      <div style="text-align:right">
        <b>${d.amount_vc} VC</b><br>
        <span>${d.status}</span>
      </div>
    </div>`;
  });

  wd.forEach(w => {
    list.innerHTML += `
    <div class="item">
      <div>
        <b>💸 Вывод</b>
        <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
        <div class="meta">${w.address}</div>
      </div>
      <div style="text-align:right">
        <b>${w.amount} VC</b><br>
        <span>${w.status}</span>
      </div>
    </div>`;
  });
}

loadWithdrawals();
loadHistory();
</script>

</body>
</html>

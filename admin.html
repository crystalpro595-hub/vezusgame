<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
<style>
body{background:#111;color:#fff;font-family:Arial;padding:20px}
.item{background:#1e1e1e;padding:15px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between}
button{padding:6px 12px;border-radius:6px;border:none;font-weight:bold}
.ok{background:#2ecc71;color:#000}
.no{background:#e74c3c;color:#fff;margin-left:6px}
.meta{font-size:13px;opacity:.7}
</style>
</head>
<body>

<h2>💳 Заявки на пополнение</h2>
<div id="deposit-list">Загрузка…</div>

<h2>💸 Заявки на вывод</h2>
<div id="withdraw-list">—</div>

<script>
const ADMIN_DEPOSITS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const ADMIN_WITHDRAWS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";
const ADMIN_TOKEN = "@smoke2323j228";

async function loadDeposits(){
  const r = await fetch(ADMIN_DEPOSITS_API,{headers:{"x-admin-token":ADMIN_TOKEN}});
  const d = await r.json();
  const list = document.getElementById("deposit-list");
  list.innerHTML = d.map(x=>`
    <div class="item">
      <div><b>${x.amount_vc} VC</b>
        <div class="meta">user_id: ${x.user_id}</div>
        <div class="meta">${x.status}</div>
      </div>
    </div>`).join("");
}

async function loadWithdraws(){
  const list = document.getElementById("withdraw-list");
  list.innerHTML = "Загрузка…";

  try{
    const r = await fetch(ADMIN_WITHDRAWS_API,{headers:{"x-admin-token":ADMIN_TOKEN}});
    const d = await r.json();

    if(!Array.isArray(d) || d.length===0){
      list.innerHTML = "Заявок на вывод нет";
      return;
    }

    list.innerHTML = d.map(w=>`
      <div class="item">
        <div>
          <b>${w.amount} VC</b>
          <div class="meta">user_id: ${w.user_id}</div>
          <div class="meta">реквизиты: ${w.requisites}</div>
          <div class="meta">${w.status}</div>
        </div>
        <div>
          ${w.status==="waiting" ? `
            <button class="ok" onclick="withdrawAction('${w.id}','approve')">Одобрить</button>
            <button class="no" onclick="withdrawAction('${w.id}','reject')">Отказать</button>
          `:""}
        </div>
      </div>`).join("");

  }catch(e){
    list.innerHTML = "Ошибка загрузки выводов";
  }
}

window.withdrawAction = async(id,action)=>{
  await fetch(ADMIN_WITHDRAWS_API,{
    method:"POST",
    headers:{"Content-Type":"application/json","x-admin-token":ADMIN_TOKEN},
    body:JSON.stringify({id,action})
  });
  loadWithdraws();
}

loadDeposits();
loadWithdraws();
</script>

</body>
</html>

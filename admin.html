<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
<style>
body{background:#111;color:#fff;font-family:Arial;padding:20px;display:flex;gap:20px}
.column{flex:1}
.item{background:#1e1e1e;padding:15px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
button{padding:6px 12px;border-radius:6px;border:none;font-weight:bold;cursor:pointer}
.ok{background:#2ecc71;color:#000}
.no{background:#e74c3c;color:#fff;margin-left:6px}
.meta{font-size:12px;opacity:.7;margin-top:4px}
.address{font-size:12px;opacity:.5;margin-top:2px}
</style>
</head>
<body>

<div class="column">
<h2>Депозиты</h2>
<div id="deposit-list"></div>
</div>

<div class="column">
<h2>Выводы</h2>
<div id="withdraw-list"></div>
</div>

<script>
const ADMIN_TOKEN = "@smoke2323j228";
const DEPOSITS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const WITHDRAWS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";

async function load(url, element){
  element.innerText="Загрузка...";
  try{
    const r = await fetch(url, { headers: { "x-admin-token": ADMIN_TOKEN } });
    const d = await r.json();

    if(!r.ok){
      element.innerText = d.error || "Ошибка загрузки";
      return;
    }

    if(!d.length){
      element.innerText="Список пуст";
      return;
    }

    element.innerHTML="";
    d.forEach(x=>{
      element.innerHTML+=`<div class="item">
        <div>
          <b>${x.amount}</b>
          <div class="meta">${x.user_id}</div>
          <div class="address">${x.address || ""}</div>
        </div>
        <div>
          <button class="ok" onclick="action('${url}','${x.id}','approve')">OK</button>
          <button class="no" onclick="action('${url}','${x.id}','reject')">NO</button>
        </div>
      </div>`;
    });
  }catch(err){
    element.innerText="Ошибка загрузки";
    console.error(err);
  }
}

async function action(url,id,a){
  await fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json","x-admin-token":ADMIN_TOKEN},
    body:JSON.stringify({id,action:a})
  });
  load(url, document.getElementById(url.includes("withdraws")?"withdraw-list":"deposit-list"));
}

load(DEPOSITS_API, document.getElementById("deposit-list"));
load(WITHDRAWS_API, document.getElementById("withdraw-list"));
</script>

</body>
</html>

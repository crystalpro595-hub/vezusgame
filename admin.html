<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>Админ панель — депозиты и выводы</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  table { margin-top: 10px; width: 100%; border-collapse: collapse; }
  th, td { padding: 8px; border: 1px solid #ccc; text-align: center; }
  button { padding: 5px 10px; cursor: pointer; }
  .section { margin-bottom: 40px; }
  #log, #dep-log { margin-top: 10px; color: red; font-weight: bold; }
</style>
</head>
<body>

<div class="section">
  <h2>Заявки на дддепозит</h2>
  <div id="dep-log"></div>
  <table>
    <thead>
      <tr><th>ID</th><th>User</th><th>Amount</th><th>Status</th><th>Date</th><th>Action</th></tr>
    </thead>
    <tbody id="dep-list"></tbody>
  </table>
</div>

<div class="section">
  <h2>Заявки на вывод</h2>
  <div id="log"></div>
  <table>
    <thead>
      <tr><th>ID</th><th>User</th><th>Amount</th><th>Status</th><th>Date</th><th>Action</th></tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

<script>
const TOKEN = "@smoke2323j228";

const DEP_ENDPOINT = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const WITH_ENDPOINT = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";

// ---------- LOAD DEPOSITS ----------
async function loadDeposits() {
  try {
    const res = await fetch(DEP_ENDPOINT, {
      method: "GET",
      headers: {
        "Content-Type": "application/json",
        "x-admin-token": TOKEN
      }
    });

    if (!res.ok) throw await res.text();

    const data = await res.json();
    document.getElementById("dep-log").innerText = "Loaded deposits: " + data.length;

    const box = document.getElementById("dep-list");
    box.innerHTML = "";

    data.forEach(d => {
      box.innerHTML += `
        <tr>
          <td>${d.id}</td>
          <td>${d.user_id}</td>
          <td>${d.amount}</td>
          <td>${d.status}</td>
          <td>${d.created_at}</td>
          <td>
            <button onclick="depAct('${d.id}','approve')">Approve</button>
            <button onclick="depAct('${d.id}','reject')">Reject</button>
          </td>
        </tr>`;
    });

    if (data.length === 0) {
      box.innerHTML = `<tr><td colspan="6">Заявок нет</td></tr>`;
    }

  } catch(e) {
    document.getElementById("dep-log").innerText = "Ошибка загрузки депозитов: " + e;
  }
}

async function depAct(id, action) {
  await fetch(DEP_ENDPOINT, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-token": TOKEN
    },
    body: JSON.stringify({id, action})
  });
  loadDeposits();
}

// ---------- LOAD WITHDRAWS ----------
async function loadWithdraws() {
  try {
    const res = await fetch(WITH_ENDPOINT, {
      method: "GET",
      headers: {
        "Content-Type": "application/json",
        "x-admin-token": TOKEN
      }
    });

    if (!res.ok) throw await res.text();

    const data = await res.json();
    document.getElementById("log").innerText = "Loaded withdraws: " + data.length;

    const box = document.getElementById("list");
    box.innerHTML = "";

    data.forEach(w => {
      box.innerHTML += `
        <tr>
          <td>${w.id}</td>
          <td>${w.user_id}</td>
          <td>${w.amount}</td>
          <td>${w.status}</td>
          <td>${w.created_at}</td>
          <td>
            <button onclick="withAct('${w.id}','approve')">Approve</button>
            <button onclick="withAct('${w.id}','reject')">Reject</button>
          </td>
        </tr>`;
    });

    if (data.length === 0) {
      box.innerHTML = `<tr><td colspan="6">Заявок нет</td></tr>`;
    }

  } catch(e) {
    document.getElementById("log").innerText = "Ошибка загрузки выводов: " + e;
  }
}

async function withAct(id, action) {
  await fetch(WITH_ENDPOINT, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-token": TOKEN
    },
    body: JSON.stringify({id, action})
  });
  loadWithdraws();
}

// ---------- INIT ----------
loadDeposits();
loadWithdraws();
</script>

</body>
</html>

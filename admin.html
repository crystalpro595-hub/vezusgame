<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
  display:flex;
  gap:20px;
}
.column {
  flex:1;
}
.item {
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button {
  padding:6px 12px;
  border-radius:6px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.ok { background:#2ecc71; color:#000; }
.no { background:#e74c3c; color:#fff; margin-left:6px; }
.meta { font-size:13px; opacity:.7; }
</style>
</head>
<body>

<div class="column">
  <h2>💰 Заявки на депозит</h2>
  <div id="deposit-list">Загрузка…</div>
</div>

<div class="column">
  <h2>🏦 Заявки на вывод</h2>
  <div id="withdraw-list">Загрузка…</div>
</div>

<script>
const ADMIN_TOKEN = "@smoke2323j228";

async function loadDeposits() {
  const list = document.getElementById("deposit-list");
  list.innerHTML = "⏳ Загружаем депозиты…";

  try {
    const res = await fetch("/functions/v1/admin-deposits", {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    list.innerHTML = "";
    if (!data?.length) {
      list.innerText = "Нет заявок на депозит";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div>
          <b>${d.amount} VC</b>
          <div class="meta">user_id: ${d.user_id}</div>
          <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
          <div class="meta">Статус: ${d.status}</div>
        </div>
        <div>
          ${d.status === "waiting" ? `
            <button class="ok" onclick="depositAction('${d.id}','approve')">Одобрить</button>
            <button class="no" onclick="depositAction('${d.id}','reject')">Отказать</button>
          ` : ""}
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки депозитов";
    console.error(e);
  }
}

async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");
  list.innerHTML = "⏳ Загружаем выводы…";

  try {
    const res = await fetch("/functions/v1/admin-withdraws", {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    list.innerHTML = "";
    if (!data?.length) {
      list.innerText = "Нет заявок на вывод";
      return;
    }

    data.forEach(w => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div>
          <b>${w.amount} VC</b>
          <div class="meta">user_id: ${w.user_id}</div>
          <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
          <div class="meta">Статус: ${w.status}</div>
        </div>
        <div>
          ${w.status === "waiting" ? `
            <button class="ok" onclick="withdrawAction('${w.id}','approve')">Одобрить</button>
            <button class="no" onclick="withdrawAction('${w.id}','reject')">Отказать</button>
          ` : ""}
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки выводов";
    console.error(e);
  }
}

window.depositAction = async (id, action) => {
  await fetch("/functions/v1/admin-deposits", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-admin-token": ADMIN_TOKEN
    },
    body: JSON.stringify({ id, action })
  });
  loadDeposits();
};

window.withdrawAction = async (id, action) => {
  await fetch("/functions/v1/admin-withdraws", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-admin-token": ADMIN_TOKEN
    },
    body: JSON.stringify({ id, action })
  });
  loadWithdrawals();
};

loadDeposits();
loadWithdrawals();
</script>

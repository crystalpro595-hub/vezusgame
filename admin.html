<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>
body{background:#111;color:#fff;font-family:Arial;padding:20px;display:flex;gap:20px}
.column{flex:1}
.item{background:#1e1e1e;padding:15px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between}
button{padding:6px 12px;border-radius:6px;border:none;font-weight:bold;cursor:pointer}
.ok{background:#2ecc71;color:#000}
.no{background:#e74c3c;color:#fff;margin-left:6px}
.meta{font-size:12px;opacity:.7}
</style>
</head>
<body>

<div class="column">
<h2>💰 Депозиты</h2>
<div id="deposit-list">Загрузка...</div>
</div>

<div class="column">
<h2>🏦 Выводы</h2>
<div id="withdraw-list">Загрузка...</div>
</div>

<script>
const ADMIN_TOKEN = "@smoke2323j228";
const depositList = document.getElementById("deposit-list");
const withdrawList = document.getElementById("withdraw-list");

async function loadDeposits(){
  try{
    const r = await fetch("admin-deposits", {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });
    const d = await r.json();
    depositList.innerHTML="";
    if(!d.length){ depositList.innerText="Нет заявок"; return }
    d.forEach(x=>{
      depositList.innerHTML+=`<div class="item">
        <div><b>${x.amount_vc}</b><div class="meta">${x.user_id}</div></div>
        <div><button class="ok" onclick="depositAction('${x.id}','approve')">OK</button>
        <button class="no" onclick="depositAction('${x.id}','reject')">NO</button></div>
      </div>`;
    });
  }catch{ depositList.innerText="Ошибка загрузки депозитов"; }
}

async function loadWithdrawals(){
  try{
    const r = await fetch("admin-withdraws", {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });
    const d = await r.json();
    withdrawList.innerHTML="";
    if(!d.length){ withdrawList.innerText="Нет заявок"; return }
    d.forEach(x=>{
      withdrawList.innerHTML+=`<div class="item">
        <div><b>${x.amount}</b><div class="meta">${x.user_id}</div>
        <div class="meta">${x.address}</div></div>
        <div><button class="ok" onclick="withdrawAction('${x.id}','approve')">OK</button>
        <button class="no" onclick="withdrawAction('${x.id}','reject')">NO</button></div>
      </div>`;
    });
  }catch{ withdrawList.innerText="Ошибка загрузки выводов"; }
}

window.depositAction=async(id,a)=>{
  await fetch("admin-deposits", {
    method:"POST",
    headers:{ "Content-Type":"application/json","x-admin-token":ADMIN_TOKEN },
    body: JSON.stringify({ id, action:a })
  });
  loadDeposits();
}

window.withdrawAction=async(id,a)=>{
  await fetch("admin-withdraws", {
    method:"POST",
    headers:{ "Content-Type":"application/json","x-admin-token":ADMIN_TOKEN },
    body: JSON.stringify({ id, action:a })
  });
  loadWithdrawals();
}

loadDeposits();
loadWithdrawals();
</script>

</body>
</html>

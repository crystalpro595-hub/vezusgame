<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
<style>
body { background:#111; color:#fff; font-family:Arial; padding:20px; display:flex; gap:20px; }
.column { flex:1; }
.item { background:#1e1e1e; padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; }
button { padding:6px 12px; border-radius:6px; border:none; font-weight:bold; cursor:pointer; }
.ok { background:#2ecc71; color:#000; }
.no { background:#e74c3c; color:#fff; margin-left:6px; }
.meta { font-size:12px; opacity:.6; }
</style>
</head>
<body>

<div class="column">
  <h2>💰 Депозиты</h2>
  <div id="deposit-list">⏳</div>
</div>

<div class="column">
  <h2>🏦 Выводы</h2>
  <div id="withdraw-list">⏳</div>
</div>

<script>
const TOKEN = "@smoke2323j228";
const DEPOSIT_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const WITHDRAW_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";

/* Депозиты (оставляем как есть) */
async function loadDeposits() {
  const list = document.getElementById("deposit-list");
  try {
    const r = await fetch(DEPOSIT_API, { headers: { "x-admin-token": TOKEN }});
    if (!r.ok) throw 1;
    const d = await r.json();
    list.innerHTML = "";
    d.forEach(x => list.innerHTML += `<div class="item"><div><b>${x.amount}</b><div class="meta">${x.status}</div></div></div>`);
  } catch { list.innerText = "❌ депозиты не грузят"; }
}

/* Выводы (отправляем токен как Authorization Bearer!) */
async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");
  try {
    const r = await fetch(WITHDRAW_API, {
      headers: { "Authorization": "Bearer " + TOKEN }
    });
    if (!r.ok) throw 1;
    const d = await r.json();
    list.innerHTML = "";
    d.forEach(x => list.innerHTML += `<div class="item"><div><b>${x.amount}</b><div class="meta">${x.status}</div></div></div>`);
  } catch { list.innerText = "❌ выводы не грузят"; }
}

/* Старт */
loadDeposits();
loadWithdrawals();
</script>

</body>
</html>

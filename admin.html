<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
<style>
body { background:#111; color:#fff; font-family:Arial; padding:20px; display:flex; gap:20px; }
.column { flex:1; }
.item { background:#1e1e1e; padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; }
button { padding:6px 12px; border-radius:6px; border:none; font-weight:bold; cursor:pointer; }
.ok { background:#2ecc71; color:#000; }
.no { background:#e74c3c; color:#fff; margin-left:6px; }
.meta { font-size:13px; opacity:.7; }
</style>
</head>
<body>

<div class="column">
  <h2>💳 Депозиты</h2>
  <div id="deposit-list">Загрузка…</div>
</div>

<div class="column">
  <h2>🏦 Выводы</h2>
  <div id="withdraw-list">Загрузка…</div>
</div>

<script>
const TOKEN = "@smoke2323j228";
const WD_API = "admin-withdraws_API"; // ← ВАЖНО! Меняем имя API на читаемое из секретов

async function loadWithdrawals() {
  const el = document.getElementById("withdraw-list");
  try {
    const res = await fetch(WD_API, {
      headers: { "x-admin-token": TOKEN }
    });

    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    el.innerHTML = "";

    if (!Array.isArray(data) || data.length === 0) {
      el.innerText = "Заявок на вывод нет";
      return;
    }

    data.forEach(w => {
      el.innerHTML += `
      <div class="item">
        <div>
          <b>${w.amount} VC</b>
          <div class="meta">User: ${w.user_id}</div>
          <div class="meta">Реквизиты: ${w.requisites}</div>
          <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
          <div class="meta">Статус: ${w.status}</div>
        </div>
        <div>
          ${w.status === "waiting" ? `
            <button class="ok" onclick="withdraw('${w.id}','approve')">✔ Принять</button>
            <button class="no" onclick="withdraw('${w.id}','reject')">✖ Отказать</button>
          ` : ""}
        </div>
      </div>`;
    });

  } catch(e) {
    el.innerText = "❌ Ошибка загрузки выводов";
  }
}

async function withdraw(id, act) {
  await fetch(WD_API, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-token": TOKEN },
    body: JSON.stringify({ id, action: act })
  });
  loadWithdrawals();
}

window.withdraw = withdraw;
loadWithdrawals();
</script>

</body>
</html>

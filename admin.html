<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
  display:flex;
  gap:20px;
}
.column {
  width:50%;
}
.item {
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button {
  padding:6px 12px;
  border-radius:6px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.ok { background:#2ecc71; color:#000; }
.no { background:#e74c3c; color:#fff; margin-left:6px; }
.meta { font-size:13px; opacity:.7; }
</style>
</head>
<body>

<div class="column">
  <h2>💰 Заявки на депозит</h2>
  <div id="deposit-list">Загрузка…</div>
</div>

<div class="column">
  <h2>🏦 Заявки на вывод</h2>
  <div id="withdraw-list">Загрузка…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const ADMIN_DEPOSITS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const ADMIN_WITHDRAWS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";
const ADMIN_TOKEN = "@smoke2323j228";

// Депозиты
async function loadDeposits() {
  const list = document.getElementById("deposit-list");
  list.innerText = "Загрузка…";

  try {
    const res = await fetch(ADMIN_DEPOSITS_API, {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });
    const data = await res.json();

    list.innerHTML = "";

    if (!data.length) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div>
          <b>${d.amount_vc} VC</b>
          <div class="meta">User: ${d.user_id}</div>
          <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
          <div class="meta">Status: ${d.status}</div>
        </div>
        <div>
          <button class="ok" onclick="depositAction('${d.id}','approve')">✔</button>
          <button class="no" onclick="depositAction('${d.id}','reject')">✖</button>
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки";
  }
}

window.depositAction = async (id, action) => {
  await fetch(ADMIN_DEPOSITS_API, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-token": ADMIN_TOKEN },
    body: JSON.stringify({ id, action })
  });
  loadDeposits();
  loadWithdrawals();
};

// Выводы
async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");
  list.innerText = "Загрузка…";

  try {
    const res = await fetch(ADMIN_WITHDRAWS_API, {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });
    const data = await res.json();

    list.innerHTML = "";

    if (!data.length) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(w => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div>
          <b>${w.amount} VC</b>
          <div class="meta">User: ${w.user_id}</div>
          <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
          <div class="meta">Status: ${w.status}</div>
        </div>
        <div>
          <button class="ok" onclick="withdrawAction('${w.id}','approve')">✔</button>
          <button class="no" onclick="withdrawAction('${w.id}','reject')">✖</button>
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки";
  }
}

window.withdrawAction = async (id, action) => {
  await fetch(ADMIN_WITHDRAWS_API, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-token": ADMIN_TOKEN },
    body: JSON.stringify({ id, action })
  });
  loadWithdrawals();
  loadDeposits();
};

loadDeposits();
loadWithdrawals();
</script>

</body>
</html>

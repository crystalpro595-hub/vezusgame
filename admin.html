<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка — депозиты</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
}

h2 {
  margin-bottom: 15px;
}

.item {
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button {
  padding:6px 12px;
  border-radius:6px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.ok {
  background:#2ecc71;
  color:#000;
}

.no {
  background:#e74c3c;
  color:#fff;
  margin-left:6px;
}

.meta {
  font-size:13px;
  opacity:.7;
}
</style>
</head>
<body>

<h2>💳 Заявки на пополнение</h2>
<div id="list">Загрузка…</div>

<script>
/* === НАСТРОЙКИ === */
const API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const ADMIN_TOKEN = "@smoke2323j228"; // ТОЧНО как в Supabase → Secrets → ADMIN_TOKEN

/* === ЗАГРУЗКА ЗАЯВОК === */
async function load() {
  const list = document.getElementById("list");

  try {
    const response = await fetch(API, {
      headers: {
        "x-admin-token": ADMIN_TOKEN
      }
    });

    if (!response.ok) {
      const text = await response.text();
      throw new Error(text);
    }

    const data = await response.json();
    list.innerHTML = "";

    if (!data || data.length === 0) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";

      let statusText = "⏳ В процессе";
      if (d.status === "success") statusText = "✅ Успешно";
      if (d.status === "rejected") statusText = "❌ Отказ";

      div.innerHTML = `
        <div>
          <b>${d.amount} ₽</b>
          <div class="meta">user_id: ${d.user_id}</div>
          <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
          <div class="meta">${statusText}</div>
        </div>
        <div>
          ${d.status === "waiting" ? `
            <button class="ok" onclick="action('${d.id}','approve')">Одобрить</button>
            <button class="no" onclick="action('${d.id}','reject')">Отказ</button>
          ` : ""}
        </div>
      `;

      list.appendChild(div);
    });

  } catch (err) {
    list.innerText = "❌ Ошибка соединения / Unauthorized";
    console.error("ADMIN LOAD ERROR:", err);
  }
}

/* === ДЕЙСТВИЯ === */
async function action(id, actionType) {
  try {
    const response = await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-token": ADMIN_TOKEN
      },
      body: JSON.stringify({
        id: id,
        action: actionType
      })
    });

    if (!response.ok) {
      const text = await response.text();
      throw new Error(text);
    }

    load();

  } catch (err) {
    alert("❌ Ошибка действия. Открой консоль.");
    console.error("ADMIN ACTION ERROR:", err);
  }
}

/* === СТАРТ === */
load();
</script>

<script>
(function () {
  const PASSWORD = "Vezus2323j228";
  const key = "admin_auth_ok";

  if (sessionStorage.getItem(key) === "yes") return;

  let input = prompt("🔐 Введите пароль администратора:");
  if (input !== PASSWORD) {
    alert("❌ Неверный пароль");
    document.body.innerHTML = "";
    throw new Error("Unauthorized");
  }

  sessionStorage.setItem(key, "yes");
})();
</script>

</body>
</html>

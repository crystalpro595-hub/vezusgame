<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админка — заявки</title>

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .item {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .meta {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 3px;
    }

    button {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .ok {
      background: #2ecc71;
      color: #000;
    }

    .no {
      background: #e74c3c;
      color: #fff;
      margin-left: 6px;
    }
  </style>
</head>
<body>

<h1>💳 Заявки на пополнение</h1>
<div id="list">Загрузка…</div>

<script>
/* === НАСТРОЙКИ === */
const FUNCTION_URL =
  "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";

const SERVICE_ROLE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpcXl6cmdpdXZ4bWh4Z2xhZHh1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NTQ1ODMwMiwiZXhwIjoyMDgxMDM0MzAyfQ.muYuEoKV63vDFs4s3lxEwHZJc1r3z06GcQNKlLAauEg";

/* === ЗАГРУЗКА ЗАЯВОК === */
async function loadDeposits() {
  const list = document.getElementById("list");
  list.innerText = "Загрузка…";

  try {
    const res = await fetch(FUNCTION_URL, {
      headers: {
        "Authorization": "Bearer " + SERVICE_ROLE_KEY
      }
    });

    const data = await res.json();

    if (!res.ok) {
      console.error(data);
      list.innerText = "Ошибка загрузки";
      return;
    }

    if (!data.length) {
      list.innerText = "Заявок нет";
      return;
    }

    list.innerHTML = "";

    data.forEach(d => {
      const date = new Date(d.created_at).toLocaleString("ru-RU");

      let status = "⏳ В процессе";
      if (d.status === "success") status = "✅ Успешно";
      if (d.status === "rejected") status = "❌ Отказ";

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div>
          <b>${d.amount} ₽</b>
          <div class="meta">user_id: ${d.user_id}</div>
          <div class="meta">${date}</div>
          <div class="meta">${status}</div>
        </div>
      `;

      list.appendChild(div);
    });

  } catch (e) {
    console.error(e);
    list.innerText = "Ошибка соединения";
  }
}

loadDeposits();
</script>

</body>
</html>

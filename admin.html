<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
</head>
<body>

<h2>💸 Заявки на вывод</h2>
<div id="withdraw-list">Загрузка…</div>

<script>
const ADMIN_WITHDRAWS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";
const ADMIN_TOKEN = "@smoke2323j228";

async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");
  list.innerText = "Загрузка…";

  try {
    const res = await fetch(ADMIN_WITHDRAWS_API, {
      method: "GET",
      headers: { "x-admin-token": ADMIN_TOKEN }
    });

    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    list.innerHTML = "";
    if (!Array.isArray(data) || data.length === 0) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(w => {
      const div = document.createElement("div");
      div.innerHTML = `${w.user_id} → ${w.amount} VC (${w.status})`;
      list.appendChild(div);
    });

  } catch (e) {
    list.innerText = "Ошибка загрузки";
  }
}

loadWithdrawals();
</script>

</body>
</html>

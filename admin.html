<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
}

h2 {
  margin-bottom: 15px;
}

.item {
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button {
  padding:6px 12px;
  border-radius:6px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.ok {
  background:#2ecc71;
  color:#000;
}

.no {
  background:#e74c3c;
  color:#fff;
  margin-left:6px;
}

.meta {
  font-size:13px;
  opacity:.7;
}
</style>
</head>
<body>

<h2>💳 Заявки на пополнение</h2>
<div id="list">Загрузка…</div>

<h2>💸 Заявки на вывод</h2>
<div id="withdraw-list">Загрузка…</div>

<script>
const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";
const SUPABASE_KEY = "ВАШ_SUPABASE_KEY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
window.supabaseClient = supabase;

/* === ЗАГРУЗКА ДЕПОЗИТОВ (как было) === */
async function load() {
  const list = document.getElementById("list");

  try {
    const response = await fetch("https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits", {
      headers: { "x-admin-token": "@smoke2323j228" }
    });

    if (!response.ok) throw new Error(await response.text());

    const data = await response.json();
    list.innerHTML = "";

    if (!data?.length) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";

      let statusText = "⏳ В процессе";
      if (d.status === "success") statusText = "✅ Успешно";
      if (d.status === "rejected") statusText = "❌ Отказ";

      div.innerHTML = `
        <div>
          <b>${d.amount} ₽</b>
          <div class="meta">user_id: ${d.user_id}</div>
          <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
          <div class="meta">${statusText}</div>
        </div>
        <div>
          ${d.status === "waiting" ? `
            <button class="ok" onclick="action('${d.id}','approve')">Одобрить</button>
            <button class="no" onclick="action('${d.id}','reject')">Отказать</button>
          ` : ""}
        </div>
      `;
      list.appendChild(div);
    });

  } catch (err) {
    list.innerText = "❌ Ошибка соединения";
    console.error(err);
  }
}

/* === ЗАГРУЗКА ВЫВОДОВ (новый блок) === */
async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");

  const { data, error } = await supabase
    .from("withdrawals")
    .select("*")
    .eq("status", "waiting")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    list.innerText = "❌ Ошибка загрузки выводов";
    return;
  }

  list.innerHTML = "";

  if (!data?.length) {
    list.innerText = "Заявок на вывод нет";
    return;
  }

  data.forEach(w => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div>
        <b>${w.amount} VC</b>
        <div class="meta">user_id: ${w.user_id}</div>
        <div class="meta">реквизиты: ${w.requisites}</div>
        <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
      </div>
      <div>
        <button class="ok" onclick="approveWithdraw('${w.id}', ${w.amount}, '${w.user_id}')">Одобрить</button>
        <button class="no" onclick="rejectWithdraw('${w.id}', ${w.amount}, '${w.user_id}')">Отказать</button>
      </div>
    `;
    list.appendChild(div);
  });
}

/* === ДЕЙСТВИЯ АДМИНА ПО ДЕПОЗИТАМ (как было) === */
async function action(id, actionType) {
  try {
    const response = await fetch("https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-token": "@smoke2323j228"
      },
      body: JSON.stringify({ id, action: actionType })
    });

    if (!response.ok) throw new Error(await response.text());
    load();
    loadWithdrawals();

  } catch (err) {
    alert("❌ Ошибка действия");
    console.error(err);
  }
}

/* === ДЕЙСТВИЯ АДМИНА ПО ВЫВОДУ (заморозка/разморозка баланса) === */
async function approveWithdraw(id, amount, userId) {
  const { error } = await supabase.rpc("admin_approve_withdraw", {
    p_id: id,
    p_amount: amount,
    p_user: userId
  });

  if (error) {
    console.error(error);
    alert("❌ Ошибка одобрения вывода");
    return;
  }

  alert("✅ Вывод одобрен");
  loadWithdrawals();
  load();
}

async function rejectWithdraw(id, amount, userId) {
  const { error } = await supabase.rpc("admin_reject_withdraw", {
    p_id: id,
    p_amount: amount,
    p_user: userId
  });

  if (error) {
    console.error(error);
    alert("❌ Ошибка отказа");
    return;
  }

  alert("❌ Вывод отклонён, баланс возвращён");
  loadWithdrawals();
  load();
}

/* === СТАРТ === */
load();
loadWithdrawals();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка — депозиты</title>

<style>
body{background:#111;color:#fff;font-family:Arial;padding:20px}
.item{background:#1e1e1e;padding:15px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between}
button{padding:6px 12px;border-radius:6px;border:none;font-weight:bold;cursor:pointer}
.ok{background:#2ecc71}
.no{background:#e74c3c;color:#fff}
.meta{font-size:13px;opacity:.7}
</style>
</head>
<body>

<h2>💳 Заявки</h2>
<div id="list">Загрузка…</div>

<script>
const API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpcXl6cmdpdXZ4bWh4Z2xhZHh1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NTQ1ODMwMiwiZXhwIjoyMDgxMDM0MzAyfQ.muYuEoKV63vDFs4s3lxEwHZJc1r3z06GcQNKlLAauEg";

async function load() {
  try {
    const r = await fetch(API, {
      headers: {
        "Authorization": TOKEN
      }
    });

    if (!r.ok) throw new Error(await r.text());

    const data = await r.json();
    const list = document.getElementById("list");
    list.innerHTML = "";

    if (!data.length) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";

      let status = "⏳ В процессе";
      if (d.status === "success") status = "✅ Успешно";
      if (d.status === "rejected") status = "❌ Отказ";

      div.innerHTML = `
        <div>
          <b>${d.amount} ₽</b>
          <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
          <div class="meta">${status}</div>
        </div>
        <div>
          ${d.status === "waiting" ? `
            <button class="ok" onclick="action('${d.id}','approve')">Одобрить</button>
            <button class="no" onclick="action('${d.id}','reject')">Отказ</button>
          ` : ""}
        </div>
      `;

      list.appendChild(div);
    });

  } catch (e) {
    document.getElementById("list").innerText = "❌ Ошибка соединения";
    console.error(e);
  }
}

async function action(id, type) {
  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": TOKEN
    },
    body: JSON.stringify({ id, action: type })
  });

  load();
}

load();
</script>

</body>
</html>

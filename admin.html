<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
<style>
body { background:#111; color:#fff; font-family:Arial; padding:20px; display:flex; gap:20px; }
.column { flex:1; }
.item { background:#1e1e1e; padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; }
button { padding:6px 12px; border-radius:6px; border:none; font-weight:bold; cursor:pointer; }
.ok { background:#2ecc71; color:#000; }
.no { background:#e74c3c; color:#fff; margin-left:6px; }
.meta { font-size:13px; opacity:.7; }
</style>
</head>
<body>

<div class="column">
  <h2>💳 Депозиты</h2>
  <div id="deposit-list">Загрузка…</div>
</div>

<div class="column">
  <h2>🏦 Выводы</h2>
  <div id="withdraw-list">Загрузка…</div>
</div>

<script>
const TOKEN = "@smoke2323j228";
const DEP_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const WD_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";

async function loadDeposits() {
  const el = document.getElementById("deposit-list");
  try {
    const r = await fetch(DEP_API, { headers: { "x-admin-token": TOKEN }});
    const d = await r.json();
    el.innerHTML = "";
    d.forEach(x => el.innerHTML += `<div class="item"><div><b>${x.amount_vc} VC</b><div class="meta">${x.status}</div></div></div>`);
  } catch { el.innerText = "Ошибка загрузки"; }
}

async function loadWithdrawals() {
  const el = document.getElementById("withdraw-list");
  try {
    const r = await fetch(WD_API, { headers: { "x-admin-token": TOKEN }});
    const d = await r.json();
    el.innerHTML = "";
    if (!d.length) { el.innerText = "Нет заявок"; return; }
    d.forEach(w => {
      el.innerHTML += `
      <div class="item">
        <div>
          <b>${w.amount} VC</b>
          <div class="meta">User: ${w.user_id}</div>
          <div class="meta">${w.status}</div>
        </div>
        <div>
          ${w.status === "waiting" ? `
            <button class="ok" onclick="withdraw('${w.id}','approve')">✔ Принять</button>
            <button class="no" onclick="withdraw('${w.id}','reject')">✖ Отказать</button>
          ` : ""}
        </div>
      </div>`;
    });
  } catch { el.innerText = "Ошибка загрузки"; }
}

async function withdraw(id, act) {
  await fetch(WD_API, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-token": TOKEN },
    body: JSON.stringify({ id, action: act })
  });
  loadWithdrawals();
}

window.withdraw = withdraw;

loadDeposits();
loadWithdrawals();
</script>

</body>
</html>

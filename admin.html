<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка</title>
<style>
  body { font-family: Arial, sans-serif; background:#0f0f0f; color:white; padding:20px }
  table { width:100%; border-collapse:collapse; margin-top:10px; background:#1a1a1a }
  th, td { border:1px solid #333; padding:10px; text-align:center }
  button { padding:6px 14px; border:none; cursor:pointer; border-radius:4px; color:white }
  .accept { background:#27ae60 }
  .reject { background:#c0392b }
</style>
</head>
<body>

<h2>💰 Заявки на депозит</h2>
<table id="dep">
<thead><tr><th>ID</th><th>User</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
<tbody></tbody>
</table>

<h2>🏦 Заявки на вывод</h2>
<table id="wd">
<thead><tr><th>ID</th><th>User</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
<tbody></tbody>
</table>

<script>
const API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws"; // ← сюда вставляешь URL деплоя Edge Function

async function load() {
  const r = await fetch(API);
  const j = await r.json();

  // депозиты
  const dep = document.querySelector("#dep tbody");
  j.deposits.forEach(d => {
    dep.innerHTML += `
      <tr>
        <td>${d.id}</td>
        <td>${d.user_id}</td>
        <td>${d.amount}</td>
        <td>${d.status}</td>
        <td>
          <button class="accept" onclick="set('deposits','${d.id}','accepted')">Принять</button>
          <button class="reject" onclick="set('deposits','${d.id}','rejected')">Отклонить</button>
        </td>
      </tr>`;
  });

  // выводы
  const wd = document.querySelector("#wd tbody");
  j.withdrawals.forEach(w => {
    wd.innerHTML += `
      <tr>
        <td>${w.id}</td>
        <td>${w.user_id}</td>
        <td>${w.amount}</td>
        <td>${w.status}</td>
        <td>
          <button class="accept" onclick="set('withdrawals','${w.id}','accepted')">Принять</button>
          <button class="reject" onclick="set('withdrawals','${w.id}','rejected')">Отклонить</button>
        </td>
      </tr>`;
  });
}

async function set(table, id, status) {
  await fetch(API, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ table, id, status })
  });
  location.reload();
}

load();
</script>

</body>
</html>

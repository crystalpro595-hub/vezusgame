<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
}
h2 { margin-bottom: 15px; }
.item {
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button {
  padding:6px 12px;
  border-radius:6px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.ok { background:#2ecc71; color:#000; }
.no { background:#e74c3c; color:#fff; margin-left:6px; }
.meta { font-size:13px; opacity:.7; }
</style>
</head>
<body>

<h2>💳 Заявки на пополнение</h2>
<div id="deposit-list">Загрузка…</div>

<h2>💸 Заявки на вывод</h2>
<div id="withdraw-list">Загрузка…</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";
const SUPABASE_KEY = "YOUR_SERVICE_ROLE_KEY_HERE"; // тут вставь service_role ключ если будешь использовать напрямую

const ADMIN_DEPOSITS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const ADMIN_WITHDRAWS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";
const ADMIN_TOKEN = "@smoke2323j228";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* === Вывод логов и ошибок прямо на экран (для iPad) === */
window.onerror = function(msg, url, line, col, error) {
  document.body.innerHTML += `<div style="background:#c00;padding:10px;margin-top:10px;border-radius:6px;font-size:12px;">
    ❌ JS Error:<br>${msg}<br>📍 ${line}:${col}
  </div>`;
};

console.log = function(...args) {
  document.body.innerHTML += `<div style="background:#222;padding:8px;margin-top:6px;border-left:3px solid #2ecc71;font-size:12px;">
    🟢 LOG: ${args.join(" ")}
  </div>`;
};

/* === LOAD DEPOSITS === */
async function loadDeposits() {
  const list = document.getElementById("deposit-list");
  console.log("Loading deposits...");

  try {
    const res = await fetch(ADMIN_DEPOSITS_API, {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });

    console.log("Deposit status:", res.status);

    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    list.innerHTML = "";

    if (!data?.length) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";
      const statusText = d.status === "success" ? "✅ Успешно" : d.status === "rejected" ? "❌ Отказано" : "⏳ В ожидании";

      div.innerHTML = `
        <div>
          <b>${d.amount_vc} VC</b>
          <div class="meta">user_id: ${d.user_id}</div>
          <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
          <div class="meta">${statusText}</div>
        </div>
        <div>
          ${d.status === "waiting" ? `
            <button class="ok" onclick="depositAction('${d.id}','approve')">Одобрить</button>
            <button class="no" onclick="depositAction('${d.id}','reject')">Отказать</button>
          ` : ""}
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки депозитов";
    console.error(e);
  }
}

/* === LOAD WITHDRAWALS === */
async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");
  console.log("Loading withdrawals...");

  try {
    const res = await fetch(ADMIN_WITHDRAWS_API, {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });

    console.log("Withdraw status:", res.status);

    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    list.innerHTML = "";

    if (!Array.isArray(data) || data.length === 0) {
      list.innerText = "Заявок на вывод нет";
      return;
    }

    data.forEach(w => {
      const div = document.createElement("div");
      div.className = "item";
      const statusText = w.status === "success" ? "✅ Одобрено" : w.status === "rejected" ? "❌ Отклонено" : "⏳ На рассмотрении";

      div.innerHTML = `
        <div>
          <b>${w.amount} VC</b>
          <div class="meta">user_id: ${w.user_id}</div>
          <div class="meta">реквизиты: ${w.requisites}</div>
          <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
          <div class="meta">${statusText}</div>
        </div>
        <div>
          ${w.status === "waiting" ? `
            <button class="ok" onclick="withdrawAction('${w.id}','approve')">Одобрить</button>
            <button class="no" onclick="withdrawAction('${w.id}','reject')">Отказать</button>
          ` : ""}
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки выводов";
    console.error(e);
  }
}

/* === ACTIONS === */
window.depositAction = async (id, type) => {
  console.log("Deposit action:", id, type);
  const res = await fetch(ADMIN_DEPOSITS_API, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-token": ADMIN_TOKEN },
    body: JSON.stringify({ id, action: type })
  });
  console.log("Result:", res.status);
  loadDeposits();
  loadWithdrawals();
};

window.withdrawAction = async (id, type) => {
  console.log("Withdraw action:", id, type);
  const res = await fetch(ADMIN_WITHDRAWS_API, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-token": ADMIN_TOKEN },
    body: JSON.stringify({ id, action: type })
  });
  console.log("Result:", res.status);
  loadWithdrawals();
  loadDeposits();
};

/* === START === */
loadDeposits();
loadWithdrawals();
</script>

</body>
</html>

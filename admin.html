<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
}
h2 { margin-bottom: 15px; }
.item {
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button {
  padding:6px 12px;
  border-radius:6px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.ok { background:#2ecc71; color:#000; }
.no { background:#e74c3c; color:#fff; margin-left:6px; }
.meta { font-size:13px; opacity:.7; }
</style>
</head>
<body>

<h2>💳 Заявки на пополнение</h2>
<div id="deposit-list">Загрузка…</div>

<h2>💸 Заявки на вывод</h2>
<div id="withdraw-list">Загрузка…</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>

window.onerror = function(msg, url, line, col, error) {
  document.body.innerHTML += `<div style="background:#c00;padding:10px;margin-top:10px;border-radius:6px;font-size:12px;">
    ❌ JS Error:<br>${msg}<br>📍 ${line}:${col}
  </div>`;
};

console.log = function(...args) {
  document.body.innerHTML += `<div style="background:#222;padding:8px;margin-top:6px;border-left:3px solid #2ecc71;font-size:12px;">
    🟢 LOG: ${args.join(" ")}
  </div>`;
};

const ADMIN_DEPOSITS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const ADMIN_WITHDRAWS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";
const ADMIN_TOKEN = "@smoke2323j228";

/* === Загрузка депозитов === */
async function loadDeposits() {
  const list = document.getElementById("deposit-list");
  list.innerText = "Загрузка…";

  try {
    const res = await fetch(ADMIN_DEPOSITS_API, {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });

    console.log("Deposit API status:", res.status);
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    list.innerHTML = "";
    if (!data?.length) {
      list.innerText = "Заявок на пополнение нет";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `<b>${d.amount_vc} VC</b> — статус: ${d.status}`;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки депозитов";
    console.error(e);
  }
}

/* === Загрузка выводов === */
async function loadWithdrawals() {
  console.log("➡️ loadWithdrawals started");

  const list = document.getElementById("withdraw-list");
  list.innerText = "Загрузка…";

  try {
    const res = await fetch("https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws", {
      headers: { "x-admin-token": "@smoke2323j228" }
    });

    console.log("Withdraw API status:", res.status);
    const data = await res.json();
    console.log("Withdraw API data:", JSON.stringify(data));

    list.innerHTML = "";
    if (!Array.isArray(data) || data.length === 0) {
      list.innerText = "Заявок на вывод нет";
      return;
    }

    data.forEach(w => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `<b>${w.amount} VC</b> — статус: ${w.status}`;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки выводов";
    console.log("Withdraw error:", e.message);
  }
}

loadWithdrawals();

/* === Действия по депозитам === */
window.depositAction = async (id, type) => {
  try {
    const res = await fetch(ADMIN_DEPOSITS_API, {
      method:"POST",
      headers:{ "Content-Type":"application/json","x-admin-token": ADMIN_TOKEN },
      body: JSON.stringify({ id, action: type })
    });

    console.log("Deposit action:", type, "status:", res.status);
    if (!res.ok) throw new Error(await res.text());
    loadDeposits();
    loadWithdrawals();

  } catch(e) {
    alert("❌ Ошибка действия по депозиту");
    console.error(e);
  }
};

/* === Действия по выводам === */
window.withdrawAction = async (id, type) => {
  try {
    const res = await fetch(ADMIN_WITHDRAWS_API, {
      method:"POST",
      headers:{ "Content-Type":"application/json","x-admin-token": ADMIN_TOKEN },
      body: JSON.stringify({ id, action: type })
    });

    console.log("Withdraw action:", type, "status:", res.status);
    if (!res.ok) throw new Error(await res.text());
    loadWithdrawals();
    loadDeposits();

  } catch(e) {
    alert("❌ Ошибка действия по выводу");
    console.error(e);
  }
};

/* === Старт загрузки === */
loadDeposits();
loadWithdrawals();

</script>

</body>
</html>

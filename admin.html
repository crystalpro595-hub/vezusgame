<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  gap:20px;
  padding:20px;
}
.column { flex:1; }
.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button {
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}
.approve { background:#2ecc71; color:#000; }
.reject  { background:#e74c3c; color:#fff; margin-left:6px; }
.small { font-size:12px; opacity:.6; }
</style>

</head>
<body>

<div class="column">
  <h2>Заявки на депозит</h2>
  <div id="deposits">Загрузка…</div>
</div>

<div class="column">
  <h2>Заявки на вывод</h2>
  <div id="withdrawals">Загрузка…</div>
</div>

<script>
const ADMIN_TOKEN = "@smoke2323j228";

const DEPOSIT_API  = "/functions/v1/admin-deposits";
const WITHDRAW_API = "/functions/v1/admin-withdraws";

/* загрузка депозитов */
async function loadDeposits() {
  const box = document.getElementById("deposits");
  try {
    const r = await fetch(DEPOSIT_API, {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });
    if (!r.ok) throw 1;
    const d = await r.json();
    box.innerHTML = "";
    if (!d.length) return box.innerText = "Заявок нет";

    d.forEach(x => {
      box.innerHTML += `
      <div class="card">
        <div>
          <b>${x.amount} VC</b>
          <div class="small">user: ${x.user_id}</div>
          <div class="small">${new Date(x.created_at).toLocaleString()}</div>
          <div class="small">status: ${x.status}</div>
        </div>
        <div>
          ${x.status === "waiting" ? `
          <button class="approve" onclick="deposit('${x.id}','approve')">Принять</button>
          <button class="reject"  onclick="deposit('${x.id}','reject')">Отклонить</button>
          ` : ""}
        </div>
      </div>`;
    });

  } catch {
    box.innerText = "Ошибка загрузки";
  }
}

/* загрузка выводов */
async function loadWithdrawals() {
  const box = document.getElementById("withdrawals");
  try {
    const r = await fetch(WITHDRAW_API, {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });
    if (!r.ok) throw 1;
    const d = await r.json();
    box.innerHTML = "";
    if (!d.length) return box.innerText = "Заявок нет";

    d.forEach(x => {
      box.innerHTML += `
      <div class="card">
        <div>
          <b>${x.amount} VC</b>
          <div class="small">user: ${x.user_id}</div>
          <div class="small">${new Date(x.created_at).toLocaleString()}</div>
          <div class="small">status: ${x.status}</div>
          ${x.requisites ? `<div class="small">req: ${x.requisites}</div>` : ""}
        </div>
        <div>
          ${x.status === "waiting" ? `
          <button class="approve" onclick="withdraw('${x.id}','approve')">Принять</button>
          <button class="reject"  onclick="withdraw('${x.id}','reject')">Отклонить</button>
          ` : ""}
        </div>
      </div>`;
    });

  } catch {
    box.innerText = "Ошибка загрузки";
  }
}

/* действие депозит */
window.deposit = async (id, action) => {
  const r = await fetch(DEPOSIT_API, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-token": ADMIN_TOKEN },
    body: JSON.stringify({ id, action })
  });
  if (r.ok) loadDeposits();
  else alert("Ошибка");
};

/* действие вывод */
window.withdraw = async (id, action) => {
  const r = await fetch(WITHDRAW_API, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-token": ADMIN_TOKEN },
    body: JSON.stringify({ id, action })
  });
  if (r.ok) loadWithdrawals();
  else alert("Ошибка");
};

loadDeposits();
loadWithdrawals();
</script>

</body>
</html>

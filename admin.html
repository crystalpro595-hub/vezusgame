<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка заявок</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  gap:20px;
  padding:20px;
}
.column { flex:1; }
.card {
  background:#1a1a1a;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.meta { font-size:13px; opacity:.6; margin-top:4px; }
button {
  padding:6px 14px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
.approve { background:#4ade80; color:#000; }
.reject { background:#f87171; color:#fff; margin-left:6px; }
</style>
</head>
<body>

<!-- ВЫВОДЫ -->
<div class="column">
  <h2>🏦 Заявки на вывод</h2>
  <div id="withdraw-list">Загрузка…</div>
</div>

<!-- ДЕПОЗИТЫ -->
<div class="column">
  <h2>💰 Заявки на депозит</h2>
  <div id="deposit-list">Загрузка…</div>
</div>

<script>
const TOKEN = "@smoke2323j228";

async function loadWithdraws() {
  const box = document.getElementById("withdraw-list");
  try {
    const res = await fetch("/functions/v1/admin-withdraws", {
      headers: { "x-admin-token": TOKEN }
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    box.innerHTML = "";

    if (!data.length) {
      box.innerText = "Нет заявок на вывод";
      return;
    }

    data.forEach(w => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <div>
          <b>${w.amount} VC</b>
          <div class="meta">User ID: ${w.user_id}</div>
          <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
          <div class="meta">Статус: ${w.status}</div>
        </div>
        <div>
          ${w.status === "waiting" ? `
            <button class="approve" onclick="withdrawAction('${w.id}', 'approve')">Одобрить</button>
            <button class="reject" onclick="withdrawAction('${w.id}', 'reject')">Отказать</button>
          ` : ""}
        </div>
      `;
      box.appendChild(div);
    });

  } catch(e) {
    box.innerText = "Ошибка загрузки выводов";
    console.error(e);
  }
}

async function loadDeposits() {
  const box = document.getElementById("deposit-list");
  try {
    const res = await fetch("/functions/v1/admin-deposits", {
      headers: { "x-admin-token": TOKEN }
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    box.innerHTML = "";

    if (!data.length) {
      box.innerText = "Нет заявок на депозит";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <div>
          <b>${d.amount_vc} VC</b>
          <div class="meta">User ID: ${d.user_id}</div>
          <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
          <div class="meta">Статус: ${d.status}</div>
        </div>
        <div>
          ${d.status === "waiting" ? `
            <button class="approve" onclick="depositAction('${d.id}', 'approve')">Одобрить</button>
            <button class="reject" onclick="depositAction('${d.id}', 'reject')">Отказать</button>
          ` : ""}
        </div>
      `;
      box.appendChild(div);
    });

  } catch(e) {
    box.innerText = "Ошибка загрузки депозитов";
    console.error(e);
  }
}

window.withdrawAction = async (id, action) => {
  try {
    const res = await fetch("/functions/v1/admin-withdraws", {
      method:"POST",
      headers: {
        "Content-Type":"application/json",
        "x-admin-token": TOKEN
      },
      body: JSON.stringify({ id, action })
    });
    if (!res.ok) throw new Error(await res.text());
    loadWithdraws();
  } catch(e) {
    alert("Ошибка действия вывода");
  }
};

window.depositAction = async (id, action) => {
  try {
    const res = await fetch("/functions/v1/admin-deposits", {
      method:"POST",
      headers: {
        "Content-Type":"application/json",
        "x-admin-token": TOKEN
      },
      body: JSON.stringify({ id, action })
    });
    if (!res.ok) throw new Error(await res.text());
    loadDeposits();
  } catch(e) {
    alert("Ошибка действия депозита");
  }
};

loadWithdraws();
loadDeposits();
</script>

</body>
</html>

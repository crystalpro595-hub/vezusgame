<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
}
h2 { margin-bottom: 15px; }
.item {
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button {
  padding:6px 12px;
  border-radius:6px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.ok { background:#2ecc71; color:#000; }
.no { background:#e74c3c; color:#fff; margin-left:6px; }
.meta { font-size:13px; opacity:.7; }
</style>
</head>
<body>

<h2>💳 Заявки на пополнение</h2>
<div id="deposit-list">Загрузка…</div>

<h2>💸 Заявки на вывод</h2>
<div id="withdraw-list">Загрузка…</div>

<script>
const ADMIN_DEPOSITS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const ADMIN_WITHDRAWS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws"; // ← Сюда вставишь URL функции admin-withdraws
const ADMIN_TOKEN = "@smoke2323j228";

/* === Загрузка депозитов === */
async function loadDeposits() {
  const list = document.getElementById("deposit-list");

  try {
    const res = await fetch(ADMIN_DEPOSITS_API, {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });

    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    list.innerHTML = "";

    if (!data?.length) {
      list.innerText = "Заявок на пополнение нет";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";

      let statusText = "⏳ В процессе";
      if (d.status === "success") statusText = "✅ Успешно";
      if (d.status === "rejected") statusText = "❌ Отказано";

      div.innerHTML = `
        <div>
          <b>${d.amount_vc} VC</b>
          <div class="meta">user_id: ${d.user_id}</div>
          <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
          <div class="meta">${statusText}</div>
        </div>
        <div>
          ${d.status === "waiting" ? `
            <button class="ok" onclick="depositAction('${d.id}','approve')">Одобрить</button>
            <button class="no" onclick="depositAction('${d.id}','reject')">Отказать</button>
          ` : ""}
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки депозитов";
    console.error(e);
  }
}

/* === Загрузка выводов === */
async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");

  try {
    const res = await fetch(ADMIN_WITHDRAWS_API, {
      headers: { "x-admin-token": ADMIN_TOKEN }
    });

    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    list.innerHTML = "";

    if (!data?.length) {
      list.innerText = "Заявок на вывод нет";
      return;
    }

    data.forEach(w => {
      const div = document.createElement("div");
      div.className = "item";

      let statusText = "⏳ В ожидании";
      if (w.status === "success") statusText = "✅ Одобрено";
      if (w.status === "rejected") statusText = "❌ Отклонено";

      div.innerHTML = `
        <div>
          <b>${w.amount} VC</b>
          <div class="meta">user_id: ${w.user_id}</div>
          <div class="meta">реквизиты: ${w.requisites}</div>
          <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
          <div class="meta">${statusText}</div>
        </div>
        <div>
          ${w.status === "waiting" ? `
            <button class="ok" onclick="withdrawAction('${w.id}','approve')">Одобрить</button>
            <button class="no" onclick="withdrawAction('${w.id}','reject')">Отказать</button>
          ` : ""}
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки выводов";
    console.error(e);
  }
}

/* === Действия по депозитам === */
window.depositAction = async (id, type) => {
  try {
    const res = await fetch(ADMIN_DEPOSITS_API, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-admin-token": ADMIN_TOKEN
      },
      body: JSON.stringify({ id, action: type })
    });

    if (!res.ok) throw new Error(await res.text());
    loadDeposits();
    loadWithdrawals();

  } catch(e) {
    alert("❌ Ошибка действия по депозиту");
    console.error(e);
  }
};

/* === Действия по выводам === */
window.withdrawAction = async (id, type) => {
  try {
    const res = await fetch(ADMIN_WITHDRAWS_API, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-admin-token": ADMIN_TOKEN
      },
      body: JSON.stringify({ id, action: type })
    });

    if (!res.ok) throw new Error(await res.text());
    loadWithdrawals();
    loadDeposits();

  } catch(e) {
    alert("❌ Ошибка действия по выводу");
    console.error(e);
  }
};

/* === Старт загрузки === */
loadDeposits();
loadWithdrawals();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px }
table { width:100%; border-collapse:collapse; margin-top:20px }
th, td { border:1px solid #333; padding:10px; text-align:center }
button { padding:6px 12px; margin:4px; cursor:pointer; border:none }
.accept { background:#2ecc71 }
.reject { background:#e74c3c }
</style>
</head>
<body>

<h2>Заявки на депозит</h2>
<table id="depTable">
  <thead><tr><th>ID</th><th>User</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
  <tbody></tbody>
</table>

<h2>Заявки на вывод</h2>
<table id="wdTable">
  <thead><tr><th>ID</th><th>User</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws"; // ← сюда вставишь URL деплоя функции

async function loadData() {
  console.log("loadData() called");

  const res = await fetch(API_URL);
  const json = await res.json();

  // deposits
  const depBody = document.querySelector("#depTable tbody");
  json.deposits.forEach(d => {
    depBody.innerHTML += `
      <tr>
        <td>${d.id}</td>
        <td>${d.user_id}</td>
        <td>${d.amount}</td>
        <td>${d.status}</td>
        <td>
          <button class="accept" onclick="updateStatus('deposits','${d.id}','accepted')">Принять</button>
          <button class="reject" onclick="updateStatus('deposits','${d.id}','rejected')">Отклонить</button>
        </td>
      </tr>`;
  });

  // withdrawals
  const wdBody = document.querySelector("#wdTable tbody");
  json.withdrawals.forEach(w => {
    wdBody.innerHTML += `
      <tr>
        <td>${w.id}</td>
        <td>${w.user_id}</td>
        <td>${w.amount}</td>
        <td>${w.status}</td>
        <td>
          <button class="accept" onclick="updateStatus('withdrawals','${w.id}','accepted')">Принять</button>
          <button class="reject" onclick="updateStatus('withdrawals','${w.id}','rejected')">Отклонить</button>
        </td>
      </tr>`;
  });
}

async function updateStatus(table, id, status) {
  const res = await fetch(`${API_URL}/update`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ table, id, status })
  });
  alert(await res.text());
  location.reload();
}

loadData();
</script>

</body>
</html>

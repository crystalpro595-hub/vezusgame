<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
}

.wrapper {
  display:flex;
  gap:20px;
}

.column {
  flex:1;
}

h2 {
  margin-bottom:15px;
}

.card {
  background:#1c1c1c;
  padding:14px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.meta {
  font-size:12px;
  opacity:.7;
  margin-top:4px;
}

button {
  padding:6px 12px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.ok {
  background:#2ecc71;
  color:#000;
}

.no {
  background:#e74c3c;
  color:#fff;
  margin-left:6px;
}

.status {
  font-size:12px;
  opacity:.8;
}
</style>
</head>

<body>

<h1>⚙️ Админка</h1>

<div class="wrapper">

  <div class="column">
    <h2>💰 Депозиты</h2>
    <div id="deposit-list">Загрузка...</div>
  </div>

  <div class="column">
    <h2>🏦 Выводы</h2>
    <div id="withdraw-list">Загрузка...</div>
  </div>

</div>

<script>
const ADMIN_TOKEN = "@smoke2323j228";

const API_DEPOSITS =
  "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";

const API_WITHDRAWS =
  "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";

const headers = {
  "Authorization": "Bearer " + "@smoke2323j228",
  "Content-Type": "application/json"
};

// ===== ЗАГРУЗКА ДЕПОЗИТОВ =====
async function loadDeposits() {
  const box = document.getElementById("deposit-list");
  box.innerHTML = "Загрузка...";

  try {
    const r = await fetch(API_DEPOSITS, { headers });
    const data = await r.json();

    if (!Array.isArray(data) || !data.length) {
      box.innerText = "Заявок нет";
      return;
    }

    box.innerHTML = "";
    data.forEach(d => {
      box.innerHTML += `
        <div class="card">
          <div>
            <b>➕ ${d.amount_vc} VC</b>
            <div class="meta">user_id: ${d.user_id}</div>
            <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
            <div class="status">Статус: ${d.status}</div>
          </div>
          <div>
            <button class="ok" onclick="depositAction('${d.id}','approve')">OK</button>
            <button class="no" onclick="depositAction('${d.id}','reject')">NO</button>
          </div>
        </div>
      `;
    });

  } catch (e) {
    console.error(e);
    box.innerText = "Ошибка загрузки";
  }
}

// ===== ЗАГРУЗКА ВЫВОДОВ =====
async function loadWithdraws() {
  const box = document.getElementById("withdraw-list");
  box.innerHTML = "Загрузка...";

  try {
    const r = await fetch(API_WITHDRAWS, { headers });
    const data = await r.json();

    if (!Array.isArray(data) || !data.length) {
      box.innerText = "Заявок нет";
      return;
    }

    box.innerHTML = "";
    data.forEach(w => {
      box.innerHTML += `
        <div class="card">
          <div>
            <b>💸 ${w.amount} VC</b>
            <div class="meta">user_id: ${w.user_id}</div>
            <div class="meta">Кошелёк: ${w.address || w.requisites}</div>
            <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
            <div class="status">Статус: ${w.status}</div>
          </div>
          <div>
            <button class="ok" onclick="withdrawAction('${w.id}','approve')">OK</button>
            <button class="no" onclick="withdrawAction('${w.id}','reject')">NO</button>
          </div>
        </div>
      `;
    });

  } catch (e) {
    console.error(e);
    box.innerText = "Ошибка загрузки";
  }
}

// ===== ДЕЙСТВИЯ =====
async function depositAction(id, action) {
  await fetch(API_DEPOSITS, {
    method: "POST",
    headers,
    body: JSON.stringify({ id, action })
  });
  loadDeposits();
}

async function withdrawAction(id, action) {
  await fetch(API_WITHDRAWS, {
    method: "POST",
    headers,
    body: JSON.stringify({ id, action })
  });
  loadWithdraws();
}

// INIT
loadDeposits();
loadWithdraws();
</script>

</body>
</html>

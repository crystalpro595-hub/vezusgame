<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
<style>
body { background:#111; color:#fff; font-family:Arial; display:flex; gap:20px; padding:20px; }
.column { flex:1; }
.item { background:#1e1e1e; padding:12px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; }
button { padding:6px 10px; border-radius:6px; border:none; cursor:pointer; font-weight:bold; }
.ok { background:#2ecc71; color:#000; }
.no { background:#e74c3c; color:#fff; }
.meta { font-size:12px; opacity:.7; }
</style>
</head>
<body>

<div class="column">
  <h2>💰 Депозиты</h2>
  <div id="deposit-list">Загрузка…</div>
</div>

<div class="column">
  <h2>💸 Выводы</h2>
  <div id="withdraw-list">Загрузка…</div>
</div>

<script>
const depositsAPI = "admin-deposits";
const withdrawsAPI = "admin-withdraws";
const token = "@smoke2323j228";

async function loadDeposits() {
  const list = document.getElementById("deposit-list");
  const res = await fetch(depositsAPI, { headers: { "x-admin-token": token } });
  const data = await res.json();
  list.innerHTML = "";
  data.forEach(d => {
    list.innerHTML += `<div class="item">
      <div><b>${d.amount} VC</b><div class="meta">${d.user_id}</div></div>
      <div>${d.status === "waiting" ? `
        <button class="ok" onclick="actionWithdraw('${d.id}','approve')">✔</button>
        <button class="no" onclick="actionWithdraw('${d.id}','reject')">✖</button>` : ""}</div>
    </div>`;
  });
}

async function loadWithdraws() {
  const list = document.getElementById("withdraw-list");
  const res = await fetch(withdrawsAPI, { headers: { "x-admin-token": token } });
  const data = await res.json();
  list.innerHTML = "";
  data.forEach(w => {
    list.innerHTML += `<div class="item">
      <div><b>${w.amount} VC</b><div class="meta">${w.user_id}</div></div>
      <div>${w.status === "waiting" ? `
        <button class="ok" onclick="actionWithdraw('${w.id}','approve')">✔</button>
        <button class="no" onclick="actionWithdraw('${w.id}','reject')">✖</button>` : ""}</div>
    </div>`;
  });
}

window.actionWithdraw = async (id, action) => {
  await fetch(withdrawsAPI, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-token": token },
    body: JSON.stringify({ id, action })
  });
  loadWithdraws();
};

loadDeposits();
loadWithdraws();
</script>

</body>
</html>

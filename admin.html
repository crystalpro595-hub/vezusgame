<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Админка — заявки на пополнение</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .item {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .meta {
      font-size: 13px;
      opacity: 0.75;
      margin-top: 4px;
    }

    button {
      padding: 7px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-left: 6px;
    }

    .ok {
      background: #2ecc71;
      color: #000;
    }

    .no {
      background: #e74c3c;
      color: #fff;
    }

    .status {
      margin-top: 6px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>💳 Заявки на пополнение</h1>
<div id="list">Загрузка…</div>

<script>
/***********************
 * EDGE FUNCTION URL
 ***********************/
const FUNCTION_URL =
"https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";

const list = document.getElementById("list");

/***********************
 * LOAD DEPOSITS
 ***********************/
async function loadDeposits() {
  list.innerText = "Загрузка…";

  try {
    const res = await fetch(FUNCTION_URL);
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      list.innerText = "Заявок нет";
      return;
    }

    list.innerHTML = "";

    data.forEach(d => {
      const date = new Date(d.created_at).toLocaleString("ru-RU");

      let statusText = "⏳ В процессе";
      if (d.status === "success") statusText = "✅ Успешно";
      if (d.status === "rejected") statusText = "❌ Отказ";

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div>
          <b>${d.amount} ₽</b>
          <div class="meta">user_id: ${d.user_id}</div>
          <div class="meta">${date}</div>
          <div class="status">${statusText}</div>
        </div>
        <div>
          ${d.status === "waiting" ? `
            <button class="ok" onclick="approve('${d.id}')">Одобрить</button>
            <button class="no" onclick="reject('${d.id}')">Отказ</button>
          ` : ""}
        </div>
      `;

      list.appendChild(div);
    });

  } catch (e) {
    console.error(e);
    list.innerText = "Ошибка загрузки";
  }
}

/***********************
 * APPROVE
 ***********************/
async function approve(id) {
  if (!confirm("Подтвердить и начислить баланс?")) return;

  await fetch(FUNCTION_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "approve",
      depositId: id
    })
  });

  loadDeposits();
}

/***********************
 * REJECT
 ***********************/
async function reject(id) {
  if (!confirm("Отклонить заявку?")) return;

  await fetch(FUNCTION_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "reject",
      depositId: id
    })
  });

  loadDeposits();
}

loadDeposits();
</script>

</body>
</html>

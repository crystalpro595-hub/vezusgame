<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body{background:#111;color:#fff;font-family:Arial;padding:20px}
.card{background:#1e1e1e;padding:15px;border-radius:10px;margin-bottom:10px}
button{padding:6px 12px;border-radius:6px;border:none;font-weight:bold;cursor:pointer}
.ok{background:#2ecc71;color:#000}
.no{background:#e74c3c;color:#fff;margin-left:6px}
</style>
</head>
<body>

<h2>💸 Заявки на вывод</h2>
<div id="withdraws">Загрузка…</div>

<script>
const API = ADMIN_WITHDRAWS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws"; // ← СЮДА вставь URL своей Edge функции
const TOKEN = "@smoke2323j228";

async function load() {
  const div = document.getElementById("withdraws");
  try {
    const r = await fetch(API, { headers: { "x-admin-token": TOKEN }});
    const d = await r.json();
    if(!Array.isArray(d)){div.innerText="Ошибка формата";return}
    if(!d.length){div.innerText="Нет заявок";return}
    div.innerHTML="";
    d.forEach(x=>{
      div.innerHTML += `<div class="card">
        <div><b>${x.amount} VC</b></div>
        <div>user: ${x.user_id}</div>
        <div>status: ${x.status}</div>
        <div>
          <button class="ok" onclick="act('${x.id}','approve')">Принять</button>
          <button class="no" onclick="act('${x.id}','reject')">Отказать</button>
        </div>
      </div>`;
    })
  } catch(e) {
    div.innerText="Ошибка загрузки";
  }
}

window.act = async (id,a)=>{
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json","x-admin-token":TOKEN},
    body:JSON.stringify({id,action:a})
  });
  load();
}

load();
</script>

</body>
</html>

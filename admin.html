<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>Админка</title>
<style>
  body { background:#111; color:#fff; font-family:Arial; padding:20px; display:flex; gap:20px; }
  .column { flex:1; }
  .item { background:#1e1e1e; padding:15px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; }
  button { padding:6px 10px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; }
  .ok { background:#2ecc71; color:#000; }
  .no { background:#e74c3c; color:#fff; margin-left:6px; }
</style>
</head>
<body>

<div class="column">
  <h2>💰 Депозиты</h2>
  <div id="deposit-list">Загрузка…</div>
</div>

<div class="column">
  <h2>💸 Выводы</h2>
  <div id="withdraw-list">Загрузка…</div>
</div>

<script>
const TOKEN = "@smoke2323j228";

async function loadDeposits() {
  const res = await fetch("admin-deposits", { headers: { "x-admin-token": TOKEN }});
  const data = await res.json();
  const list = document.getElementById("deposit-list");
  if (!data.length) return list.innerText = "Заявок нет";
  list.innerHTML = data.map(d => `
    <div class="item">
      <div><b>${d.amount} VC</b><br>${d.user_id}<br>${d.created_at}</div>
      <div>
        <button class="ok" onclick="depositAction('${d.id}','approve')">✔</button>
        <button class="no" onclick="depositAction('${d.id}','reject')">✖</button>
      </div>
    </div>`).join("");
}

async function loadWithdraws() {
  const res = await fetch("admin-withdraws", { headers: { "x-admin-token": TOKEN }});
  const text = await res.text();

  // если пришел не JSON — покажем ошибку
  try {
    const data = JSON.parse(text);
    const list = document.getElementById("withdraw-list");
    if (!data.length) return list.innerText = "Заявок нет";
    list.innerHTML = data.map(w => `
      <div class="item">
        <div><b>${w.amount} VC</b><br>${w.user_id}<br>${w.requisites}<br>${w.created_at}</div>
        <div>
          <button class="ok" onclick="withdrawAction('${w.id}','approve')">✔</button>
          <button class="no" onclick="withdrawAction('${w.id}','reject')">✖</button>
        </div>
      </div>`).join("");
  } catch {
    document.getElementById("withdraw-list").innerText = "❌ Ошибка API: " + text;
  }
}

window.depositAction = async (id, action) => {
  await fetch("admin-deposits", { method:"POST", headers:{ "Content-Type":"application/json","x-admin-token":TOKEN }, body:JSON.stringify({id, action})});
  loadDeposits();
};

window.withdrawAction = async (id, action) => {
  await fetch("admin-withdraws", { method:"POST", headers:{ "Content-Type":"application/json","x-admin-token":TOKEN }, body:JSON.stringify({id, action})});
  loadWithdraws();
};

loadDeposits();
loadWithdraws();
</script>

</body>
</html>

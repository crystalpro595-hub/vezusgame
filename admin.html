<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:20px;
  display:flex;
  gap:20px
}
.column { flex:1 }
.item {
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center
}
button {
  padding:6px 12px;
  border-radius:6px;
  border:none;
  font-weight:bold;
  cursor:pointer
}
.ok { background:#2ecc71;color:#000 }
.no { background:#e74c3c;color:#fff;margin-left:6px }
.meta { font-size:12px;opacity:.7;margin-top:4px }
h2 { margin-bottom:15px }
</style>
</head>
<body>

<div class="column">
  <h2>💰 Депозиты</h2>
  <div id="deposit-list">Загрузка...</div>
</div>

<div class="column">
  <h2>🏦 Выводы</h2>
  <div id="withdraw-list">Загрузка...</div>
</div>

<script>
const ADMIN_TOKEN = "@smoke2323j228";

const DEPOSITS_API =
  "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const WITHDRAWS_API =
  "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";

async function safeFetch(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: {
      "x-admin-token": ADMIN_TOKEN,
      ...(options.headers || {})
    }
  });

  if (!res.ok) {
    throw new Error(`HTTP ${res.status}`);
  }

  return res.json();
}

// ===== ДЕПОЗИТЫ =====
async function loadDeposits() {
  const list = document.getElementById("deposit-list");
  list.innerHTML = "";

  try {
    const data = await safeFetch(DEPOSITS_API);

    if (!data.length) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(x => {
      list.innerHTML += `
        <div class="item">
          <div>
            <b>➕ ${x.amount_vc} VC</b>
            <div class="meta">user_id: ${x.user_id}</div>
            <div class="meta">${new Date(x.created_at).toLocaleString()}</div>
          </div>
          <div>
            <button class="ok" onclick="depositAction('${x.id}','approve')">OK</button>
            <button class="no" onclick="depositAction('${x.id}','reject')">NO</button>
          </div>
        </div>
      `;
    });
  } catch (e) {
    list.innerText = "Ошибка загрузки депозитов";
    console.error(e);
  }
}

// ===== ВЫВОДЫ =====
async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");
  list.innerHTML = "";

  try {
    const data = await safeFetch(WITHDRAWS_API);

    if (!data.length) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(x => {
      list.innerHTML += `
        <div class="item">
          <div>
            <b>💸 ${x.amount} VC</b>
            <div class="meta">user_id: ${x.user_id}</div>
            <div class="meta">Кошелёк: ${x.address || x.requisites}</div>
            <div class="meta">${new Date(x.created_at).toLocaleString()}</div>
          </div>
          <div>
            <button class="ok" onclick="withdrawAction('${x.id}','approve')">OK</button>
            <button class="no" onclick="withdrawAction('${x.id}','reject')">NO</button>
          </div>
        </div>
      `;
    });
  } catch (e) {
    list.innerText = "Ошибка загрузки выводов";
    console.error(e);
  }
}

// ===== ACTIONS =====
window.depositAction = async (id, action) => {
  await safeFetch(DEPOSITS_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id, action })
  });
  loadDeposits();
};

window.withdrawAction = async (id, action) => {
  await safeFetch(WITHDRAWS_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id, action })
  });
  loadWithdrawals();
};

// INIT
loadDeposits();
loadWithdrawals();
</script>

</body>
</html>

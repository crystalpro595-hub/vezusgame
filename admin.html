<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Админка — депозиты</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .item {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .meta {
      font-size: 13px;
      opacity: 0.7;
    }

    button {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .ok {
      background: #2ecc71;
      color: #000;
    }

    .no {
      background: #e74c3c;
      color: #fff;
      margin-left: 6px;
    }
  </style>
</head>
<body>

<h1>💳 Заявки на пополнение</h1>
<div id="list">Загрузка…</div>

<script>
/***********************
 * SUPABASE (ADMIN)
 ***********************/
const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";

/* ⚠️ SERVICE ROLE KEY — ТОЛЬКО В АДМИНКЕ */
const SUPABASE_SERVICE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpcXl6cmdpdXZ4bWh4Z2xhZHh1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NTQ1ODMwMiwiZXhwIjoyMDgxMDM0MzAyfQ.muYuEoKV63vDFs4s3lxEwHZJc1r3z06GcQNKlLAauEg";

const supabase = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_SERVICE_KEY
);

const list = document.getElementById("list");

/***********************
 * LOAD DEPOSITS
 ***********************/
async function loadDeposits() {
  const { data, error } = await supabase
    .from("deposits")
    .select("id, user_id, amount, status, created_at")
    .order("created_at", { ascending: false });

  if (error) {
    list.innerText = "Ошибка загрузки";
    return;
  }

  if (!data || data.length === 0) {
    list.innerText = "Заявок нет";
    return;
  }

  list.innerHTML = "";

  data.forEach(d => {
    const date = new Date(d.created_at).toLocaleString("ru-RU");

    let statusText = "⏳ В процессе";
    if (d.status === "success") statusText = "✅ Успешно";
    if (d.status === "rejected") statusText = "❌ Отказ";

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div>
        <b>${d.amount} ₽</b>
        <div class="meta">user_id: ${d.user_id}</div>
        <div class="meta">${date}</div>
        <div class="meta">${statusText}</div>
      </div>
      <div>
        ${d.status === "waiting" ? `
          <button class="ok" onclick="approve('${d.id}')">Одобрить</button>
          <button class="no" onclick="reject('${d.id}')">Отказ</button>
        ` : ""}
      </div>
    `;

    list.appendChild(div);
  });
}

/***********************
 * APPROVE = НАЧИСЛЕНИЕ
 ***********************/
async function approve(depositId) {

  // 1. Получаем заявку
  const { data: deposit } = await supabase
    .from("deposits")
    .select("id, user_id, amount, status")
    .eq("id", depositId)
    .single();

  if (!deposit || deposit.status === "success") {
    alert("Ошибка заявки");
    return;
  }

  // 2. Получаем профиль
  const { data: profile } = await supabase
    .from("profiles")
    .select("balance")
    .eq("user_id", deposit.user_id)
    .single();

  if (!profile) {
    alert("Профиль не найден");
    return;
  }

  // 3. Начисляем баланс
  const newBalance = profile.balance + deposit.amount;

  await supabase
    .from("profiles")
    .update({ balance: newBalance })
    .eq("user_id", deposit.user_id);

  // 4. Обновляем статус заявки
  await supabase
    .from("deposits")
    .update({ status: "success" })
    .eq("id", depositId);

  alert("✅ Баланс начислен");

  loadDeposits();
}

/***********************
 * REJECT
 ***********************/
async function reject(depositId) {
  await supabase
    .from("deposits")
    .update({ status: "rejected" })
    .eq("id", depositId);

  loadDeposits();
}

loadDeposits();
</script>

</body>
</html>

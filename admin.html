<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка</title>
<style>
body{background:#111;color:#fff;font-family:Arial;padding:20px}
.card{background:#1e1e1e;padding:15px;border-radius:10px;margin-bottom:10px}
button{padding:6px 12px;border-radius:6px;border:none;font-weight:bold;cursor:pointer}
.ok{background:#2ecc71;color:#000}
.no{background:#e74c3c;color:#fff;margin-left:6px}
</style>
</head>
<body>

<h2>💰 Заявки на депозит</h2>
<div id="deposits">Загрузка…</div>

<h2>💸 Заявки на вывод</h2>
<div id="withdraws">Загрузка…</div>

<script>
/* === Логи и ошибки прямо на страницу === */
window.onerror = function(msg, url, line, col, error) {
  document.body.innerHTML += `<div style="background:#c00;padding:10px;margin-top:10px;border-radius:6px;font-size:12px;">
    ❌ JS Error:<br>${msg}<br>📍 ${line}:${col}
  </div>`;
};

/* === Вставь сюда URL своей Edge функции === */
const WITHDRAW_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";

const DEPOSIT_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const ADMIN_TOKEN = "@smoke2323j228";

/* === Загрузка депозитов === */
async function loadDeposits() {
  const div = document.getElementById("deposits");
  try {
    const r = await fetch(DEPOSIT_API, { headers: { "x-admin-token": ADMIN_TOKEN }});
    const d = await r.json();
    if(!Array.isArray(d)){div.innerText="Ошибка данных";return}
    if(!d.length){div.innerText="Нет заявок";return}
    div.innerHTML="";
    d.forEach(x=>{
      div.innerHTML += `<div class="card">
        <div><b>${x.amount_vc} VC</b></div>
        <div>user: ${x.user_id}</div>
        <div>status: ${x.status}</div>
        <div>
          <button class="ok" onclick="depositAction('${x.id}','approve')">Принять</button>
          <button class="no" onclick="depositAction('${x.id}','reject')">Отказать</button>
        </div>
      </div>`;
    })
  } catch(e) {
    div.innerText="Ошибка загрузки депозитов";
  }
}

/* === Загрузка выводов === */
async function loadWithdraws() {
  const div = document.getElementById("withdraws");
  try {
    const r = await fetch(WITHDRAW_API, { headers: { "x-admin-token": ADMIN_TOKEN }});
    const d = await r.json();
    if(!Array.isArray(d)){div.innerText="Ошибка данных";return}
    if(!d.length){div.innerText="Нет заявок";return}
    div.innerHTML="";
    d.forEach(x=>{
      div.innerHTML += `<div class="card">
        <div><b>${x.amount} VC</b></div>
        <div>user: ${x.user_id}</div>
        <div>реквизиты: ${x.requisites}</div>
        <div>status: ${x.status}</div>
        <div>
          <button class="ok" onclick="withdrawAction('${x.id}','approve')">Принять</button>
          <button class="no" onclick="withdrawAction('${x.id}','reject')">Отказать</button>
        </div>
      </div>`;
    })
  } catch(e) {
    div.innerText="Ошибка загрузки выводов";
  }
}

/* === Действия депозита === */
window.depositAction = async (id,a)=>{
  await fetch(DEPOSIT_API,{
    method:"POST",
    headers:{"Content-Type":"application/json","x-admin-token":ADMIN_TOKEN},
    body:JSON.stringify({id,action:a})
  });
  loadDeposits();
  loadWithdraws();
}

/* === Действия вывода === */
window.withdrawAction = async (id,a)=>{
  await fetch(WITHDRAW_API,{
    method:"POST",
    headers:{"Content-Type":"application/json","x-admin-token":ADMIN_TOKEN},
    body:JSON.stringify({id,action:a})
  });
  loadWithdraws();
  loadDeposits();
}

/* === Старт === */
loadDeposits();
loadWithdraws();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка</title>
<style>
body{background:#000;color:#fff;font-family:Arial;padding:20px;display:flex;gap:20px}
.col{flex:1}
.item{background:#111;padding:10px;margin-bottom:10px;border-radius:6px}
</style>
</head>
<body>

<div class="col">
  <h2>Депозиты</h2>
  <div id="deposits">Загрузка...</div>
</div>

<div class="col">
  <h2>Выводы</h2>
  <div id="withdraws">Загрузка...</div>
</div>

<script>
const ADMIN_TOKEN = "@smoke2323j228";

// депозитов ты грузил без edge и оно работало — оставим обычный запрос
async function loadDeposits(){
  const box = document.getElementById("deposits");
  try{
    const r = await fetch("/rest/v1/deposits?status=eq.waiting", {
      headers:{ apikey: ADMIN_TOKEN }
    });
    const d = await r.json();
    box.innerHTML = d.map(x=>`
      <div class="item">
        <b>${x.amount_vc} VC</b><br>
        user: ${x.user_id}<br>
        status: ${x.status}
      </div>`).join("");
  }catch(e){
    box.innerHTML = "Ошибка загрузки депозитов";
  }
}

// выводы ты грузишь через Edge — починим только их
async function loadWithdraws(){
  const box = document.getElementById("withdraws");
  try{
    const r = await fetch("/functions/v1/admin-withdraws", {
      headers:{ "x-admin-token": ADMIN_TOKEN }
    });
    const w = await r.json();
    if(!w.length) return box.innerHTML = "Заявок нет";
    box.innerHTML = w.map(x=>`
      <div class="item">
        <b>${x.amount} VC</b><br>
        user: ${x.user_id}<br>
        status: ${x.status}
      </div>`).join("");
  }catch(e){
    box.innerHTML = "Ошибка загрузки выводов";
  }
}

loadDeposits();
loadWithdraws();
</script>

</body>
</html>

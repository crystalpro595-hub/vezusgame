<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
<style>
body {
  background:#0a0a0f;
  color:#fff;
  font-family:Inter,Arial,sans-serif;
  padding:30px;
  display:flex;
  gap:20px;
}
.column {
  flex:1;
}
.card {
  background:#14141c;
  border:1px solid #222;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  animation:fade 0.25s ease-in;
}
@keyframes fade {from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.meta {font-size:12px;color:#888;margin-top:4px}
button {
  padding:7px 13px;
  border:none;
  border-radius:7px;
  font-weight:600;
  cursor:pointer;
  font-size:13px;
  transition:0.2s;
}
.ok {background:#2dff9d;color:#000}
.no {background:#ff4d6d;color:#000}
button:hover{opacity:0.8;transform:scale(1.03)}
.btns{display:flex;flex-direction:column;gap:6px}
</style>
</head>
<body>

<div class="column">
  <h2>💰 Депозиты</h2>
  <div id="deposits">Загрузка...</div>
</div>

<div class="column">
  <h2>💸 Выводы</h2>
  <div id="withdraws">Загрузка...</div>
</div>

<script>
const ADMIN_TOKEN = "@smoke2323j228"; // твой токен как раньше

const DEP_API = "/functions/v1/admin-deposits";
const WD_API  = "/functions/v1/admin-withdraws";

async function loadDeposits() {
  const el = document.getElementById("deposits");
  el.innerHTML = "";

  const r = await fetch(DEP_API, {
    method: "GET",
    headers: { "x-admin-token": ADMIN_TOKEN }
  });

  if (r.status === 401) return el.innerHTML = "<div>⛔ 401 — Нет доступа</div>";

  const data = await r.json();

  if (!data.length) return el.innerHTML = "<div>Заявок нет</div>";

  data.forEach(d => {
    el.innerHTML += `
    <div class="card">
      <div>
        <b>${d.amount_vc} VC</b>
        <div class="meta">${d.user_id}</div>
        <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
        <div class="meta">Статус: ${d.status}</div>
      </div>
      <div class="btns">
        <button class="ok" onclick="depAction('${d.id}','approve')">OK</button>
        <button class="no" onclick="depAction('${d.id}','reject')">NO</button>
      </div>
    </div>`;
  });
}

async function loadWithdraws() {
  const el = document.getElementById("withdraws");
  el.innerHTML = "";

  const r = await fetch(WD_API, {
    method: "GET",
    headers: { "x-admin-token": ADMIN_TOKEN }
  });

  if (r.status === 401) return el.innerHTML = "<div>⛔ 401 — Нет доступа</div>";

  const data = await r.json();

  if (!data.length) return el.innerHTML = "<div>Заявок нет</div>";

  data.forEach(w => {
    el.innerHTML += `
    <div class="card">
      <div>
        <b>${w.amount} VC</b>
        <div class="meta">${w.address}</div>
        <div class="meta">${w.user_id}</div>
        <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
        <div class="meta">Статус: ${w.status}</div>
      </div>
      <div class="btns">
        <button class="ok" onclick="wdAction('${w.id}','approve')">OK</button>
        <button class="no" onclick="wdAction('${w.id}','reject')">NO</button>
      </div>
    </div>`;
  });
}

window.depAction = async (id, act) => {
  const r = await fetch(DEP_API, {
    method:"POST",
    headers:{"Content-Type":"application/json","x-admin-token":ADMIN_TOKEN},
    body:JSON.stringify({id, action: act})
  });
  const j = await r.json();
  if (j.error) return alert("Ошибка: " + j.error);
  alert("Готово");
  loadDeposits();
};

window.wdAction = async (id, act) => {
  const r = await fetch(WD_API, {
    method:"POST",
    headers:{"Content-Type":"application/json","x-admin-token":ADMIN_TOKEN},
    body:JSON.stringify({id, action: act})
  });
  const j = await r.json();
  if (j.error) return alert("Ошибка: " + j.error);
  alert("Готово");
  loadWithdraws();
};

loadDeposits();
loadWithdraws();
</script>

</body>
</html>

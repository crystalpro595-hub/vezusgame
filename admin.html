<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
<style>
body { background:#111; color:#fff; font-family:Arial; padding:20px; display:flex; gap:20px; }
.column { flex:1; }
.item { background:#1e1e1e; padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; }
button { padding:6px 12px; border-radius:6px; border:none; font-weight:bold; cursor:pointer; }
.ok { background:#2ecc71; color:#000; }
.no { background:#e74c3c; color:#fff; margin-left:6px; }
.meta { font-size:13px; opacity:.7; }
</style>
</head>
<body>

<div class="column">
  <h2>💰 Депозиты</h2>
  <div id="deposit-list">Загрузка…</div>
</div>

<div class="column">
  <h2>🏦 Выводы</h2>
  <div id="withdraw-list">Загрузка…</div>
</div>

<script>
const ADMIN_DEPOSITS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const ADMIN_WITHDRAWS_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";
const TOKEN = "@smoke2323j228";

// Загружаем выводы
async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");
  list.innerText = "Загрузка…";

  try {
    const res = await fetch(ADMIN_WITHDRAWS_API, {
      headers: { "x-admin-token": TOKEN }
    });
    if (!res.ok) throw new Error(await res.text());

    const data = await res.json();
    list.innerHTML = "";

    if (!data.length) {
      list.innerText = "Заявок на вывод нет";
      return;
    }

    data.forEach(w => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div>
          <b>${w.amount} VC</b>
          <div class="meta">user_id: ${w.user_id}</div>
          <div class="meta">реквизиты: ${w.requisites}</div>
          <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
        </div>
        <div>
          ${w.status === "waiting" ? `
            <button class="ok" onclick="withdraw('${w.id}','approve')">Принять</button>
            <button class="no" onclick="withdraw('${w.id}','reject')">Отказать</button>
          ` : `<div class="meta">${w.status}</div>`}
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки выводов";
  }
}

// Отправляем действие по выводу
window.withdraw = async (id, action) => {
  try {
    const res = await fetch(ADMIN_WITHDRAWS_API, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "x-admin-token": TOKEN },
      body: JSON.stringify({ id, action })
    });
    if (!res.ok) throw new Error(await res.text());
    loadWithdrawals();
  } catch(e) {
    alert("❌ Ошибка действия");
  }
};

// Загружаем депозиты (как есть у тебя — они работают)
loadWithdrawals();
</script>

</body>
</html>

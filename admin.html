<!DOCTYPE html>
<html>
<body style="background:#000;color:#fff;font-family:sans-serif;padding:20px;">

<h2>Deposits</h2>
<div id="deposit-list">loading...</div>

<h2>Withdrawals</h2>
<div id="withdraw-list">loading...</div>

<script>
const D_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits";
const W_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";
const TOKEN = "@smoke2323j228";

// вывод ошибок
window.onerror = (msg) => {
  document.body.innerHTML += `<div style="background:red;padding:10px;margin-top:10px;border-radius:5px;">ERROR: ${msg}</div>`;
};

// вывод логов
console.log = (...args) => {
  document.body.innerHTML += `<div style="background:#222;padding:8px;margin-top:5px;border-radius:4px;font-size:12px;">LOG: ${args.join(" ")}</div>`;
};

// загрузка выводов
async function loadWithdrawals() {
  console.log("loadWithdrawals() called");

  const list = document.getElementById("withdraw-list");

  const res = await fetch(W_API, {
    headers: { "x-admin-token": TOKEN }
  });

  const text = await res.text();
  console.log("Withdraw RAW:", text);

  try {
    const data = JSON.parse(text);
    console.log("Withdraw JSON parsed");

    if (!Array.isArray(data)) {
      list.innerText = "Server did not return array";
      return;
    }

    if (data.length === 0) {
      list.innerText = "No withdrawals";
      return;
    }

    list.innerHTML = "";
    data.forEach(w => {
      list.innerHTML += `<div style="background:#111;padding:10px;border-radius:6px;margin-top:6px;">
        <b>${w.amount}</b> VC<br>
        user_id: ${w.user_id}<br>
        status: ${w.status}<br>
        <button onclick="withdrawAction(${w.id}, 'approve')">Approve</button>
        <button onclick="withdrawAction(${w.id}, 'reject')">Reject</button>
      </div>`;
    });

  } catch(e) {
    list.innerText = "JSON parse failed";
    console.log("parse error:", e.message);
  }
}

// действие по выводу
async function withdrawAction(id, action) {
  console.log("withdrawAction:", id, action);

  await fetch(W_API, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-token": TOKEN },
    body: JSON.stringify({ id, action })
  });

  loadWithdrawals();
}

loadWithdrawals();
</script>

</body>
</html>

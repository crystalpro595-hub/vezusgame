<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка — Выводы</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body {
  margin:0;
  font-family:Inter, sans-serif;
  background:#0a0a0f;
  color:#fff;
  padding:30px;
}
h1 {
  font-size:26px;
  margin-bottom:20px;
}
.card {
  background:#14141c;
  border:1px solid #222;
  padding:18px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  animation:fadeIn 0.3s ease-in;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.info {
  line-height:1.5;
}
.meta {
  font-size:13px;
  color:#888;
}
.btns {
  display:flex;
  gap:8px;
  flex-direction:column;
}
button {
  padding:8px 14px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
}
.approve {
  background:#2dff9d;
  color:#000;
}
.reject {
  background:#ff4d6d;
  color:#000;
}
button:hover {
  opacity:0.8;
  transform:scale(1.03);
}
#list {
  margin-top:10px;
}
.empty {
  font-size:15px;
  color:#666;
  margin-top:20px;
}
</style>
</head>
<body>

<h1>💸 Заявки на вывод</h1>
<div id="list">Загрузка...</div>

<script>
const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";

// ❗ ВСТАВЬ SERVICE_ROLE КЛЮЧ СЮДА
const SERVICE_ROLE = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpcXl6cmdpdXZ4bWh4Z2xhZHh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NTgzMDIsImV4cCI6MjA4MTAzNDMwMn0.21-OjkjEtppQ78o66lQJwa-1c1HSfbka2SD2C0lC1ro";

// ❗ Этот токен должен совпадать с тем, что проверяет твой Edge
const ADMIN_TOKEN = "my_admin_secret_token";

const EDGE_URL = SUPABASE_URL + "/functions/v1/admin-withdraws";

async function load() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const res = await fetch(EDGE_URL, {
    method: "GET",
    headers: {
      "Authorization": "Bearer " + SERVICE_ROLE,
      "x-admin-token": ADMIN_TOKEN
    }
  });

  if (res.status === 401) {
    list.innerHTML = "<div class='empty'>⛔ Ошибка 401 — доступ запрещён. Проверь ключ и токен.</div>";
    return;
  }

  const data = await res.json();

  if (!Array.isArray(data) || data.length === 0) {
    list.innerHTML = "<div class='empty'>Заявок пока нет</div>";
    return;
  }

  data.forEach(w => {
    list.innerHTML += `
    <div class="card">
      <div class="info">
        <b>Сумма:</b> ${w.amount} VC<br>
        <span class="meta">Кошелёк:</span> ${w.address}<br>
        <span class="meta">Статус:</span> ${w.status}<br>
        <span class="meta">${new Date(w.created_at).toLocaleString()}</span>
      </div>
      <div class="btns">
        <button class="approve" onclick="action('${w.id}','approve')">Принять</button>
        <button class="reject" onclick="action('${w.id}','reject')">Отказать</button>
      </div>
    </div>`;
  });
}

async function action(id, act) {
  const res = await fetch(EDGE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + SERVICE_ROLE,
      "x-admin-token": ADMIN_TOKEN
    },
    body: JSON.stringify({ id: id, action: act })
  });

  const r = await res.json();
  if (r.error) {
    alert("Ошибка: " + r.error);
    return;
  }
  alert("Статус обновлён");
  load();
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
}
h2 { margin-bottom: 15px; }
.item {
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button {
  padding:6px 12px;
  border-radius:6px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.ok { background:#2ecc71; color:#000; }
.no { background:#e74c3c; color:#fff; margin-left:6px; }
.meta { font-size:13px; opacity:.7; }
</style>
</head>
<body>

<h2>💳 Заявки на пополнение</h2>
<div id="deposit-list">Загрузка…</div>

<h2>💸 Заявки на вывод</h2>
<div id="withdraw-list">Загрузка…</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpcXl6cmdpdXZ4bWh4Z2xhZHh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NTgzMDIsImV4cCI6MjA4MTAzNDMwMn0.21-OjkjEtppQ78o66lQJwa-1c1HSfbka2SD2C0lC1ro";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* === LOAD DEPOSITS === */
async function loadDeposits() {
  const list = document.getElementById("deposit-list");

  try {
    const response = await fetch("https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-deposits", {
  headers: { "x-admin-token": "@smoke2323j228" }
});
    const data = await response.json();
    list.innerHTML = "";

    if (!data?.length) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";

      let statusText = "⏳ В процессе";
      if (d.status === "success") statusText = "✅ Успешно";
      if (d.status === "rejected") statusText = "❌ Отказ";

      div.innerHTML = `
        <div>
          <b>${d.amount_vc} VC</b>
          <div class="meta">user_id: ${d.user_id}</div>
          <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
          <div class="meta">${statusText}</div>
        </div>
        <div>
          ${d.status === "waiting" ? `
            <button class="ok" onclick="depositAction('${d.id}','approve')">Одобрить</button>
            <button class="no" onclick="depositAction('${d.id}','reject')">Отказать</button>
          ` : ""}
        </div>
      `;
      list.appendChild(div);
    });

  } catch (err) {
    list.innerText = "❌ Ошибка загрузки";
    console.error(err);
  }
}

/* === LOAD WITHDRAWALS === */
async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");

  const { data, error } = await supabase
    .from("withdrawals")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    list.innerText = "❌ Ошибка загрузки выводов";
    return;
  }

  list.innerHTML = "";

  if (!data?.length) {
    list.innerText = "Заявок на вывод нет";
    return;
  }

  data.forEach(w => {
    const div = document.createElement("div");
    div.className = "item";

    let statusText = "⏳ В ожидании";
    if (w.status === "success") statusText = "✅ Одобрено";
    if (w.status === "rejected") statusText = "❌ Отклонено";

    div.innerHTML = `
      <div>
        <b>${w.amount} VC</b>
        <div class="meta">user_id: ${w.user_id}</div>
        <div class="meta">реквизиты: ${w.requisites}</div>
        <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
        <div class="meta">${statusText}</div>
      </div>
      <div>
        ${w.status === "waiting" ? `
          <button class="ok" onclick="withdrawAction('${w.id}','approve',${w.amount},'${w.user_id}')">Одобрить</button>
          <button class="no" onclick="withdrawAction('${w.id}','reject',${w.amount},'${w.user_id}')">Отказать</button>
        ` : ""}
      </div>
    `;
    list.appendChild(div);
  });
}

/* === ADMIN ACTIONS === */
window.depositAction = async (id, actionType) => {
  const { error } = await supabase.from("deposits").update({ status: actionType === "approve" ? "success" : "rejected" }).eq("id", id);
  if (error) alert("❌ Ошибка");
  loadDeposits();
};

window.withdrawAction = async (id, actionType, amount, userId) => {
  const { error } = await supabase.from("withdrawals").update({ status: actionType === "approve" ? "success" : "rejected" }).eq("id", id);
  if (error) alert("❌ Ошибка");
  loadWithdrawals();
  loadDeposits();
};

/* === START === */
loadDeposits();
loadWithdrawals();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Админка</title>

<style>
body { font-family: Arial, sans-serif; background:#111; color:white; margin:0; padding:20px; }
.container { display:flex; gap:20px; }
.column { flex:1; background:#222; padding:15px; border-radius:6px; min-height:300px; }
.item { background:#333; padding:10px; margin:8px 0; border-radius:4px; }
button { padding:6px 10px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
.approve { background:#2ecc71; color:black; }
.reject { background:#e74c3c; color:white; margin-left:6px; }
h2 { margin-bottom:15px; }
.meta { font-size:13px; opacity:.7; margin-top:4px; }
</style>
</head>
<body>

<div class="container">
  <div class="column">
    <h2>Заявки на вывод</h2>
    <div id="withdraw-list">Загрузка…</div>
  </div>

  <div class="column">
    <h2>Заявки на депозит</h2>
    <div id="deposit-list">Загрузка…</div>
  </div>
</div>

<script>
const SUPABASE_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/";
const ADMIN_TOKEN = "@smoke2323j228";

// Загрузка выводов
async function loadWithdraws() {
  const list = document.getElementById("withdrawals-list");
  try {
    const res = await fetch(SUPABASE_API + "admin-withdraws", {
      method: "GET",
      headers: { "x-admin-token": ADMIN_TOKEN }
    });

    if (!res.ok) throw new Error(await res.text());

    const data = await res.json();
    list.innerHTML = "";

    if (!data.length) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(w => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div>
          <b>${w.amount} VC</b>
          <div class="meta">user_id: ${w.user_id}</div>
          <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
          <div class="meta">status: ${w.status}</div>
        </div>
        <div>
          ${w.status === "waiting" ? `
            <button class="approve" onclick="withdrawAction('${w.id}', 'approve')">Одобрить</button>
            <button class="reject" onclick="withdrawAction('${w.id}', 'reject')">Отказать</button>
          ` : ""}
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки выводов";
  }
}

// Загрузка депозитов
async function loadDeposits() {
  const list = document.getElementById("deposit-list");
  try {
    const res = await fetch(SUPABASE_API + "admin-deposits", {
      method: "GET",
      headers: { "x-admin-token": ADMIN_TOKEN }
    });

    if (!res.ok) throw new Error(await res.text());

    const data = await res.json();
    list.innerHTML = "";

    if (!data.length) {
      list.innerText = "Заявок нет";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div>
          <b>${d.amount_vc} VC</b>
          <div class="meta">user_id: ${d.user_id}</div>
          <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
          <div class="meta">status: ${d.status}</div>
        </div>
        <div>
          ${d.status === "waiting" ? `
            <button class="approve" onclick="depositAction('${d.id}', 'approve')">Одобрить</button>
            <button class="reject" onclick="depositAction('${d.id}', 'reject')">Отказать</button>
          ` : ""}
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки депозитов";
  }
}

// Действия выводов
window.withdrawAction = async (id, type) => {
  try {
    const res = await fetch(SUPABASE_API + "admin-withdraws", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "x-admin-token": ADMIN_TOKEN },
      body: JSON.stringify({ id, action: type })
    });

    if (!res.ok) throw new Error(await res.text());
    loadWithdrawals();
  } catch {
    alert("❌ Ошибка действия по выводу");
  }
};

// Действия депозитов
window.depositAction = async (id, type) => {
  try {
    const res = await fetch(SUPABASE_API + "admin-deposits", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "x-admin-token": ADMIN_TOKEN },
      body: JSON.stringify({ id, action: type })
    });

    if (!res.ok) throw new Error(await res.text());
    loadDeposits();
  } catch {
    alert("❌ Ошибка действия по депозиту");
  }
};

loadWithdraws();
loadDeposits();
</script>

</body>
</html>

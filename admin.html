<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Админка — депозиты</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 20px;
    }
    h1 {
      margin-bottom: 20px;
    }
    .item {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .meta {
      font-size: 13px;
      opacity: 0.7;
    }
    button {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }
    .ok {
      background: #2ecc71;
      color: #000;
    }
    .no {
      background: #e74c3c;
      color: #fff;
      margin-left: 5px;
    }
  </style>
</head>
<body>

<h1>💳 Заявки на пополнение</h1>
<div id="list">Загрузка…</div>

<script>
/***********************
 * SUPABASE (ADMIN)
 ***********************/
const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";

/* ⚠️ ВСТАВЬ СЮДА SERVICE_ROLE KEY */
const SUPABASE_SERVICE_KEY = "ВСТАВЬ_SERVICE_ROLE_KEY";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_SERVICE_KEY
);

const list = document.getElementById("list");

/***********************
 * LOAD DEPOSITS
 ***********************/
async function loadDeposits() {
  const { data, error } = await supabase
    .from("deposits")
    .select("id, user_id, amount, status, created_at")
    .order("created_at", { ascending: false });

  if (error) {
    list.innerText = "Ошибка загрузки";
    return;
  }

  if (!data || data.length === 0) {
    list.innerText = "Заявок нет";
    return;
  }

  list.innerHTML = "";

  data.forEach(d => {
    const date = new Date(d.created_at).toLocaleString("ru-RU");

    let statusText = "⏳ В процессе";
    if (d.status === "success") statusText = "✅ Успешно";
    if (d.status === "rejected") statusText = "❌ Отказ";

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div>
        <b>${d.amount} ₽</b>
        <div class="meta">user_id: ${d.user_id}</div>
        <div class="meta">${date}</div>
        <div class="meta">${statusText}</div>
      </div>
      <div>
        ${d.status === "waiting" ? `
          <button class="ok" onclick="approve('${d.id}')">Одобрить</button>
          <button class="no" onclick="reject('${d.id}')">Отказ</button>
        ` : ""}
      </div>
    `;

    list.appendChild(div);
  });
}

/***********************
 * ACTIONS
 ***********************/
async function approve(id) {
  await supabase
    .from("deposits")
    .update({ status: "success" })
    .eq("id", id);

  await loadDeposits();
}

async function reject(id) {
  await supabase
    .from("deposits")
    .update({ status: "rejected" })
    .eq("id", id);

  await loadDeposits();
}

loadDeposits();
</script>

</body>
</html>

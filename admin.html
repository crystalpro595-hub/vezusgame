<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка</title>
<style>
body {background:#111; color:#fff; font-family:Arial; padding:20px; display:flex; gap:20px;}
.column {flex:1;}
.item {background:#1e1e1e; padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between;}
button {padding:6px 12px; border-radius:6px; border:none; font-weight:bold; cursor:pointer;}
.ok {background:#2ecc71; color:#000;}
.no {background:#e74c3c; color:#fff; margin-left:6px;}
.meta {font-size:13px; opacity:.7;}
</style>
</head>
<body>

<div class="column">
  <h2>💰 Депозиты</h2>
  <div id="deposit-list">Загрузка…</div>
</div>

<div class="column">
  <h2>🏦 Выводы</h2>
  <div id="withdraw-list">Загрузка…</div>
</div>

<script>
const ADMIN_TOKEN = "@smoke2323j228";

async function loadDeposits() {
  const list = document.getElementById("deposit-list");
  try {
    const res = await fetch("admin-deposits", { headers: { "x-admin-token": ADMIN_TOKEN } });
    const data = await res.json();
    list.innerHTML = data.length ? data.map(d => `<div class="item"><div><b>${d.amount_vc} VC</b><div class="meta">${d.user_id}</div></div></div>`).join("") : "Заявок нет";
  } catch { list.innerText = "Ошибка загрузки депозитов"; }
}

async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");
  try {
    const res = await fetch("admin-withdraws", { headers: { "x-admin-token": ADMIN_TOKEN } });
    const data = await res.json();

    if (!data.length) {
      list.innerText = "Заявок нет";
      return;
    }

    list.innerHTML = data.map(w => `
      <div class="item">
        <div>
          <b>${w.amount} VC</b>
          <div class="meta">user: ${w.user_id}</div>
          <div class="meta">реквизиты: ${w.requisites}</div>
          <div class="meta">status: ${w.status}</div>
        </div>
        <div>
          ${w.status === "waiting" ? `
            <button class="ok" onclick="withdrawAction('${w.id}','approve')">Одобрить</button>
            <button class="no" onclick="withdrawAction('${w.id}','reject')">Отказать</button>
          ` : ""}
        </div>
      </div>`).join("");

  } catch(e) {
    list.innerText = "Ошибка загрузки выводов";
    console.error(e);
  }
}

window.withdrawAction = async (id, action) => {
  try {
    const res = await fetch("admin-withdraws", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "x-admin-token": ADMIN_TOKEN },
      body: JSON.stringify({ id, action })
    });
    if (!res.ok) throw 1;
    loadWithdrawals();
  } catch { alert("Ошибка обработки вывода"); }
};

loadDeposits();
loadWithdrawals();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка заявок</title>
<style>
body {font-family: Arial, sans-serif; background:#0f0f0f; color:white; margin:0; padding:20px;}
.container {display:flex; gap:20px;}
.column {width:50%; background:#1a1a1a; padding:15px; border-radius:8px;}
.card {background:#222; padding:10px; border-radius:6px; margin-bottom:10px;}
button {padding:6px 10px; border:none; border-radius:4px; cursor:pointer;}
.approve {background:#2ecc71;}
.reject {background:#e74c3c;}
</style>
</head>
<body>

<h2>Админка заявок</h2>
<div class="container">
  
  <!-- ДЕПОЗИТЫ (не трогал) -->
  <div class="column">
    <h3>💰 Депозиты</h3>
    <div id="deposits">Загрузка...</div>
  </div>

  <!-- ВЫВОДЫ (фикс авторизации) -->
  <div class="column">
    <h3>🏦 Выводы</h3>
    <div id="withdrawals">Загрузка...</div>
  </div>

</div>

<script>
const ADMIN_TOKEN = "@smoke2323j228"; // твой токен

// Функция загрузки выводов с авторизацией
async function loadWithdrawals() {
  try {
    const res = await fetch("admin-withdraws", {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + ADMIN_TOKEN,
        "Content-Type": "application/json"
      }
    });

    if (!res.ok) throw new Error("Fetch error: " + res.status);
    const data = await res.json();

    if (!data || data.length === 0) {
      document.getElementById("withdrawals").innerHTML = "Заявок нет";
      return;
    }

    let html = "";
    data.forEach(w => {
      html += `
        <div class="card card">
          <b>User:</b> ${w.user_id} <br>
          <b>Amount:</b> ${w.amount} <br>
          <b>Реквизиты:</b> ${w.requisites} <br>
          <b>Status:</b> ${w.status} <br><br>
          <button class="approve approve" onclick="actionWithdraw(${w.id}, 'approve')">Одобрить</button>
          <button class="reject reject" onclick="actionWithdraw(${w.id}, 'reject')">Отклонить</button>
        </div>`;
    });

    document.getElementById("withdrawals").innerHTML = html;
  } catch(err) {
    document.getElementById("withdrawals").innerHTML = "Ошибка загрузки выводов";
    console.error(err);
  }
}

// Функция одобрения / отклонения
async function actionWithdraw(id, type) {
  try {
    await fetch("admin-withdraws", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + ADMIN_TOKEN,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ id, action: type })
    });
    loadWithdrawals(); // перезагрузка после действия
  } catch(err) {
    alert("Ошибка действия с выводом");
    console.error(err);
  }
}

// Запуск загрузки выводов
loadWithdrawals();
</script>

</body>
</html>

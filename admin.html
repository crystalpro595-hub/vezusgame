<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ-панель</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
}
h2 { margin-bottom: 12px; }
.card {
  background:#1b1b1b;
  padding:14px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button {
  padding:7px 14px;
  border-radius:6px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.approve { background:#2ecc71; color:#000; }
.reject { background:#e74c3c; color:#fff; margin-left:6px; }
.meta { font-size:13px; opacity:.6; margin-top:3px; }
</style>
</head>
<body>

<h2>💳 Заявки на депозит</h2>
<div id="deposit-list">Загрузка…</div>

<h2>💸 Заявки на вывод</h2>
<div id="withdraw-list">Загрузка…</div>

<script src="https://esm.sh/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ciqyzrgiuvxmhxgladxu.supabase.co";
const SERVICE_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpcXl6cmdpdXZ4bWh4Z2xhZHh1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NTQ1ODMwMiwiZXhwIjoyMDgxMDM0MzAyfQ.muYuEoKV63vDFs4s3lxEwHZJc1r3z06GcQNKlLAauEg";  // 👈 замени на свой service role key

const supabase = supabaseJs.createClient(SUPABASE_URL, SERVICE_KEY);

const adminSecret = "@smoke2323j228"; // 👈 вписываешь то, что лежит в секрете ADMIN_TOKEN

const headers = { "x-admin-token": adminSecret };

// === загрузка депозитов ===
async function loadDeposits() {
  const list = document.getElementById("deposit-list");
  const { data, error } = await supabase.from("deposits").select("*").order("created_at",{ascending:false});
  if (error) { list.innerText="❌ Ошибка загрузки депозитов"; return }
  list.innerHTML="";
  if (!data.length) { list.innerText="Заявок нет"; return }

  data.forEach(d=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <div>
        <b>${d.amount} VC</b>
        <div class="meta">user_id: ${d.user_id}</div>
        <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
        <div class="meta">status: ${d.status}</div>
      </div>
      <div>
        <button class="approve" onclick="depositAction('${d.id}','approve')">Принять</button>
        <button class="reject"  onclick="depositAction('${d.id}','reject')">Отказать</button>
      </div>`;
    list.appendChild(div);
  });
}

// === загрузка выводов ===
async function loadWithdraws() {
  const list = document.getElementById("withdraw-list");
  const { data, error } = await supabase.from("withdrawals").select("*").order("created_at",{ascending:false});
  if (error) { list.innerText="❌ Ошибка загрузки выводов"; return }
  list.innerHTML="";
  if (!data.length) { list.innerText="Заявок нет"; return }

  data.forEach(w=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <div>
        <b>${w.amount} VC</b>
        <div class="meta">user_id: ${w.user_id}</div>
        <div class="meta">реквизиты: ${w.requisites}</div>
        <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
        <div class="meta">status: ${w.status}</div>
      </div>
      <div>
        <button class="approve" onclick="withdrawAction('${w.id}','approve')">Принять</button>
        <button class="reject"  onclick="withdrawAction('${w.id}','reject')">Отказать</button>
      </div>`;
    list.appendChild(div);
  });
}

// === действия депозитов ===
window.depositAction = async(id,type)=>{
  const res=await fetch(`${SUPABASE_URL}/functions/v1/admin-deposits`,{
    method:"POST",
    headers:{...headers,"Content-Type":"application/json"},
    body:JSON.stringify({id,action:type})
  });
  if(res.ok) loadDeposits();
}

// === действия выводов ===
window.withdrawAction = async(id,type)=>{
  const res=await fetch(`${SUPABASE_URL}/functions/v1/admin-withdraws`,{
    method:"POST",
    headers:{...headers,"Content-Type":"application/json"},
    body:JSON.stringify({id,action:type})
  });
  if(res.ok) loadWithdraws();
}

// === старт ===
loadDeposits();
loadWithdraws();
</script>

</body>
</html>

<h2>💸 Заявки на вывод</h2>
<div id="withdraw-list">Загрузка…</div>

<script>
const WITHDRAW_API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdraws";
const TOKEN = "@smoke2323j228"; // твой токен уже правильный

async function loadWithdrawals() {
  const list = document.getElementById("withdraw-list");
  list.innerText = "Загрузка…";

  try {
    const res = await fetch(WITHDRAW_API, {
      headers: { "x-admin-token": TOKEN }
    });

    const text = await res.text();
    console.log("RAW RESPONSE:", text);
    
    const data = JSON.parse(text);
    list.innerHTML = "";

    if (!Array.isArray(data) || data.length === 0) {
      list.innerText = "Заявок на вывод нет";
      return;
    }

    data.forEach(w => {
      const div = document.createElement("div");
      div.className = "item";

      let statusText = "⏳ В ожидании";
      if (w.status === "success") statusText = "✅ Одобрено";
      if (w.status === "rejected") statusText = "❌ Отклонено";

      div.innerHTML = `
        <div>
          <b>${w.amount} VC</b>
          <div class="meta">user_id: ${w.user_id}</div>
          <div class="meta">реквизиты: ${w.requisites}</div>
          <div class="meta">${new Date(w.created_at).toLocaleString()}</div>
          <div class="meta">${statusText}</div>
        </div>
        <div>
          ${w.status === "waiting" ? `
            <button class="ok" onclick="withdrawAction('${w.id}','approve')">Принять</button>
            <button class="no" onclick="withdrawAction('${w.id}','reject')">Отказать</button>
          ` : ""}
        </div>
      `;

      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "❌ Ошибка загрузки выводов";
  }
}

async function withdrawAction(id, action) {
  await fetch(WITHDRAW_API, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-token": TOKEN },
    body: JSON.stringify({ id, action })
  });
  loadWithdrawals();
}

loadWithdrawals();
</script>

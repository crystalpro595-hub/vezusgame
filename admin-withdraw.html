<h2>💸 Заявки на вывод</h2>
<div id="list">Загрузка…</div>

<script>
const API = "https://ciqyzrgiuvxmhxgladxu.supabase.co/functions/v1/admin-withdrawals";
const ADMIN_TOKEN = "@smoke2323j228";

async function load() {
  const list = document.getElementById("list");
  try {
    const r = await fetch(API, { headers: { "x-admin-token": ADMIN_TOKEN }});
    const data = await r.json();
    list.innerHTML = "";

    if (!data.length) return list.innerText = "Заявок нет";

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";

      let statusText = "⏳ В ожидании";
      if (d.status === "success") statusText = "✅ Успешно";
      if (d.status === "rejected") statusText = "❌ Отказ";

      div.innerHTML = `
        <div>
          <b>${d.amount} VC</b>
          <div class="meta">user_id: ${d.user_id}</div>
          <div class="meta">${new Date(d.created_at).toLocaleString()}</div>
          <div class="meta">${statusText}</div>
        </div>
        <div>
          ${d.status === "waiting" ? `
            <button class="ok" onclick="action('${d.id}','approve')">Одобрить</button>
            <button class="no" onclick="action('${d.id}','reject')">Отказ</button>
          ` : ""}
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    list.innerText = "Ошибка загрузки";
    console.error(e);
  }
}

async function action(id, actionType) {
  try {
    await fetch(API, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "x-admin-token":ADMIN_TOKEN },
      body: JSON.stringify({ id, action: actionType })
    });
    load();
  } catch(e) {
    alert("Ошибка действия");
    console.error(e);
  }
}

load();
</script>
